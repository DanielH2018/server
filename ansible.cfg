[defaults]
# --- Logging & Output ---
# YAML-formatted terminal output. The old `community.general.yaml` stdout callback
# was removed in community.general 12.0.0; the built-in `default` callback with
# `result_format = yaml` is the supported replacement (ansible-core >=2.13).
stdout_callback = default
result_format = yaml
# Store a log file in the current directory
log_path = ./ansible.log
# Show timing information for tasks (identifies slow tasks)
callbacks_enabled = profile_tasks
inventory = ansible/inventory/hosts.ini
roles_path = ansible/roles/containers:ansible/roles/setup
collections_path = ansible/collections
display_skipped_hosts = false
interpreter_python = auto_silent
# Don't litter the repo with *.retry files on a partially failed run.
retry_files_enabled = false

# --- Fact caching ---
# deploy.yml runs `gather_facts: true`; single-service deploys and the 30-min GitOps
# loop otherwise re-gather every run. Cache facts to a JSON store and reuse them within
# the timeout window. The cache dir is outside the repo (kept out of git); the short TTL
# bounds post-reboot staleness — a stale cache only costs one re-gather after it expires.
fact_caching = jsonfile
fact_caching_connection = ~/.cache/ansible/facts
fact_caching_timeout = 7200

[ssh_connection]
pipelining = True
