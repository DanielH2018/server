# SOPS encryption config — controls which age recipients new/updated secrets are
# encrypted to. These are PUBLIC age keys (not secret), so this file is tracked in git
# (the matching PRIVATE keys live only at ~/.config/sops/age/keys.txt per host and are
# never committed — see .gitignore's keys.txt/*.agekey rules and the gitleaks hook).
#
# Multi-recipient is OR: ANY listed key decrypts the WHOLE file. Every host that must
# decrypt ansible/vars/secrets.yml needs a private key matching one recipient below.
#
# Add a new host (e.g. the Pi):
#   1. On that host:  ansible-playbook ansible/bootstrap.yml --limit <host>
#      (generates the host's own age key, prints its PUBLIC key — no secret needed)
#   2. Add the printed public key under `age:` below, with a trailing `# <host>` comment.
#   3. On a host that can already decrypt (daniel-server):
#        sops updatekeys ansible/vars/secrets.yml
#      then commit the re-encrypted secrets.yml + this file, and `git pull` on the host.
# Remove a host's access the same way: delete its key here, re-run `sops updatekeys`.
creation_rules:
  - path_regex: .*(vars|secrets)/.*\.ya?ml$
    age: >-
      age1shgt54wq7y9pk4nksxcfr5s539rh2g5uqkh9t2jlx6wj4a8aq34q4cyg7k
