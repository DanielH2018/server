name: image-smoke

# Runs on EVERY PR (no `paths:` filter) on purpose: this is a required status check,
# and a path-filtered workflow that never triggers would leave the PR's required check
# stuck at "Expected — waiting for status". The job self-scopes instead — the
# "Collect changed image refs" step diffs only the compose templates, so a PR that
# touches none yields an empty list and the boot step is skipped (a fast green).
on:
  pull_request:

# Cancel a superseded run when new commits land on the same PR (force-push / Renovate
# rebases) — image-smoke pulls + boots images, so superseded runs waste real runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: pull + boot changed images
    runs-on: ubuntu-latest
    timeout-minutes: 20  # cap a hung docker pull / image that never reaches healthy (per-container boot is already bounded)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0  # no floating v8 tag is published; pin the exact release

      - name: Collect changed image refs
        id: images
        env:
          BASE_REF: ${{ github.base_ref }}  # via env, never interpolated into the shell
        run: |
          git fetch origin "$BASE_REF" --depth=1
          diff="$(git diff "origin/$BASE_REF"...HEAD -- 'ansible/roles/containers/**/templates/docker-compose.yml.j2')"
          images="$(printf '%s' "$diff" | uv run python scripts/smoke_extract.py)"
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$images" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed images:"; echo "$images"

      - name: Pull + boot each image
        if: steps.images.outputs.list != ''
        env:
          LIST: ${{ steps.images.outputs.list }}  # via env so refs are data, never shell source
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r img; do
            [ -z "$img" ] && continue
            echo "::group::smoke $img"
            docker pull "$img"
            # No --rm: an exited container must survive so its exit code and logs
            # are still inspectable below.
            # Sandbox the untrusted PR-supplied image: cap CPU/memory/PIDs and block
            # privilege escalation, so a malicious ref (e.g. a crypto-miner) is bounded to
            # negligible work for the ~60s boot rather than getting a full runner. Caps don't
            # affect a legitimate image's ability to start. Deliberately NOT using --network
            # none / --read-only / --cap-drop ALL: those false-fail legit images that need the
            # network, a writable FS, or caps at boot — and this is a required check that runs
            # on every Renovate image bump, so a false failure would block real PRs.
            cid="$(docker run -d \
              --memory=2g --cpus=2 --pids-limit=1024 \
              --security-opt=no-new-privileges \
              "$img" || true)"
            if [ -z "$cid" ]; then echo "FAIL: $img did not start"; fail=1; echo "::endgroup::"; continue; fi
            # If the image declares a HEALTHCHECK, wait up to 60s for healthy.
            has_hc="$(docker inspect -f '{{if .Config.Healthcheck}}yes{{end}}' "$cid")"
            ok=1
            if [ "$has_hc" = "yes" ]; then
              for _ in $(seq 1 30); do
                st="$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo gone)"
                [ "$st" = "healthy" ] && { ok=0; break; }
                [ "$st" = "gone" ] && break
                sleep 2
              done
            else
              # No healthcheck: assert it stays up 30s without crash-looping. A clean
              # exit (code 0) also passes — base images with no service entrypoint
              # (python, uv) run a REPL that exits 0 on EOF; crash loops exit non-zero.
              sleep 30
              if [ "$(docker inspect -f '{{.State.Running}}' "$cid" 2>/dev/null || echo false)" = "true" ]; then
                ok=0
              elif [ "$(docker inspect -f '{{.State.ExitCode}}' "$cid" 2>/dev/null || echo 1)" = "0" ]; then
                ok=0
              fi
            fi
            [ "$ok" -ne 0 ] && { echo "FAIL: $img unhealthy / exited"; docker logs "$cid" 2>&1 | tail -n 30; fail=1; }
            docker rm -f "$cid" >/dev/null 2>&1 || true
            echo "::endgroup::"
          done <<< "$LIST"
          exit "$fail"
