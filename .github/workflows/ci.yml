name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel a superseded run when new commits land on the same ref (PR force-push / stacked
# pushes) so redundant lint/test runs don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prek:
    name: prek (lint + validate + tests + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 20  # cap a wedged network hook (ansible-galaxy install) so it can't burn to the 6h default
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full clone; prek --all-files scans the worktree, so history isn't strictly required here — kept as belt-and-suspenders

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0  # no floating v8 tag is published; pin the exact release

      - name: Install prek
        run: pip install prek==0.4.4  # pinned for a reproducible hook toolchain; Renovate (pypi) bumps it

      - name: Run all hooks
        run: prek run --all-files --color always

  renovate-config:
    name: renovate config validator
    runs-on: ubuntu-latest
    timeout-minutes: 20  # cap a wedged `npx renovate-config-validator` network fetch
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Semantic validation of renovate.json — the one dependency-management axis with no
      # fail-at-commit backstop. prek's `check-json` only proves the file is well-formed JSON;
      # a typo'd packageRule field (e.g. matchPackageName vs matchPackageNames) is silently
      # IGNORED by Renovate (logged as a config warning, kept running), which would quietly
      # re-enable auto-merge of the stateful/DB-breaking bumps the automerge:false overrides
      # (getmeili/meilisearch, the crowdsec bouncer plugin, galaxy collections) exist to block.
      # `--strict` makes those warnings fail the build. Validates against the latest Renovate —
      # the same hosted Mend app version that actually consumes the config.
      - name: Validate renovate.json
        run: npx --yes --package renovate renovate-config-validator --strict renovate.json
