name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel a superseded run when new commits land on the same ref (PR force-push / stacked
# pushes) so redundant lint/test runs don't pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prek:
    name: prek (lint + validate + tests + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full clone; prek --all-files scans the worktree, so history isn't strictly required here — kept as belt-and-suspenders

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0  # no floating v8 tag is published; pin the exact release

      - name: Install prek
        run: pip install prek

      - name: Run all hooks
        run: prek run --all-files --color always
