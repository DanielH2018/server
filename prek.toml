# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# Standard cleanup hooks
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
# Guards renovate.json (a syntax error there silently disables ALL dependency management)
# and every other JSON in the repo (Grafana dashboards, settings).
id = "check-json"

[[repos.hooks]]
id = "check-added-large-files"

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=lf"]

# Ansible linting
[[repos]]
repo = "https://github.com/ansible/ansible-lint"
rev = "v26.6.0"

[[repos.hooks]]
id = "ansible-lint"
files = "\\.(yaml|yml)$"
# Cap ansible-core <3 so a surprise upstream major can't silently change lint behavior
# or break this hook on a day nothing in the repo changed (these deps aren't lock-pinned).
additional_dependencies = ["ansible-core>=2.18,<3.0", "jmespath"]
entry = "bash -c 'ansible-galaxy collection install -r ansible/requirements.yml -p ansible/collections && ansible-lint -c .ansible-lint'"
pass_filenames = false

# Secret scanning
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"

[[repos.hooks]]
id = "gitleaks"

# Shell script linting. shellcheck-py ships a precompiled shellcheck binary via pip
# (language = python) — no host apt package and no Docker, so it works unmodified on the
# ubuntu-latest CI runner via prek's own hook-env bootstrap. All severities are on by
# default (not just --severity=error): the repo's shell scripts are currently
# shellcheck-clean, so there's nothing to suppress yet.
[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.11.0.1"

[[repos.hooks]]
id = "shellcheck"
# .bashrc is a SOURCED dotfile (no shebang by design — `shell(1)` sources it, never execs it) and
# is the stock Debian/Ubuntu skeleton .bashrc plus one guarded nvm block, not a script this gate
# is meant to police. Excluded rather than annotated so the near-stock file stays diffable against
# upstream. The findings it trips are all expected for that class of file: SC2148 (no shebang —
# correct, it's sourced), SC1090/SC1091 (can't follow `~/.bash_aliases` / nvm's dynamic path —
# intentionally conditional/per-host), SC2015 (`test ... && eval || eval` fallback idiom, not
# if/then/else — deliberate here).
exclude = "^ansible/roles/setup/config_files/files/\\.bashrc$"

# Render container docker-compose.yml.j2 templates with stubbed vars and assert
# the output is valid YAML — catches broken indentation / label-macro edits that
# ansible-lint and check-yaml miss (they don't render .j2 files).
[[repos]]
repo = "local"

[[repos.hooks]]
id = "validate-compose-templates"
name = "Validate rendered docker-compose templates"
entry = "uv run python scripts/validate_compose_templates.py"
language = "system"
pass_filenames = false
files = "^(ansible/roles/containers/[^/]+/templates/docker-compose\\.yml\\.j2|ansible/templates/[^/]+\\.yml\\.j2|ansible/inventory/(host_vars/[^/]+|group_vars/all)\\.yml|scripts/validate_compose_templates\\.py)$"

# Structurally validate the Home Assistant config (pure Python, no Docker): YAML syntax,
# duplicate keys, broken !include targets, and a syntax parse-check of inline + custom_templates
# Jinja. Catches authoring errors before a deploy recreates the container. Schema validation
# (hass --script check_config) is intentionally out of scope.
[[repos.hooks]]
id = "validate-ha-config"
name = "Validate Home Assistant config"
entry = "uv run python scripts/validate_ha_config.py"
language = "system"
pass_filenames = false
files = "^(ansible/roles/containers/home-assistant/(templates|files)/.*|scripts/validate_ha_config\\.py)$"

# Validate that every provisioned Grafana dashboard's datasource references resolve to a
# datasource declared in datasources.yml.j2 (uid or name) or a Grafana built-in. Catches the
# silent "No data" / stale-uid class (e.g. a lingering hand-imported uid) before deploy.
[[repos.hooks]]
id = "validate-grafana-dashboards"
name = "Validate Grafana dashboard datasource uids"
entry = "uv run python scripts/validate_grafana_dashboards.py"
language = "system"
pass_filenames = false
files = "^(ansible/roles/containers/grafana/files/dashboards/.*\\.json|ansible/roles/containers/grafana/templates/provisioning/datasources\\.yml\\.j2|scripts/validate_grafana_dashboards\\.py)$"

# Render the high-value NON-compose YAML config templates (authelia/traefik/prometheus/grafana)
# with stubbed vars and assert each parses — the render-then-parse guard the compose templates
# already get (validate-compose-templates), extended to the bind-mounted config templates that
# re-render every deploy. Catches a Jinja indentation bug that check-yaml/ansible-lint miss (they
# don't render .j2) BEFORE it reaches an auth-critical deploy (a config-only push is health-gated
# but auth-critical — a bad place to first find a broken authelia/traefik config).
[[repos.hooks]]
id = "validate-config-templates"
name = "Validate rendered config templates (authelia/traefik/prometheus/grafana)"
entry = "uv run python scripts/validate_config_templates.py"
language = "system"
pass_filenames = false
# group_vars/all.yml is in scope because the validator renders with it (ALL_VARS) — an
# edit there can change what these templates render to, same as the compose hook's scope.
files = "^(ansible/roles/containers/(authelia/templates/configuration|traefik/templates/(config|traefik)|prometheus/templates/prometheus|grafana/templates/(loki-config|promtail-config))\\.yml\\.j2|ansible/inventory/group_vars/all\\.yml|scripts/validate_config_templates\\.py)$"

# Render every Jinja-templated shell script (*.sh.j2) with stubbed vars and lint the OUTPUT
# (bash -n + shellcheck) — the same render-then-lint pattern as validate-compose-templates /
# validate-config-templates, but for shell instead of YAML. identify tags a `.sh.j2` file as
# {jinja, text}, never `shell`, so the bash-syntax-check / shellcheck hooks above never see these
# templates no matter how broken the rendered script is. shellcheck comes via the `shellcheck-py`
# dev dependency (pyproject.toml) so `uv run` can reach it; the script fails closed (not skips) if
# shellcheck isn't on PATH, so this can't silently degrade to bash -n alone.
[[repos.hooks]]
id = "validate-shell-templates"
name = "Validate rendered shell templates (bash -n + shellcheck)"
entry = "uv run python scripts/validate_shell_templates.py"
language = "system"
pass_filenames = false
# group_vars/all.yml is in scope because the validator renders with it (ALL_VARS) — an
# edit there can change what the rendered scripts contain.
files = "^(ansible/roles/.*\\.sh\\.j2|ansible/inventory/group_vars/all\\.yml|scripts/validate_shell_templates\\.py)$"

# Gate that the secret-rotation registry (ansible/secret_rotation.yml) stays in sync with the
# encrypted secrets.yml — fails the commit if a secret was added/removed without running
# `secret_rotation.py sync`. Read-only: reads plaintext key NAMES only, never decrypts a value
# (no age key needed), so it's CI-safe. Catches the drift at commit time instead of a day later
# when the daily "Secret Rotation" Kuma monitor goes down.
[[repos.hooks]]
id = "secret-rotation-registry-sync"
name = "Secret-rotation registry in sync with secrets.yml"
entry = "uv run python scripts/secret_rotation.py audit --check"
language = "system"
pass_filenames = false
files = "^(ansible/vars/secrets\\.yml|ansible/secret_rotation\\.yml|scripts/secret_rotation\\.py)$"

# Assert uv.lock stays consistent with pyproject.toml. Every unattended production path
# (gitops_deploy, secret-rotate, secret-rotation-audit) runs `uv run --frozen`, which ERRORS
# on a stale lock — but prek/CI's plain `uv run` silently regenerates the lock in the ephemeral
# checkout, so a pyproject edit merged WITHOUT a refreshed lock passes CI and only bites later as
# a confusing --frozen failure on the host (a deploy rollback+hold, or the Secret Rotation Kuma
# going stale). `uv lock --check` (read-only; exits non-zero on drift, never writes) mirrors the
# prod invariant at commit time. Renovate's weekly lockFileMaintenance refreshes the lock but is
# NOT a same-commit gate, so a human pyproject edit is the open escape hatch this closes.
[[repos.hooks]]
id = "uv-lock-check"
name = "uv.lock in sync with pyproject.toml"
entry = "uv lock --check"
language = "system"
pass_filenames = false
files = "^(pyproject\\.toml|uv\\.lock)$"

# Run the repo's Python unit tests via uv: the toposort dependency-resolution filters
# (gate every deploy's ordering/scope), the monitor-bridge check logic, the
# auto-approve-readonly Bash classifier (a permission security boundary), and the
# smoke_extract image-diff parser. Deps + test paths come from pyproject.toml (the `dev`
# group + [tool.pytest.ini_options] testpaths); `uv run` auto-syncs from uv.lock, so it
# works regardless of the system Python. Requires uv on PATH (CI installs astral-sh/setup-uv).
[[repos.hooks]]
id = "pytest"
name = "Run Python unit tests (toposort + monitor-bridge + readonly-hook + smoke + gitops)"
entry = "uv run python -m pytest"
language = "system"
pass_filenames = false
# Mirror pyproject.toml [tool.pytest.ini_options] testpaths so a LOCAL commit touching only
# one suite still runs pytest (CI runs --all-files regardless; this keeps the two in sync).
# Also fire on the DATA files the scripts-suite guards read (renovate.json, prek.toml,
# requirements.yml, the CI + image-smoke workflows, sops_setup's SOPS-binary pin, compose
# templates, Dockerfiles, traefik static config, .python-version) — the
# Renovate-manager/lockstep tests consume those, so an edit there must re-run them locally,
# not just in CI. Likewise host_vars/group_vars/docker_install main.yml, which
# test_network_invariant.py reads to check every referenced net is created on a fresh host.
# And any setup-role script + `.service.j2` unit template, whose bare-python3 ExecStarts feed
# test_host_scripts_py312.py's completeness guard (a new host-python3 unit must join HOST_RUN_SCRIPTS
# and stay 3.12-parseable) — the exact class that bricked the deployer on 2026-07-15. Plus setup-role
# `templates/*.j2` (e.g. gitops_deploy/config.env.j2), which the gitops budget-arithmetic guard reads
# to prove flock+RUN_BUDGET_S+HEALTH_TIMEOUT_S stays within TimeoutStartSec.
files = "^(ansible/filter_plugins/.*\\.py|ansible/tests/.*\\.py|ansible/roles/containers/(autofix-bridge|monitor-bridge|terraria-stats)/files/.*\\.py|ansible/roles/containers/home-assistant/tests/.*\\.py|ansible/roles/setup/[^/]+/files/.*\\.py|ansible/roles/setup/[^/]+/templates/.*\\.j2|ansible/roles/.*\\.service\\.j2|\\.claude/(hooks|scripts)/.*\\.py|scripts/.*\\.py|evals/.*\\.py|pyproject\\.toml|renovate\\.json|prek\\.toml|\\.python-version|ansible/requirements\\.yml|\\.github/workflows/[^/]+\\.yml|ansible/inventory/(host_vars/[^/]+|group_vars/all)\\.yml|ansible/roles/setup/(docker_install|sops_setup)/tasks/main\\.yml|ansible/roles/containers/[^/]+/templates/docker-compose\\.yml\\.j2|ansible/roles/containers/[^/]+/(templates|files)/[Dd]ockerfile[^/]*|ansible/roles/containers/traefik/templates/traefik\\.yml\\.j2)$"

# Lint first-party Python for real bugs only — pyflakes (unused imports/undefined names),
# syntax errors, bare-except, ==None/==True (ruleset in pyproject [tool.ruff.lint]; vendored
# collections excluded there). ruff is pinned in uv.lock (dev group) so the gate is
# reproducible and lockFileMaintenance refreshes it weekly. Runs once when any .py is staged.
[[repos.hooks]]
id = "ruff"
name = "Lint first-party Python (ruff)"
entry = "uv run ruff check"
language = "system"
pass_filenames = false
files = "\\.py$"

# Enforce `ruff format` on first-party Python (config in pyproject.toml [tool.ruff], same
# extend-exclude as the linter so vendored collections are untouched). --check fails the commit
# on an unformatted file instead of rewriting it, so a stray editor save can't sneak past CI.
[[repos.hooks]]
id = "ruff-format"
name = "Format first-party Python (ruff format)"
entry = "uv run ruff format --check"
language = "system"
pass_filenames = false
files = "\\.py$"

# Fast syntax-only gate: `bash -n` parses (doesn't run) every shell script. Catches the exact
# bug class that killed the kopia backup-maintenance watchdog cron for a day (2026-07-01,
# ansible/roles/containers/kopia/files/maintenance-check.sh): an apostrophe ("kopia's") landed
# inside a single-quoted `python3 -c '...'` block, breaking bash's own quote parsing. shellcheck
# above would also catch this, but `bash -n` is near-free and independent of it — a belt-and-
# suspenders backstop if the shellcheck-py hook is ever skipped/broken.
# `types = ["shell"]` (identify's shebang-aware detection, same as the shellcheck hook above)
# rather than a `.sh$` files regex — the NUT role's upssched-cmd (files/upssched-cmd, no
# extension: the filename is fixed by upssched's own config) is a real bash script and would be
# silently skipped by an extension-only match.
# NB: `entry` loops over "$@" itself — pre-commit/prek batch every matched filename into ONE
# invocation, and a bare `bash -n "$1" "$2"` silently only checks "$1" ($2+ become that
# script's own positional params, not additional files to parse).
[[repos.hooks]]
id = "bash-syntax-check"
name = "bash -n (shell syntax check)"
entry = "bash -c 'for f in \"$@\"; do bash -n \"$f\" || exit 1; done' --"
language = "system"
types = ["shell"]
