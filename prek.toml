# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# Standard cleanup hooks
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-added-large-files"

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=lf"]

# Ansible linting
[[repos]]
repo = "https://github.com/ansible/ansible-lint"
rev = "v26.4.0"

[[repos.hooks]]
id = "ansible-lint"
files = "\\.(yaml|yml)$"
additional_dependencies = ["ansible-core>=2.18", "jmespath"]
entry = "bash -c 'ansible-galaxy collection install -r ansible/requirements.yml -p ansible/collections && ansible-lint -c .ansible-lint'"
pass_filenames = false

# Secret scanning
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"

[[repos.hooks]]
id = "gitleaks"

# Render container docker-compose.yml.j2 templates with stubbed vars and assert
# the output is valid YAML — catches broken indentation / label-macro edits that
# ansible-lint and check-yaml miss (they don't render .j2 files).
[[repos]]
repo = "local"

[[repos.hooks]]
id = "validate-compose-templates"
name = "Validate rendered docker-compose templates"
entry = "python3 scripts/validate_compose_templates.py"
language = "python"
additional_dependencies = ["jinja2>=3", "pyyaml"]
pass_filenames = false
files = "^(ansible/roles/containers/[^/]+/templates/docker-compose\\.yml\\.j2|ansible/templates/(traefik|autokuma)\\.yml\\.j2|ansible/inventory/(host_vars/[^/]+|group_vars/all)\\.yml|scripts/validate_compose_templates\\.py)$"

# Run the repo's Python unit tests: the toposort dependency-resolution filters
# (gate every deploy's ordering/scope), the monitor-bridge check logic, and the
# auto-approve-readonly Bash classifier (a permission security boundary). ansible-core
# is needed because toposort.py imports ansible.errors. Runs in prek's isolated env, so
# it works regardless of the system Python (ansible here is a pipx install).
[[repos.hooks]]
id = "pytest"
name = "Run Python unit tests (toposort + monitor-bridge + readonly-hook)"
entry = "python3 -m pytest"
language = "python"
additional_dependencies = ["pytest", "ansible-core>=2.18", "pyyaml"]
pass_filenames = false
args = ["ansible/tests", "ansible/roles/containers/monitor-bridge/files", ".claude/hooks"]
files = "^(ansible/filter_plugins/.*\\.py|ansible/tests/.*\\.py|ansible/roles/containers/monitor-bridge/files/.*\\.py|\\.claude/hooks/.*\\.py)$"
