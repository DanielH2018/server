- name: Creates directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/mobile-app-db"
    state: directory
    mode: 0755

- name: Unzip archive
  unarchive:
    src: project_tracker_server.zip
    dest: "/home/{{ env.SYS_USER }}/server/mobile-app-db"

- name: Deploy mobile-app-db
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/mobile-app-db/project_tracker_server"
  become: yes
  become_method: sudo