- name: Creates directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/prometheus/"
    state: directory
    mode: 0755

- name: Create prometheus.yml from template
  template:
    src: prometheus.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/prometheus/prometheus.yml"

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/prometheus/docker-compose.yml"

- name: Deploy Prometheus
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/prometheus/"
  become: yes
  become_method: sudo 