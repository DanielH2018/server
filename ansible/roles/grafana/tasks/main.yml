- include_tasks: directory.yml
  with_items:
    - "{{ role_name }}"

- name: Create loki-config.yml from template
  template:
    src: loki-config.yml.j2
    dest: "/home/{{ SYS_USER }}/server/{{ role_name }}/loki-config.yaml"

- name: Create promtail-config.yml from template
  template:
    src: promtail-config.yml.j2
    dest: "/home/{{ SYS_USER }}/server/{{ role_name }}/promtail-config.yaml"

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- include_tasks: docker.yml
  vars:
    container: "{{ role_name }}"