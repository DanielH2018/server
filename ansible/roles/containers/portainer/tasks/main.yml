---
- ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    dirs_to_create:
      - "{{ container_item.name }}/data"

- name: Add apache2-utils
  ansible.builtin.apt:
    name: apache2-utils
    state: present
  become: true
  become_method: sudo

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
