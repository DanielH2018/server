---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config/wg_confs"
      - "{{ container_item.name }}/mullvad-secrets"  # 0600 FILE__ mounts for the Mullvad creds
      - "data/torrents"
      - "data/torrents/tv-sonarr"
      - "data/torrents/radarr"
      - "data/torrents/incomplete"

- name: Render the Mullvad private key to a file (kept out of the container's Env)
  tags: [config]
  # Inlined as MULLVAD_PRIVATE_KEY it lands in the wireguard container's Env, readable via the
  # read-only docker-proxy by any neighbor. The LSIO init-envfile reads FILE__MULLVAD_PRIVATE_KEY
  # from this file before the mullvad mod runs (2026-07-15 review L2). `| trim`: init-envfile does
  # NOT strip a trailing newline and one would corrupt the key. no_log; 0600 owned by sys_user (the
  # wireguard init reads it as root — 1000-owned is fine). NO become.
  no_log: true
  ansible.builtin.copy:
    content: "{{ wireguard_interface_private_key | trim }}"
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/mullvad-secrets/key"
    mode: "0600"
  register: qbittorrent_cfg_mullvad_key

- name: Render the Mullvad account number to a file (kept out of the container's Env)
  tags: [config]
  # Same rationale as the key above — MULLVAD_ACCOUNT via FILE__, trailing whitespace trimmed.
  no_log: true
  ansible.builtin.copy:
    content: "{{ mullvad_account | trim }}"
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/mullvad-secrets/account"
    mode: "0600"
  register: qbittorrent_cfg_mullvad_account

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # The Mullvad cred files are read by the wireguard mod once at container init, so a rotation
    # must recreate the sidecar to re-read them (recreate: auto skips a content-only change).
    # Recreating wireguard also recreates qbittorrent (shared netns); the wg0 rebind task below
    # re-runs, and the boot systemd unit keeps the start-order race covered.
    common_config_changed: "{{ (qbittorrent_cfg_mullvad_key is changed) or (qbittorrent_cfg_mullvad_account is changed) }}"

# qBittorrent.conf is stateful (it lives in the bind-mounted ./config and is rewritten
# by qBittorrent itself, so it is NOT templated). Enforce the VPN interface binding via
# the WebUI API instead: without it, libtorrent follows the netns main-table default
# route (eth0) and binds its torrent UDP socket there, so the Mullvad kill-switch
# EPERM-rejects every UDP tracker/DHT/uTP packet and downloads make zero progress while
# TCP (and the old healthcheck) still look fine. Binding by interface NAME with an empty
# address re-binds automatically when Mullvad hands out a new wg0 address. setPreferences
# applies live and qBittorrent persists it. LocalHostAuth=false -> no creds from localhost.
- name: Bind qBittorrent's listen interface to the VPN tunnel (wg0)
  tags: [deploy]
  community.docker.docker_container_exec:
    container: qbittorrent
    # argv (not command) so curl's JSON arg is passed literally, with no shell re-parsing.
    argv:
      - curl
      - -fsS
      - -m
      - "10"
      - -X
      - POST
      - --data-urlencode
      - 'json={"current_network_interface":"wg0","current_interface_address":""}'
      - http://localhost:8080/api/v2/app/setPreferences
  register: qbittorrent_iface_bind
  # Wait out the WebUI warm-up after recreate (up to ~60s); curl -f returns non-zero
  # until the API answers 200.
  until: qbittorrent_iface_bind.rc == 0
  retries: 12
  delay: 5
  # Posting the same binding is a no-op for the running config, so never report changed.
  changed_when: false

- name: Add Systemd Service
  tags: [deploy]
  ansible.builtin.template:
    src: docker-compose.app.service.j2
    dest: /etc/systemd/system/docker-compose-{{ role_name }}.service
    mode: "0644"
  become: true

- name: Ensure Systemd Service is enabled and started
  tags: [deploy]
  ansible.builtin.systemd:
    name: docker-compose-{{ role_name }}.service
    enabled: true
    state: started
    daemon_reload: true
  become: true
