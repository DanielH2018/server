---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/data"

- name: Create acme.json
  ansible.builtin.file:
    path: "/home/{{ sys_user }}/server/containers/traefik/data/acme.json"
    state: touch
    mode: "0600"

- name: Create config.yml from template
  ansible.builtin.template:
    src: config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/traefik/data/config.yml"
    mode: "0664"

- name: Create traefik.yml from template
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/traefik/data/traefik.yml"
    mode: "0664"

- name: Hash password
  ansible.builtin.shell: "echo $(htpasswd -nb {{ traefik_user }} {{ traefik_password }})"
  register: traefik_hash

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
