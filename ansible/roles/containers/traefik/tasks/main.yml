---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/data"
      - "{{ container_item.name }}/crowdsec-config/notifications"
      - "{{ container_item.name }}/crowdsec-config/parsers/s02-enrich"

- name: Create acme.json
  tags: [config]
  ansible.builtin.file:
    path: "/home/{{ sys_user }}/server/containers/traefik/data/acme.json"
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Configure logrotate for Traefik logs
  tags: [config]
  ansible.builtin.copy:
    src: traefik-logrotate
    dest: /etc/logrotate.d/traefik
    mode: "0644"
    owner: root
    group: root
  become: true

- name: Create dynamic config directory
  # Directory mount (not the old single-file bind mount): ansible's template module
  # writes via tmp+rename, so a re-render swaps in a new inode. A single-file bind
  # mount stays pinned to the OLD inode — Traefik's file-provider `watch: true` never
  # fires and even a full re-render is invisible until the container is recreated.
  # Bind-mounting the parent directory instead means the container follows the
  # directory entry, not a specific inode, so renames within it ARE visible and
  # watch actually works. 0700: traefik reads it as root via DAC_OVERRIDE (same as
  # acme.json), so this only needs to keep other local users out.
  tags: [config]
  ansible.builtin.file:
    path: "/home/{{ sys_user }}/server/containers/traefik/data/dynamic"
    state: directory
    mode: "0700"

- name: Remove old single-file dynamic config (superseded by data/dynamic/config.yml)
  tags: [config]
  ansible.builtin.file:
    path: "/home/{{ sys_user }}/server/containers/traefik/data/config.yml"
    state: absent

- name: Create config.yml from template
  tags: [config]
  # Embeds the CrowdSec LAPI bouncer key + the livesync X-Sync-Token — no_log so a -v/--diff
  # run doesn't print them to stdout/ansible.log (matches the repo-wide secret-task discipline).
  no_log: true
  ansible.builtin.template:
    src: config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/traefik/data/dynamic/config.yml"
    # 0600: embeds the CrowdSec LAPI bouncer key — keep it off other local users.
    mode: "0600"
  register: traefik_cfg_config

- name: Create traefik.yml from template
  tags: [config]
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/traefik/data/traefik.yml"
    mode: "0664"
  register: traefik_cfg_static

- name: Deploy CrowdSec local whitelist
  tags: [config]
  ansible.builtin.copy:
    src: crowdsec-whitelist.yaml
    dest: "/home/{{ sys_user }}/server/containers/traefik/crowdsec-config/parsers/s02-enrich/whitelist.yaml"
    mode: "0664"
  become: true
  register: traefik_cfg_whitelist

- name: Deploy CrowdSec trusted-remote whitelist (pinned Mullvad exit)
  tags: [config]
  ansible.builtin.copy:
    src: crowdsec-trusted-remote-whitelist.yaml
    dest: "/home/{{ sys_user }}/server/containers/traefik/crowdsec-config/parsers/s02-enrich/trusted-remote-whitelist.yaml"
    mode: "0664"
  become: true
  register: traefik_cfg_trusted_remote_whitelist

- name: Create CrowdSec acquis.yaml from template
  tags: [config]
  ansible.builtin.template:
    src: crowdsec-acquis.yaml.j2
    dest: "/home/{{ sys_user }}/server/containers/traefik/crowdsec-config/acquis.yaml"
    mode: "0664"
  become: true
  register: traefik_cfg_acquis

- name: Copy CrowdSec profiles.yaml
  tags: [config]
  ansible.builtin.copy:
    src: crowdsec-profiles.yaml
    dest: "/home/{{ sys_user }}/server/containers/traefik/crowdsec-config/profiles.yaml"
    mode: "0664"
  become: true
  register: traefik_cfg_profiles

- name: Create CrowdSec discord.yaml from template
  tags: [config]
  # Embeds the CrowdSec Discord webhook URL — no_log so a -v/--diff run doesn't leak it to
  # stdout/ansible.log (matches the repo-wide secret-task discipline).
  no_log: true
  ansible.builtin.template:
    src: crowdsec-discord.yaml.j2
    dest: "/home/{{ sys_user }}/server/containers/traefik/crowdsec-config/notifications/discord.yaml"
    # 0600: embeds the Discord webhook URL.
    mode: "0600"
  become: true
  register: traefik_cfg_discord

- name: Deploy DOCKER-USER iptables rules script
  tags: [config]
  ansible.builtin.template:
    src: docker-user-rules.sh.j2
    dest: /etc/docker-user-rules.sh
    owner: root
    group: root
    mode: "0750"
  become: true
  register: traefik_docker_user_rules_script

- name: Deploy DOCKER-USER rules systemd service
  tags: [config]
  ansible.builtin.template:
    src: docker-user-rules.service.j2
    dest: /etc/systemd/system/docker-user-rules.service
    owner: root
    group: root
    mode: "0644"
  become: true
  register: traefik_docker_user_rules_service

- name: Enable docker-user-rules systemd service
  tags: [config]
  ansible.builtin.systemd:
    name: docker-user-rules
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Restart docker-user-rules if script or service changed
  tags: [config]
  ansible.builtin.systemd:
    name: docker-user-rules
    state: restarted
    daemon_reload: true
  become: true
  when: traefik_docker_user_rules_script.changed or traefik_docker_user_rules_service.changed

- name: Deploy DOCKER-USER seed systemd service (pre-docker origin lock)
  tags: [config]
  # Runs the same apply script Before=docker.service so the lock is present before dockerd binds
  # traefik's 80/443 on boot — the After=docker.service unit above can't (ports are already bound
  # by the time it runs). Enable-only: this is the boot unit; deploy-time application is handled by
  # the docker-user-rules restart task above, so no state:started/restart-on-change here.
  ansible.builtin.template:
    src: docker-user-seed.service.j2
    dest: /etc/systemd/system/docker-user-seed.service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Enable docker-user-seed systemd service
  tags: [config]
  ansible.builtin.systemd:
    name: docker-user-seed
    enabled: true
    daemon_reload: true
  become: true

- name: Create the DOCKER-USER origin-lock monitor state directory
  tags: [config]
  # monitor-bridge bind-mounts this read-only (/docker-user) and its `docker_user` check alerts on a
  # failed live-chain assert or staleness. Root-owned: the verify cron runs as root (iptables needs
  # CAP_NET_ADMIN) and writes state.json here. Deploy traefik before monitor-bridge on a fresh host
  # (traefik deploys first anyway) else Docker auto-creates the mount source.
  ansible.builtin.file:
    path: /var/lib/docker-user-rules
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deploy DOCKER-USER live-verify watchdog script
  tags: [config]
  ansible.builtin.template:
    src: docker-user-verify.sh.j2
    dest: /usr/local/bin/docker-user-verify.sh
    owner: root
    group: root
    mode: "0750"
  become: true

- name: Refresh the DOCKER-USER verify state each deploy
  tags: [config]
  # Run the verify once per deploy so state.json exists, is fresh, and is world-readable (the script
  # chmods it) before monitor-bridge reads it — so a fresh host / this very deploy don't false-page
  # "never ran"; the 15-min cron owns ongoing refresh. A read-only iptables assert; failed_when:false
  # so a failed assert is the monitor's page, not a deploy blocker (kopia state-seed idiom).
  ansible.builtin.command: /usr/local/bin/docker-user-verify.sh
  become: true
  changed_when: false
  failed_when: false

- name: Schedule DOCKER-USER origin-lock verify
  tags: [cron]
  ansible.builtin.cron:
    name: "Verify DOCKER-USER origin lock"
    minute: "*/15"
    user: root
    job: /usr/local/bin/docker-user-verify.sh
    state: present
  become: true

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # Recreate traefik+crowdsec only when a bind-mounted config changed. Excludes the
    # host-level docker-user-rules/systemd units (handled by their own restart tasks).
    # traefik_cfg_config (dynamic config.yml) is deliberately NOT in this OR: it's now
    # bind-mounted via its parent directory (data/dynamic/), so Traefik's file-provider
    # `watch: true` picks up edits live — no recreate needed. traefik_cfg_static
    # (traefik.yml) stays in the OR since Traefik only reads its static config at boot.
    common_config_changed: >-
      {{ (traefik_cfg_static is changed)
         or (traefik_cfg_whitelist is changed) or (traefik_cfg_trusted_remote_whitelist is changed)
         or (traefik_cfg_acquis is changed)
         or (traefik_cfg_profiles is changed) or (traefik_cfg_discord is changed) }}

- name: Wait for CrowdSec to be healthy
  tags: [deploy]
  community.docker.docker_container_info:
    name: crowdsec
  register: traefik_crowdsec_health
  until: traefik_crowdsec_health.container.State.Health.Status == "healthy"
  retries: 10
  delay: 10

- name: Enable WAL mode in CrowdSec SQLite config
  tags: [deploy]
  ansible.builtin.lineinfile:
    path: "/home/{{ sys_user }}/server/containers/traefik/crowdsec-config/config.yaml"
    insertafter: '^\s*db_path:'
    line: '  use_wal: true'
    regexp: '^\s*use_wal:'
  become: true
  register: traefik_crowdsec_wal_config

- name: Restart CrowdSec to apply WAL config # noqa no-handler
  tags: [deploy]
  community.docker.docker_compose_v2:
    project_src: "/home/{{ sys_user }}/server/containers/traefik"
    services:
      - crowdsec
    state: restarted
  become: true
  when: traefik_crowdsec_wal_config.changed

- name: Wait for CrowdSec to be healthy after WAL config change # noqa no-handler
  tags: [deploy]
  community.docker.docker_container_info:
    name: crowdsec
  register: traefik_crowdsec_health_post_wal
  until: traefik_crowdsec_health_post_wal.container.State.Health.Status == "healthy"
  retries: 10
  delay: 10
  when: traefik_crowdsec_wal_config.changed

- name: Probe LAPI with the configured bouncer key (rotation guard)
  # `cscli bouncers add` is create-only (no update flag) and the add task below tolerates
  # "already exist" — so after a key rotation the LAPI would keep the OLD hash while
  # Traefik hot-reloads the NEW key from the file provider instantly (config.yml is a
  # directory-mounted dynamic config; no recreate gates it). Auth then fails and the
  # bouncer plugin FAILS OPEN indefinitely — a silent WAF bypass. Probing /v1/decisions
  # with the configured key detects that mismatch so the delete+re-add below makes the
  # rotated key actually take effect. Rotation runbook: docs/secret-rotation.md.
  tags: [deploy]
  community.docker.docker_container_exec:
    container: crowdsec
    command: >-
      wget -q -O /dev/null --header "X-Api-Key: {{ crowdsec_bouncer_api_key }}"
      http://localhost:8080/v1/decisions?limit=1
  register: traefik_crowdsec_bouncer_probe
  failed_when: false
  changed_when: false
  no_log: true

- name: Deregister bouncer whose stored key no longer matches
  # Delete-then-re-add is the only rotation path cscli offers. Deleting the parent
  # CASCADES to every auto-created `traefik-bouncer@<ip>` row (cscli refuses to delete
  # children individually — verified live 2026-07-03), so each rotation also resets the
  # ~1-row-per-recreate accumulation; between rotations it's cosmetic and accepted.
  tags: [deploy]
  community.docker.docker_container_exec:
    container: crowdsec
    command: "cscli bouncers delete traefik-bouncer"
  register: traefik_crowdsec_bouncer_delete
  failed_when:
    - traefik_crowdsec_bouncer_delete.rc != 0
    - "'not found' not in (traefik_crowdsec_bouncer_delete.stderr | lower)"
  changed_when: traefik_crowdsec_bouncer_delete.rc == 0
  when: traefik_crowdsec_bouncer_probe.rc != 0

- name: Register Traefik bouncer API key with CrowdSec
  tags: [deploy]
  community.docker.docker_container_exec:
    container: crowdsec
    command: "cscli bouncers add traefik-bouncer --key {{ crowdsec_bouncer_api_key }}"
  register: traefik_crowdsec_bouncer_registration
  failed_when:
    - traefik_crowdsec_bouncer_registration.rc != 0
    - "'already exist' not in (traefik_crowdsec_bouncer_registration.stderr | lower)"
  changed_when: traefik_crowdsec_bouncer_registration.rc == 0
  no_log: true

- name: Restart Traefik to re-authenticate with CrowdSec bouncer # noqa no-handler
  tags: [deploy]
  community.docker.docker_container:
    name: traefik
    state: started
    restart: true
  when: traefik_crowdsec_bouncer_registration.changed

- name: Update CrowdSec hub
  tags: [deploy]
  community.docker.docker_container_exec:
    container: crowdsec
    command: cscli hub update
  changed_when: false

- name: Upgrade CrowdSec hub
  tags: [deploy]
  community.docker.docker_container_exec:
    container: crowdsec
    command: cscli hub upgrade
  changed_when: false

- name: Ensure CrowdSec dependency collections are installed
  # `cscli hub upgrade` refreshes installed items in place but NEVER installs a collection's
  # newly-declared transitive dependency, so base-http-scenarios / linux sat "tainted by
  # missing crowdsecurity/http-cve / whitelist-good-actors" indefinitely — silently dropping
  # CVE-probe detection + good-actor false-positive suppression (2026-07-04 review M2). These
  # are also in the crowdsec COLLECTIONS env (installed at container init), but re-asserting
  # them here heals a deploy that doesn't recreate crowdsec and guards against a future hub
  # bump silently regressing them. Idempotent; no --force, so a locally-modified item is never
  # clobbered. `install` on an already-present item exits 0 ("nothing to install").
  # appsec-virtual-patching + appsec-generic-rules install the inline-WAF rulesets + the
  # crowdsecurity/appsec-default config the acquis references; re-asserting here heals a
  # config-only deploy (no crowdsec recreate) the same way as the dep collections above.
  tags: [deploy]
  community.docker.docker_container_exec:
    container: crowdsec
    command: >-
      cscli collections install crowdsecurity/http-cve crowdsecurity/whitelist-good-actors
      crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
  register: traefik_crowdsec_dep_collections
  changed_when: "'installed' in (traefik_crowdsec_dep_collections.stdout | lower)"
  failed_when: traefik_crowdsec_dep_collections.rc != 0

- name: Deploy traefik-init systemd service
  tags: [config]
  ansible.builtin.template:
    src: traefik-init.service.j2
    dest: /etc/systemd/system/traefik-init.service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Enable traefik-init systemd service
  tags: [config]
  ansible.builtin.systemd:
    name: traefik-init
    enabled: true
    daemon_reload: true
  become: true

- name: Ensure Crowdsec hub update and upgrade job exists
  tags: [cron]
  ansible.builtin.cron:
    name: "Update Crowdsec Hub"
    minute: "15"
    hour: "7"
    job: "docker exec crowdsec cscli hub update && docker exec crowdsec cscli hub upgrade"
    user: root
    state: present
  become: true

- name: Create CrowdSec home-ips allowlist
  tags: [config]
  community.docker.docker_container_exec:
    container: crowdsec
    command: "cscli allowlists create home-ips --description 'Home IPs'"
  register: traefik_crowdsec_allowlist_create
  failed_when:
    - traefik_crowdsec_allowlist_create.rc != 0
    - "'already exist' not in (traefik_crowdsec_allowlist_create.stderr | lower)"
  changed_when: traefik_crowdsec_allowlist_create.rc == 0

- name: Create the CrowdSec home-allowlist monitor state directory
  tags: [config]
  # monitor-bridge bind-mounts this read-only (/home-allowlist) and its `home_allowlist` check alerts
  # on a failed/stale run. Created here sys_user-owned so the every-5-min cron can write state.json;
  # deploy traefik before monitor-bridge on a fresh host (traefik deploys first anyway) else Docker
  # auto-creates the mount source root-owned.
  ansible.builtin.file:
    path: /var/lib/crowdsec-home-allowlist
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy home allowlist updater script
  tags: [config]
  ansible.builtin.template:
    src: crowdsec-update-home-allowlist.sh.j2
    dest: /usr/local/bin/crowdsec-update-home-allowlist.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0750"
  become: true

- name: Schedule CrowdSec home IP allowlist updater
  tags: [cron]
  ansible.builtin.cron:
    name: "Update CrowdSec home IP allowlist"
    minute: "*/5"
    user: "{{ sys_user }}"
    job: /usr/local/bin/crowdsec-update-home-allowlist.sh
    state: present

- name: Create the Cloudflare-IP drift monitor state directory
  tags: [config]
  # monitor-bridge bind-mounts this read-only (/cloudflare-drift) and its `cloudflare_drift` check
  # alerts on a failed fetch, a mismatch, or staleness. Created sys_user-owned so the weekly cron can
  # write state.json; traefik deploys before monitor-bridge (everything depends on it) so the mount
  # source exists (else Docker auto-creates it root-owned and the non-root container can't read it).
  ansible.builtin.file:
    path: /var/lib/cloudflare-ip-drift
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy Cloudflare IP drift check script
  tags: [config]
  ansible.builtin.template:
    src: cloudflare-ip-drift.sh.j2
    dest: /usr/local/bin/cloudflare-ip-drift.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0750"
  become: true

- name: Seed the Cloudflare-IP drift state on deploy
  tags: [cron]
  # Run once now so state.json exists + is fresh before the first weekly cron tick — else the
  # cloudflare_drift monitor false-DOWNs on staleness for up to a week on a fresh host (the kopia /
  # docker-user state-seed idiom). failed_when:false so a transient fetch failure at deploy time is
  # the monitor's page, not a deploy blocker.
  ansible.builtin.command: /usr/local/bin/cloudflare-ip-drift.sh
  become: true
  become_user: "{{ sys_user }}"
  changed_when: false
  failed_when: false

- name: Schedule weekly Cloudflare IP drift check
  tags: [cron]
  ansible.builtin.cron:
    name: "Check Cloudflare IP allowlist drift"
    minute: "17"
    hour: "5"
    weekday: "1"
    user: "{{ sys_user }}"
    job: /usr/local/bin/cloudflare-ip-drift.sh
    state: present
