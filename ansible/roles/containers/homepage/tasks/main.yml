- include_tasks: directory.yml
  with_items:
    - "{{ role_name }}/config"
    - "{{ role_name }}/icons"

- name: Copy Icons
  copy:
    src: "{{ item }}"
    dest: "/home/{{ SYS_USER }}/server/containers/{{ role_name }}/icons/{{ item }}"
  with_items:
    - opgg.png
    - tacticstools.png

- name: Copy Config files
  template:
    src: "{{ item }}.j2"
    dest: "/home/{{ SYS_USER }}/server/containers/{{ role_name }}/config/{{ item }}"
  with_items:
    - settings.yaml
    - bookmarks.yaml
    - services.yaml
    - widgets.yaml
    - docker.yaml

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- include_tasks: docker.yml
  vars:
    container: "{{ role_name }}"
