---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "{{ container_item.name }}/icons"

- name: Copy Icons
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/icons/"
    mode: "0664"
  with_fileglob:
    - "*.png"

- name: Copy Config files
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/config/{{ item }}"
    # 0600: services.yaml/widgets.yaml embed service API keys + passwords.
    # Owned by the PUID (1000) the container runs as, so it stays readable.
    mode: "0600"
  with_items:
    - settings.yaml
    - bookmarks.yaml
    - services.yaml
    - widgets.yaml
    - docker.yaml
    - custom.css
  register: homepage_cfg

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # Icons (a separate copy task) are excluded — served at request time, no restart needed.
    common_config_changed: "{{ homepage_cfg is changed }}"
