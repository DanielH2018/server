---
role_deps:
  # No authelia: janitorr is a background service with no web UI and isn't behind the
  # Authelia forward-auth, so it needs no deploy-ordering after it.
  - traefik
  - sonarr
  - radarr
  # jellyfin client is enabled in application.yml (Leaving Soon collection sync); declare it
  # so a cold full deploy orders janitorr after jellyfin. delete:false there keeps it read-only,
  # so this is ordering-correctness, not a hard runtime dependency.
  - jellyfin
