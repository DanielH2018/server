---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "data/media/leaving-soon"

- name: Create application.yml from template
  ansible.builtin.template:
    src: application.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/janitorr/config/application.yml"
    mode: "0755"

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
