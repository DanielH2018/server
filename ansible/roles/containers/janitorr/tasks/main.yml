---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "data/media/leaving-soon"

- name: Create application.yml from template
  ansible.builtin.template:
    src: application.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/janitorr/config/application.yml"
    # 0600: embeds Sonarr/Radarr/Jellyfin API keys. Owned by the PUID the
    # container runs as (user: 1000:1000), so it stays readable.
    mode: "0600"
  register: janitorr_cfg

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    common_config_changed: "{{ janitorr_cfg is changed }}"
