---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/recyclarr/config"

- name: Create recyclarr.yml from template
  tags: [config]
  ansible.builtin.template:
    src: recyclarr.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/recyclarr/recyclarr/config/recyclarr.yml"
    # 0600: embeds Sonarr/Radarr API keys. Owned by the PUID the container
    # runs as (user: 1000:1000), so it stays readable.
    mode: "0600"
  register: recyclarr_cfg

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    common_config_changed: "{{ recyclarr_cfg is changed }}"
