---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}"

- name: Create the node-exporter textfile-collector directory
  tags: [config]
  # Host cron scripts drop Prometheus *.prom gauges here (e.g. kopia-b2-usage.sh writes
  # kopia_b2_billable_bytes for the B2-usage trend graph). node-exporter bind-mounts it read-only
  # at /textfile (--collector.textfile.directory). sys_user-owned so the cron (sys_user) can write;
  # node-exporter reads it as root regardless.
  ansible.builtin.file:
    path: /var/lib/node-exporter-textfile
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Create prometheus.yml from template
  tags: [config]
  # Embeds the HA long-lived bearer token (prometheus_ha_token) for the /api/prometheus
  # scrape, so no_log the task to keep the token out of --diff/console output. Mode stays
  # 0664 (NOT 0640): prometheus runs as `nobody`, which reads this bind-mounted config via
  # the world-read bit — dropping `other` read crashes it on start. The token is SOPS-
  # encrypted at rest; no_log closes the real leak vector (logs).
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/prometheus/prometheus.yml"
    mode: "0664"
  no_log: true
  register: prometheus_cfg

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    common_config_changed: "{{ prometheus_cfg is changed }}"
