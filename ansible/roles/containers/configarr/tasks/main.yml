---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "{{ container_item.name }}/repos"

- name: Create config.yml from template
  tags: [config]
  ansible.builtin.template:
    src: config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/config.yml"
    # 0600: embeds the Sonarr API key. Owned by the PUID the container runs as (1000:1000).
    mode: "0600"
  no_log: true

- name: Render docker-compose.yml
  tags: [deploy]
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml"
    mode: "0600"
  no_log: true

# Configarr is a one-shot reconcile, not a long-running service. `compose up` would leave a
# stopped container lingering in `docker ps -a` between syncs, so instead the role runs it via
# `compose run --rm` — a fresh container that auto-removes on exit. Nothing lingers.
- name: Remove the leftover persistent configarr container (migrated off compose up)
  tags: [deploy]
  community.docker.docker_container:
    name: "{{ container_item.name }}"
    state: absent

- name: Reconcile Sonarr now (fresh --rm container)
  tags: [deploy]
  ansible.builtin.command:
    cmd: >-
      docker compose
      -f /home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml
      run --rm -T {{ container_item.name }}
  changed_when: true

- name: Schedule daily Configarr re-sync (fresh --rm container, nothing lingers)
  tags: [cron]
  ansible.builtin.cron:
    name: "configarr-sync"
    minute: "30"
    hour: "4"
    job: >-
      docker compose
      -f /home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml
      run --rm -T {{ container_item.name }}
      >/dev/null 2>&1 || logger -t configarr-sync 'configarr re-sync failed'
