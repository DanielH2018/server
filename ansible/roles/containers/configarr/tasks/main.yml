---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "{{ container_item.name }}/repos"

- name: Create configarr host-plane directories
  tags: [config]
  # /opt/configarr holds the sync wrapper + its pure core + host_lib; /var/lib/configarr holds the
  # {ts,ok,msg} state.json that monitor-bridge bind-mounts :ro. Created sys_user-owned (the cron +
  # deploy-time reconcile run as sys_user) — deploy configarr before monitor-bridge (meta/deps) so
  # the mount source exists non-root-owned first.
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /opt/configarr, mode: "0750" } # scripts
    - { path: /var/lib/configarr, mode: "0755" } # state.json + monitor-bridge bind source
  become: true

- name: Install configarr sync scripts
  tags: [config]
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/configarr/{{ item }}"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  loop:
    - configarr_sync.py
    - configarr_status.py
  become: true

- name: Install the shared host_lib helper for the configarr sync
  tags: [config]
  # Source of truth in roles/setup/common/files; deployed beside the script so `from host_lib import`
  # resolves the sibling copy (same pattern as the fake-remux cron). Kept 3.12-clean.
  ansible.builtin.copy:
    src: "{{ role_path }}/../../setup/common/files/host_lib.py"
    dest: /opt/configarr/host_lib.py
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Create config.yml from template
  tags: [config]
  ansible.builtin.template:
    src: config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/config.yml"
    # 0600: embeds the Sonarr API key. Owned by the PUID the container runs as (1000:1000).
    mode: "0600"
  no_log: true

- name: Render docker-compose.yml
  tags: [deploy]
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml"
    mode: "0600"
  no_log: true

# Configarr is a one-shot reconcile, not a long-running service. `compose up` would leave a
# stopped container lingering in `docker ps -a` between syncs, so instead the role runs it via
# `compose run --rm` — a fresh container that auto-removes on exit. Nothing lingers.
- name: Remove the leftover persistent configarr container (migrated off compose up)
  tags: [deploy]
  community.docker.docker_container:
    name: "{{ container_item.name }}"
    state: absent

- name: Reconcile now via the sync wrapper (writes state.json)
  tags: [deploy]
  # Runs the one-shot configarr sync through configarr_sync.py so a config change applies on deploy
  # AND the {ts,ok,msg} state file is (re)written every deploy — which doubles as the first-deploy
  # seed, so monitor-bridge's Configarr Sync monitor never false-DOWNs before the first daily tick.
  # The wrapper always exits 0 (records ok=false in state on a sync error), so a transient arr outage
  # pages the monitor instead of failing the play; a real config error is caught by the Task 9 verify.
  ansible.builtin.command:
    cmd: /usr/bin/python3 /opt/configarr/configarr_sync.py
  environment:
    CONFIGARR_COMPOSE: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml"
  changed_when: true

- name: Schedule daily configarr sync (via the state-writing wrapper)
  tags: [cron]
  ansible.builtin.cron:
    name: "configarr-sync"
    minute: "30"
    hour: "4"
    user: "{{ sys_user }}"
    job: >-
      CONFIGARR_COMPOSE=/home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml
      /usr/bin/python3 /opt/configarr/configarr_sync.py
      >/dev/null 2>&1 || logger -t configarr-sync 'configarr sync wrapper failed'
    state: present
  become: true
