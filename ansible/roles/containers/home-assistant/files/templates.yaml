---
# Managed by Ansible (roles/containers/home-assistant/files/templates.yaml).
# Source of truth — copied to ./config (NOT templated: HA's {{ }} Jinja would be mangled by
# Ansible's templater) and included via `template: !include templates.yaml` in configuration.yaml.
# HA UI edits are NOT persistent. To change, edit this file and redeploy home-assistant.
#
# Dynamic morning wake: the wake ramp starts 15 min before the real alarm and continues 30 min AFTER
# it — a 45-min window (the alarm sits 1/3 in, not centered). Source is the WATCH alarm
# (sensor.pixel_watch_3_next_alarm) — the phone's next_alarm is unreliable. This timestamp sensor
# (alarm - 15 min) is the SINGLE source of truth for the wake window [wake_start, wake_start+45 min):
# the bedroom_morning_reset time trigger fires on it (ramp start), and bedroom_apply_natural's wake
# exception, bedroom_wake_ramp, and bedroom_presence_on's window all read it (inherently in sync). The
# availability guard makes it `unavailable` unless the next alarm is a MORNING alarm (local hour
# 03:00-11:00) — so a nap/evening alarm never arms the trigger or ramps the lights, and no alarm =
# no wake (the 09:00 fallback in bedroom_morning_reset still clears overnight overrides).
- sensor:
    - name: "Bedroom wake start"
      unique_id: bedroom_wake_start
      device_class: timestamp
      # `> now() - 2h` rejects a STALE past alarm: a Wear OS next_alarm can hold an already-fired
      # alarm for hours (seen 2026-07-01 — the watch held the prior morning's 06:00 all night,
      # so this sensor pointed at a PAST time and the `at:` wake trigger had nothing to fire on).
      # The hour guard alone (3-11) passed that stale value; require it to be recent too so a
      # lagging watch makes this `unavailable` (fallback handles it) instead of masquerading.
      # BUG (2026-07-02, fixed same day): a bare `> now()` rejects the CURRENT morning's own alarm
      # the instant it rings — i.e. 15 min into every 45-min ramp window (window = alarm-15 to
      # alarm+30, so `now() > na` becomes true at exactly elapsed=15, not at window close). That
      # broke bedroom_wake_ramp (elapsed fell back to the -1 sentinel, so in_window/release_due were
      # both permanently false for the rest of the window) and stranded Adaptive Lighting's
      # manual_control (the hand-off release never ran). The 2-hour grace comfortably covers the
      # ramp + its bounded [45,90)-min catch-up release window (in_wake_release_window in
      # lighting.jinja) while still catching a genuinely stale (many-hours/overnight) alarm.
      availability: >-
        {% set na = states('sensor.pixel_watch_3_next_alarm') %}
        {{ na not in ['unknown', 'unavailable', 'none', ''] and as_datetime(na) > now() - timedelta(hours=2) and 3 <= (as_datetime(na) | as_local).hour < 11 }}
      state: >-
        {{ (as_datetime(states('sensor.pixel_watch_3_next_alarm')) - timedelta(minutes=15)).isoformat() }}

# Wind-down anchor: the bedtime PROMPT fires 8 h before the next MORNING alarm (target sleep ~8h),
# so it tracks the real schedule instead of a fixed clock. Same morning-alarm hour guard as
# bedroom_wake_start (local hour 03:00-11:00), so a nap/evening alarm never arms it. For a 6:00am
# alarm this resolves to 10:00pm. No alarm -> unavailable, and the prompt's 22:30 fallback covers it.
#
# The future-alarm guard DIFFERS from bedroom_wake_start ON PURPOSE. wake_start uses `> now() - 2h`
# because it anchors an IN-FLIGHT 45-min ramp + [45,90)-min AL-release window, so its availability
# must outlive the WINDOW (a bare `> now()` killed the ramp the instant the alarm rang — the
# 2026-07-02 bug). This sensor is a ONE-SHOT anchor with NO post-fire window (the prompt fires once,
# 8h before the alarm), so a bare `as_datetime(na) > now()` is correct: a lagging Wear OS next_alarm
# holding an ALREADY-FIRED (past) alarm makes this `unavailable`, so the prompt's 22:30 fallback fires
# instead of a dead dynamic `at:` on a past time (the 2026-07-01 stale-alarm case).
# NOTE: `> now()` on the ALARM does NOT cover the "alarm is future but its winddown is ALREADY PAST"
# case (an alarm set AFTER alarm-8h has passed, e.g. a 06:00 alarm created at 23:00 -> winddown 22:00,
# past). The sensor stays `available` with a past value, so the dynamic `at:` can't fire on it; that
# case is handled automation-side by bedroom_bedtime_prompt's fallback gate (its
# `as_datetime(winddown) < now()` term), NOT here.
- sensor:
    - name: "Bedroom winddown start"
      unique_id: bedroom_winddown_start
      device_class: timestamp
      availability: >-
        {% set na = states('sensor.pixel_watch_3_next_alarm') %}
        {{ na not in ['unknown', 'unavailable', 'none', ''] and as_datetime(na) > now() and 3 <= (as_datetime(na) | as_local).hour < 11 }}
      state: >-
        {{ (as_datetime(states('sensor.pixel_watch_3_next_alarm')) - timedelta(hours=8)).isoformat() }}

# UPS power (W) — the NUT integration only exposes ups.load as a PERCENTAGE; the Energy dashboard
# needs energy (kWh), which requires power (W) first. Derive it from the load % and the UPS's rated
# real-power output: power = load% / 100 * realpower.nominal. The 900 W is ups.realpower.nominal read
# off the NUT server for this exact unit (APC Back-UPS RS 1500MS2) — change it if the UPS is swapped.
# This feeds the `integration` (Riemann-sum) sensor.ups_energy in configuration.yaml.j2, which is what
# the Energy dashboard consumes. NB: a Back-UPS reports load in coarse % steps, so this is a good
# estimate, not metered accuracy.
- sensor:
    - name: "UPS Power"
      unique_id: ups_power
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      availability: >-
        {{ states('sensor.apc_ups_load') not in ['unknown', 'unavailable'] }}
      state: >-
        {{ (states('sensor.apc_ups_load') | float(0) / 100 * 900) | round(1) }}

- binary_sensor:
    - name: "APC UPS Replace Battery"
      unique_id: apc_ups_replace_battery
      device_class: problem
      # The UPS's own self-test verdict: NUT sets the RB (Replace Battery) flag in ups.status
      # (sensor.apc_ups_status_data, a space-separated flag list) when a periodic self-test fails.
      # Kept strictly on/off (falls back to 'off' when the source is unavailable/unknown) so HA's
      # Prometheus scrape always exports hass_binary_sensor_state for it while HA is up — its absence
      # then means the whole HA scrape is down, which monitor-bridge's check_ups treats as a defer
      # (not a silent single-arm drop). Read by monitor-bridge (UPS_REPLACE_QUERY) for the
      # Kuma->Discord channel; the ups_power_event automation covers the HA-mobile-push channel.
      state: >-
        {{ 'RB' in (states('sensor.apc_ups_status_data') or '').split() }}

# Auto-light gate: the SINGLE source of truth for "is it dark enough (or the morning wake window) to
# put the bedroom lights on automatically" — illuminance < 75 OR inside the wake window
# [wake_start, +45min] (inherited from in_wake_window). Referenced by bedroom_presence_on (its darkness condition),
# bedroom_apply_natural_gated, and the Tap Dial Button-4 sleep-exit (which checks it `off` to suppress
# Adaptive Lighting's self-on in a bright room). Tune the 75-lux threshold / window here, in ONE place.
- binary_sensor:
    - name: "Bedroom auto-light allowed"
      unique_id: bedroom_auto_light_allowed
      state: >-
        {% set ws = states('sensor.bedroom_wake_start') %}
        {% from 'lighting.jinja' import in_wake_window, auto_light_allowed %}
        {% set in_window = in_wake_window((now() - as_datetime(ws)).total_seconds() / 60 if ws not in ['unknown', 'unavailable'] else -1) | bool %}
        {{ auto_light_allowed(in_window, states('sensor.aqara_fp300_illuminance')) }}

# Air-purifier overnight HOLD: "on" from bedtime through the END of the morning wake ramp, so the
# air-purifier plug (automation.bedroom_air_purifier_presence) is NOT cut by the FP300 dropping a
# motionless sleeper (the documented false-absence — see role CLAUDE.md / [[ha-fp300-fan-false-hold]]).
# sleep_mode (set by script.bedroom_bedtime, cleared by the morning reset) covers bedtime -> wake_start;
# in_wake_window covers wake_start -> +45 min. The two are gap-free, so this is one continuous hold from
# lights-out until the wake routine finishes. Composes the SAME pieces as bedroom_auto_light_allowed
# above. now() => HA re-renders this ~every minute, so it flips off within ~1 min of the window ending.
- binary_sensor:
    - name: "Bedroom purifier hold"
      unique_id: bedroom_purifier_hold
      state: >-
        {% set ws = states('sensor.bedroom_wake_start') %}
        {% from 'lighting.jinja' import in_wake_window %}
        {% set in_window = in_wake_window((now() - as_datetime(ws)).total_seconds() / 60 if ws not in ['unknown', 'unavailable'] else -1) | bool %}
        {{ is_state('input_boolean.bedroom_sleep_mode', 'on') or in_window }}
