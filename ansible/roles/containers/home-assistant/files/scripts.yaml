---
# Managed by Ansible (roles/containers/home-assistant/files/scripts.yaml).
# Source of truth — copied to ./config and overwritten on deploy. HA UI script edits are
# NOT persistent. To change, edit this file and run:
#   uv run ansible-playbook ansible/deploy.yml --tags "home-assistant"
#
# These scripts define the bedroom lights' "natural" state: what they would be with no manual
# intervention. Adaptive Lighting (AL) is the default governor (sun-curve color + brightness);
# time-based EXCEPTIONS override brightness only inside their window. Button 4 on the Tap Dial
# and the morning reset both call bedroom_apply_natural, so the ramp math lives in one place.

# Helper: apply AL's natural COLOR temp, then set a caller-chosen brightness over a transition.
# Every exception calls this so the AL release + color-apply boilerplate lives in exactly one
# place — a new exception never has to touch Adaptive Lighting service syntax.
bedroom_set_natural_brightness:
  alias: "Bedroom — set brightness with natural color"
  description: >-
    Release Adaptive Lighting, apply its natural color temperature, then set the
    caller-supplied brightness over a transition. Used by bedroom_apply_natural's exceptions.
  mode: restart
  fields:
    brightness_pct:
      description: Target brightness percent (0-100).
      required: true
      example: 24
    transition:
      description: Fade duration in seconds.
      required: true
      example: 480
  sequence:
    # Release manual control so adaptive_lighting.apply takes effect.
    - service: adaptive_lighting.set_manual_control
      data:
        entity_id: switch.bedroom_adaptive_lighting_bedroom
        manual_control: false
    # Natural COLOR temp only — leave brightness for the explicit turn_on below.
    - service: adaptive_lighting.apply
      data:
        entity_id: switch.bedroom_adaptive_lighting_bedroom
        adapt_color: true
        adapt_brightness: false
        turn_on_lights: true
        transition: 1
    # Caller's brightness over their fade. The explicit brightness re-marks the group as
    # manually controlled (AL take_over_control), so AL pauses for the exception's duration.
    - service: light.turn_on
      target:
        entity_id: light.bedroom_lights
      data:
        brightness_pct: "{{ brightness_pct | int }}"
        transition: "{{ transition | int }}"

# Dispatcher: set the bedroom lights to their natural state for RIGHT NOW. Ordered choose: of
# time-based exceptions, with full Adaptive Lighting (color + brightness) as the default.
# This is the single source of truth for "what is natural".
#
# To ADD a future exception, drop a block above `default:`:
#   - conditions:
#       - condition: template
#         value_template: "{{ now() >= today_at('21:00') and now() < today_at('21:30') }}"
#     sequence:
#       - service: script.bedroom_set_natural_brightness
#         data: {brightness_pct: 15, transition: 5}   # flat; a ramp computes these from now()
bedroom_apply_natural:
  alias: "Bedroom — apply natural lighting state"
  description: >-
    Set the bedroom lights to what they would be with no manual intervention: a time-based
    exception's brightness on AL's natural color, or full Adaptive Lighting outside every window.
  mode: restart
  sequence:
    - choose:
        # Exception: night-time "got up" dim nightlight. While in sleep mode (set at bedtime) OR
        # deep night (00:00-05:00), a presence re-trigger gives the warm dim scene.bedroom_nightlight
        # instead of full lighting — so walking back into a dark room at night doesn't blast you.
        # FIRST (above the wake ramp) so it wins overnight; at wake time the morning reset has already
        # cleared sleep_mode and the hour is >= 5, so this is false and the ramp below runs instead.
        - conditions:
            - condition: template
              value_template: >-
                {{ is_state('input_boolean.bedroom_sleep_mode', 'on') or now().hour < 5 }}
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.bedroom_nightlight
        # Exception: morning wake ramp — 15 min, 1% -> 50%, ENDING at the real alarm. The window
        # start is sensor.bedroom_wake_start (alarm - 15 min, morning-only — see configuration.yaml).
        # elapsed=0 yields 1% over 900s; pressed partway through, it resumes from the current point
        # over the remaining time. When no morning alarm is set the sensor is unavailable -> this
        # exception is false and the default (full AL) applies. SINGLE source of truth for the wake
        # window — bedroom_presence_on's window reads the same sensor (no duplicated formula).
        - conditions:
            - condition: template
              value_template: >-
                {% set ws = states('sensor.bedroom_wake_start') %}
                {{ ws not in ['unknown', 'unavailable'] and 0 <= (now() - as_datetime(ws)).total_seconds() < 900 }}
          sequence:
            - variables:
                wake_elapsed: "{{ (now() - as_datetime(states('sensor.bedroom_wake_start'))).total_seconds() }}"
            - service: script.bedroom_set_natural_brightness
              data:
                brightness_pct: "{{ (1 + (50 - 1) * wake_elapsed / 900) | round(0) | int }}"
                transition: "{{ (900 - wake_elapsed) | round(0) | int }}"
      # Default: full Adaptive Lighting — natural color AND brightness from the sun curve.
      default:
        - service: adaptive_lighting.set_manual_control
          data:
            entity_id: switch.bedroom_adaptive_lighting_bedroom
            manual_control: false
        - service: adaptive_lighting.apply
          data:
            entity_id: switch.bedroom_adaptive_lighting_bedroom
            turn_on_lights: true
            transition: 1

# Air-quality alert pulse: a brief red flash to flag bad air, then restore EXACTLY what was
# showing. Snapshots the current light state into a throwaway scene, flashes red, and restores
# the snapshot — so a manual scene / the morning ramp / Adaptive Lighting all come back intact
# (vs. forcing AL and clobbering a chosen scene). Caller (bedroom_air_quality_alert) gates this
# on the lights already being on and calls it as a blocking service, so calls serialize and the
# snapshot can never capture the red pulse itself. mode: single is belt-and-suspenders on that.
bedroom_alert_pulse:
  alias: "Bedroom — air-quality alert pulse"
  description: >-
    Snapshot the bedroom lights, flash red for ~2s to flag bad air quality, then restore the
    snapshot. Only meaningful when the lights are already on (the caller enforces that), so it
    never wakes you and never fights Adaptive Lighting at night.
  mode: single
  sequence:
    - service: scene.create
      data:
        scene_id: bedroom_pre_alert
        snapshot_entities:
          - light.bedroom_lights
    - service: light.turn_on
      target:
        entity_id: light.bedroom_lights
      data:
        rgb_color: [255, 0, 0]
        brightness_pct: 60
        transition: 0.3
    - delay: "00:00:02"
    - service: scene.turn_on
      target:
        entity_id: scene.bedroom_pre_alert
      data:
        transition: 0.5

# Fan: set the DREO tower fan to its target speed for the CURRENT temperature + time. Single source
# of truth for the temperature->band mapping, the 0.5°F hysteresis deadband, and the 22:00-06:00
# night cap (Medium max). Works in the fan's 9 discrete LEVELS, not raw %, because the DREO
# integration math.ceil()s a requested % up to the next level (so e.g. "67%" would land on level 7
# = 77%). Callers (bedroom_fan_temperature, the morning reset, Tap Dial button 3) gate on the
# bedroom_fan_manual override themselves — this just applies the right level, and only commands the
# fan when the target level actually differs (avoids churn + self-echo manual-detects).
bedroom_apply_fan:
  alias: "Bedroom — apply temperature fan state"
  description: >-
    Set fan.tower_fan from sensor.bedroom_airgradient_one_temperature (°F): off <72 / Low 72-74 /
    Medium 74-76 / High >=76, mapped to fan levels 2/4/6 (22/44/67%), with a 0.5°F deadband and a
    Medium cap during 22:00-06:00.
  mode: restart
  sequence:
    - variables:
        # Temperature (°F; -1 if the sensor is unavailable).
        t: "{{ states('sensor.bedroom_airgradient_one_temperature') | float(-1) }}"
        # Band -> fan LEVEL (DREO has 9): [off, Low, Medium, High]. TUNE SPEEDS HERE; if you change
        # these, also update the cb midpoints below to the midpoints of this list.
        levels: "{{ [0, 2, 4, 6] }}"
        # The fan's current level (0 if off) from its reported %, and the band index that implies
        # (midpoints of levels [0,2,4,6] = 1,3,5).
        cur_pct: "{{ state_attr('fan.tower_fan', 'percentage') | float(0) if is_state('fan.tower_fan', 'on') else 0 }}"
        cur_level: "{{ (cur_pct * 9 / 100) | round | int }}"
        cb: "{{ (0 if cur_level < 1 else (1 if cur_level < 3 else (2 if cur_level < 5 else 3))) | int }}"
        # Pure rising band, then 0.5°F deadband: rise jumps straight there; only step DOWN once
        # the temp is 0.5°F below the current band's lower edge (cb>=1 in that branch, so index ok).
        abs_band: "{{ (3 if t >= 76 else (2 if t >= 74 else (1 if t >= 72 else 0))) | int }}"
        band_raw: "{{ (abs_band if abs_band >= cb else (abs_band if t < [71.5, 73.5, 75.5][cb - 1] else cb)) | int }}"
        is_night: "{{ now().hour >= 22 or now().hour < 6 }}"
        # Quiet caps on the band INDEX (0 off / 1 Low / 2 Medium / 3 High): sleep mode (set at
        # bedtime) -> Low; the 22:00-06:00 night window -> Medium; otherwise uncapped. Still
        # temperature-responsive (band_raw is computed from temp) — only the ceiling drops.
        sleep: "{{ is_state('input_boolean.bedroom_sleep_mode', 'on') }}"
        cap: "{{ (1 if sleep else (2 if is_night else 3)) | int }}"
        band: "{{ [band_raw, cap] | min | int }}"
        target_level: "{{ levels[band] }}"
        # % to SEND to hit target_level despite the integration's ceil: the midpoint of the level's
        # range ((L-0.5)/9*100) ceils to exactly L. 0 = off.
        send_pct: "{{ (((target_level - 0.5) * 100 / 9) | round | int) if target_level > 0 else 0 }}"
    # Sensor unavailable (t < 0) → do nothing rather than switch the fan off.
    - condition: template
      value_template: "{{ t >= 0 }}"
    # Record the level we're about to command BEFORE issuing it, so bedroom_fan_manual_detect can
    # tell our own (parent-less) cloud echo from a real manual change.
    - service: input_number.set_value
      target:
        entity_id: input_number.bedroom_fan_expected_level
      data:
        value: "{{ target_level }}"
    - choose:
        # OFF band — turn the fan off only if it is currently on.
        - conditions: "{{ band == 0 }}"
          sequence:
            - if: "{{ is_state('fan.tower_fan', 'on') }}"
              then:
                - service: fan.turn_off
                  target:
                    entity_id: fan.tower_fan
      # On bands — set the speed only if the current level differs from the target.
      default:
        - if: "{{ not is_state('fan.tower_fan', 'on') or (cur_level != target_level) }}"
          then:
            - service: fan.turn_on
              target:
                entity_id: fan.tower_fan
            - service: fan.set_percentage
              target:
                entity_id: fan.tower_fan
              data:
                percentage: "{{ send_pct }}"

# Bedtime / sleep routine: the single "going to sleep" action, shared by the bedroom_bedtime
# automation (phone Bedtime mode) and the Tap Dial button-1 hold. Engages sleep mode (which caps the
# fan to Low via bedroom_apply_fan — quiet but still temperature-responsive, NOT frozen), flips
# Adaptive Lighting into sleep mode (warm/dim), and sets the warm nightlight scene. The morning reset
# unwinds sleep mode + AL sleep mode. NOT gated on presence (sets the room up for sleep even if you're
# brushing teeth); the caller gates on person==home so it never runs while away.
bedroom_bedtime:
  alias: "Bedroom — bedtime / sleep routine"
  description: >-
    Engage sleep mode (quiet fan cap), Adaptive Lighting sleep mode, and the warm nightlight scene.
    Keeps the fan temperature-responsive but quiet; does not freeze it.
  mode: single
  sequence:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_sleep_mode
    - service: switch.turn_on
      target:
        entity_id: switch.adaptive_lighting_bedroom_adaptive_lighting_sleep_mode_bedroom
    - service: scene.turn_on
      target:
        entity_id: scene.bedroom_nightlight
    # Re-apply the fan so the Low sleep cap takes effect now, not at the next temperature change.
    # Gated on the manual-fan override like every other apply_fan caller (a hand-set fan wins).
    - if: "{{ is_state('input_boolean.bedroom_fan_manual', 'off') }}"
      then:
        - service: script.bedroom_apply_fan
