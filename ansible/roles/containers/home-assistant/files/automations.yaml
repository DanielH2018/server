---
# Managed by Ansible (roles/containers/home-assistant/files/automations.yaml).
# Source of truth — copied to ./config and overwritten on deploy. HA UI automation edits
# are NOT persistent. To change, edit this file and run:
#   uv run ansible-playbook ansible/deploy.yml --tags "home-assistant"
#
# Trigger topic is the Hue Tap Dial's (RDM002) IEEE address — Z2M publishes one JSON blob
# per device on zigbee2mqtt/<friendly_name> (default output: json), so we read .action from
# the payload. If the dial is later renamed in Z2M, update the topic to the new name.
- id: bedroom_tap_dial_control
  alias: Bedroom Tap Dial control
  description: Hue Tap Dial (RDM002, 0x001788010f0ccda4) controls the Bedroom Lights group.
  mode: queued
  max: 10
  trigger:
    - platform: mqtt
      topic: zigbee2mqtt/0x001788010f0ccda4
  action:
    - choose:
        # Button 1 = smart toggle. Turning the group OFF here engages the manual-off override
        # (presence won't re-on); turning it ON clears the override (back to auto).
        - conditions: "{{ trigger.payload_json.action == 'button_1_press' }}"
          sequence:
            - if: "{{ is_state('light.bedroom_lights', 'on') }}"
              then:
                - service: light.turn_off
                  target:
                    entity_id: light.bedroom_lights
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.bedroom_manual_off
              else:
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ trigger.payload_json.action == 'button_2_press' }}"
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.bedroom_bright
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ trigger.payload_json.action == 'button_3_press' }}"
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.bedroom_relax
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        # Button 4 = reset to the NATURAL state for right now. The dispatcher script picks the
        # active time-based exception (e.g. the morning wake ramp) or full Adaptive Lighting as
        # the default — single source of truth. See files/scripts.yaml.
        - conditions: "{{ trigger.payload_json.action == 'button_4_press' }}"
          sequence:
            - service: script.bedroom_apply_natural
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ 'dial_rotate_right' in (trigger.payload_json.action | string) }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                brightness_step_pct: 12
                transition: 0.2
        - conditions: "{{ 'dial_rotate_left' in (trigger.payload_json.action | string) }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                brightness_step_pct: -12
                transition: 0.2

# Presence ON: occupied + not overridden → set the lights to their NATURAL state via the
# dispatcher (morning ramp in-window, else full Adaptive Lighting). The lux gate applies OUTSIDE
# the morning wake window only: during the window (06:00 Mon-Fri / 07:00 Sat-Sun, 15 min) we wake
# regardless of ambient light; afterwards we only turn on when the room is dim. The window formula
# mirrors the dispatcher's first exception in files/scripts.yaml — keep the two in sync.
- id: bedroom_presence_on
  alias: Bedroom presence on
  description: When the room becomes occupied, set the lights to their natural state (unless overridden); gate on darkness outside the morning wake window.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.bedroom_manual_off
      state: "off"
    - condition: template
      value_template: >-
        {% set start = today_at('06:00') if now().weekday() < 5 else today_at('07:00') %}
        {% set in_window = 0 <= (now() - start).total_seconds() < 900 %}
        {{ in_window or (states('sensor.aqara_fp300_illuminance') | float(9999) < 50) }}
  action:
    - service: script.bedroom_apply_natural

# Absence OFF: room empty for a minute → lights off (ignores the override — leaving always allows off).
- id: bedroom_absence_off
  alias: Bedroom absence off
  description: Turn off the bedroom lights after the room has been empty for a minute.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "off"
      for: "00:01:00"
  action:
    - service: light.turn_off
      target:
        entity_id: light.bedroom_lights

# Morning reset + gentle wake. 06:00 Mon-Fri / 07:00 Sat-Sun: always clear the manual-off
# override (so a stuck/overnight override resets); if present, fade the lights up over 15 min.
- id: bedroom_morning_reset
  alias: Bedroom morning reset and wake
  description: 06:00 Mon-Fri / 07:00 Sat-Sun — clear the manual-off override; gently wake if present.
  mode: single
  trigger:
    - platform: time
      at: "06:00:00"
      id: weekday
    - platform: time
      at: "07:00:00"
      id: weekend
  condition:
    - condition: or
      conditions:
        - "{{ trigger.id == 'weekday' and now().weekday() < 5 }}"
        - "{{ trigger.id == 'weekend' and now().weekday() >= 5 }}"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_manual_off
    - if: "{{ is_state('binary_sensor.aqara_fp300_presence', 'on') }}"
      then:
        # Gentle wake via the natural-state dispatcher: at 06:00/07:00 it computes elapsed=0,
        # i.e. 1% brightness over a 900 s (15 min) ramp to 50% on AL's natural color. Same
        # source of truth as the Tap Dial button-4 reset — see files/scripts.yaml.
        - service: script.bedroom_apply_natural

# Air-quality alert: any pollutant threshold binary-sensor (CO2/PM2.5/VOC/NOx — the `threshold`
# sensors in configuration.yaml.j2) crossing into "bad" sends a phone notification and, ONLY if
# the lights are already on, a brief red pulse (script.bedroom_alert_pulse). A recovery notice
# fires when it clears. Hysteresis lives in the threshold sensors, so this just reacts to
# off<->on edges. Triggers anchor on off<->on (NOT unknown): an HA restart while air is bad
# doesn't re-alert, and an unavailable source can't false-alert. The message is derived
# generically from the triggering sensor, so a new pollutant only needs its binary_sensor added
# to BOTH trigger entity_id lists below.
- id: bedroom_air_quality_alert
  alias: Bedroom air quality alert
  description: Notify (and pulse the lights if on) when CO2/PM2.5/VOC/NOx crosses its threshold; recovery notice when it clears.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
        - binary_sensor.bedroom_nox_high
      from: "off"
      to: "on"
      for: "00:00:30"
      id: bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
        - binary_sensor.bedroom_nox_high
      from: "on"
      to: "off"
      for: "00:00:30"
      id: recovery
  action:
    # Derive everything from the triggering threshold sensor — no per-pollutant map. A threshold
    # sensor's `entity_id` attribute points at its SOURCE sensor, so we read the live value/unit
    # from there and the human label from the threshold sensor's own friendly name.
    - variables:
        src: "{{ trigger.to_state.attributes.entity_id }}"
        label: "{{ trigger.to_state.attributes.friendly_name | replace(' high', '') }}"
        value: "{{ states(src) }}"
        unit: "{{ state_attr(src, 'unit_of_measurement') or '' }}"
        tag: "air_quality_{{ trigger.entity_id }}"
    - choose:
        - conditions: "{{ trigger.id == 'bad' }}"
          sequence:
            - service: notify.mobile_app_pixel_9_pro
              data:
                title: "⚠️ Air quality"
                message: "{{ label }} is {{ value }}{{ ' ' ~ unit if unit else '' }}"
                # Same tag for bad + recovery → the recovery replaces the alert on the phone.
                data:
                  tag: "{{ tag }}"
            # Light pulse only when the lights are already on (operator present/awake) — never
            # wakes you and never fights Adaptive Lighting / the manual-off override at night.
            - if: "{{ is_state('light.bedroom_lights', 'on') }}"
              then:
                - service: script.bedroom_alert_pulse
      # off<->on edges only, so the remaining case (id == 'recovery') is the default.
      default:
        - service: notify.mobile_app_pixel_9_pro
          data:
            title: "✅ Air quality"
            message: "{{ label }} back to normal ({{ value }}{{ ' ' ~ unit if unit else '' }})"
            data:
              tag: "{{ tag }}"
