---
# Managed by Ansible (roles/containers/home-assistant/files/automations.yaml).
# Source of truth — copied to ./config and overwritten on deploy. HA UI automation edits
# are NOT persistent. To change, edit this file and run:
#   uv run ansible-playbook ansible/deploy.yml --tags "home-assistant"
#
# Trigger topic is the Hue Tap Dial's (RDM002) IEEE address — Z2M publishes one JSON blob
# per device on zigbee2mqtt/<friendly_name> (default output: json), so we read .action from
# the payload. If the dial is later renamed in Z2M, update the topic to the new name.
- id: bedroom_tap_dial_control
  alias: Bedroom Tap Dial control
  description: Hue Tap Dial (RDM002, 0x001788010f0ccda4) controls the Bedroom Lights group.
  mode: queued
  max: 10
  trigger:
    - platform: mqtt
      topic: zigbee2mqtt/0x001788010f0ccda4
  action:
    - choose:
        # Button 1 HOLD = bedtime / sleep routine — the manual fallback for phone Bedtime mode.
        - conditions: "{{ trigger.payload_json.action == 'button_1_hold' }}"
          sequence:
            - service: script.bedroom_bedtime
        # Button 1 = smart toggle. Turning the group OFF here engages the manual-off override
        # (presence won't re-on); turning it ON clears the override (back to auto).
        - conditions: "{{ trigger.payload_json.action == 'button_1_press' }}"
          sequence:
            - if: "{{ is_state('light.bedroom_lights', 'on') }}"
              then:
                - service: light.turn_off
                  target:
                    entity_id: light.bedroom_lights
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.bedroom_manual_off
              else:
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ trigger.payload_json.action == 'button_2_press' }}"
          sequence:
            - service: scene.turn_on
              target:
                entity_id: scene.bedroom_bright
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        # Button 3 = reset the FAN to automatic: clear the fan override, then apply the
        # temperature band for right now (night-cap aware). Does not touch the lights. The
        # bedroom_relax scene stays defined in scenes.yaml but is no longer bound to the dial.
        - conditions: "{{ trigger.payload_json.action == 'button_3_press' }}"
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_fan_manual
            - service: script.bedroom_apply_fan
        # Button 4 = reset to the NATURAL state for right now. The dispatcher script picks the
        # active time-based exception (e.g. the morning wake ramp) or full Adaptive Lighting as
        # the default — single source of truth. See files/scripts.yaml.
        - conditions: "{{ trigger.payload_json.action == 'button_4_press' }}"
          sequence:
            - service: script.bedroom_apply_natural
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ 'dial_rotate_right' in (trigger.payload_json.action | string) }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                brightness_step_pct: 12
                transition: 0.2
        - conditions: "{{ 'dial_rotate_left' in (trigger.payload_json.action | string) }}"
          sequence:
            - service: light.turn_on
              target:
                entity_id: light.bedroom_lights
              data:
                brightness_step_pct: -12
                transition: 0.2

# Presence ON: occupied + not overridden → set the lights to their NATURAL state via the
# dispatcher (morning ramp in-window, else full Adaptive Lighting). The lux gate applies OUTSIDE
# the morning wake window only: during the window (the 15 min before the real alarm, ending at it)
# we wake regardless of ambient light; afterwards we only turn on when the room is dim. The window
# reads sensor.bedroom_wake_start — the SAME source the dispatcher's morning exception uses
# (inherently in sync, no duplicated formula).
- id: bedroom_presence_on
  alias: Bedroom presence on
  description: When the room becomes occupied, set the lights to their natural state (unless overridden); gate on darkness outside the morning wake window.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.bedroom_manual_off
      state: "off"
    # Only auto-light when someone is actually home — an FP300 radar false-positive must not
    # light an empty house while away. The arrive nudge re-checks lights on return.
    - condition: state
      entity_id: person.daniel
      state: "home"
    - condition: template
      value_template: >-
        {% set ws = states('sensor.bedroom_wake_start') %}
        {% set in_window = ws not in ['unknown', 'unavailable'] and 0 <= (now() - as_datetime(ws)).total_seconds() < 900 %}
        {{ in_window or (states('sensor.aqara_fp300_illuminance') | float(9999) < 50) }}
  action:
    - service: script.bedroom_apply_natural

# Absence OFF: room empty for a minute → lights off (ignores the override — leaving always allows off).
- id: bedroom_absence_off
  alias: Bedroom absence off
  description: Turn off the bedroom lights after the room has been empty for a minute.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "off"
      for: "00:01:00"
  action:
    - service: light.turn_off
      target:
        entity_id: light.bedroom_lights

# Morning reset + gentle wake, driven by the REAL alarm. The `alarm` trigger fires at
# sensor.bedroom_wake_start (watch alarm - 15 min, morning-only — see configuration.yaml); the
# `fallback` at 09:00 guarantees the overnight overrides clear even on a no-alarm day. Both clear the
# overrides (manual-off, fan-manual, sleep mode, AL sleep) and re-apply the fan if home; only the
# `alarm` trigger runs the wake ramp (the fallback never forces lights, so it can't clobber a scene
# you set after waking). The alarm encodes the day, so the old weekday/weekend split is gone.
- id: bedroom_morning_reset
  alias: Bedroom morning reset and wake
  description: At the alarm (wake ramp) + a 09:00 fallback (hygiene) — clear overnight overrides; gently wake if present.
  mode: single
  trigger:
    - platform: time
      at: sensor.bedroom_wake_start
      id: alarm
    - platform: time
      at: "09:00:00"
      id: fallback
  action:
    # Daily hygiene (BOTH triggers): clear every overnight override so sleep state / manual-off can't
    # persist into the day. One turn_off over the list covers all three input_booleans.
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.bedroom_manual_off
          - input_boolean.bedroom_fan_manual
          - input_boolean.bedroom_sleep_mode
    - service: switch.turn_off
      target:
        entity_id: switch.adaptive_lighting_bedroom_adaptive_lighting_sleep_mode_bedroom
    # Re-apply the fan now the sleep cap is cleared — only when home (this calls the fan script
    # DIRECTLY, bypassing bedroom_fan_temperature's home gate).
    - if: "{{ is_state('person.daniel', 'home') }}"
      then:
        - service: script.bedroom_apply_fan
    # Wake ramp: ONLY on the alarm trigger and only if present. apply_natural's morning exception
    # (window = sensor.bedroom_wake_start .. +15 min) computes the 1%->50% ramp — same source of
    # truth as the Tap Dial button-4 reset. The 09:00 fallback deliberately never forces lights.
    - if: "{{ trigger.id == 'alarm' and is_state('binary_sensor.aqara_fp300_presence', 'on') }}"
      then:
        - service: script.bedroom_apply_natural

# Unified threshold alert engine: ALL `threshold` binary-sensors in configuration.yaml.j2 (air
# quality CO2/PM2.5/VOC/NOx + the SEVERE tier, battery FP300/Tap Dial, humidity high/low) feed this
# ONE automation. Hysteresis lives in the threshold sensors, so this just reacts to off<->on edges,
# anchored on off<->on (NOT unknown) so an HA restart while bad doesn't re-alert and an unavailable
# source can't false-alert (sensor-offline owns offline). The category is encoded in each trigger id
# (<category>_bad / <category>_ok); everything else is derived generically from the triggering
# sensor. Per-category differences live in the `cfg` map: title, `pulse` (light flash, air quality
# only), `watch` (wrist buzz), `pierce` (sound through DND — severe air quality only), `recovery`
# (whether to send a "back to normal" notice). All notify routes through script.bedroom_notify
# (DND/sleep-aware channel + importance + watch mirroring). Adding a metric = one threshold sensor +
# add it to its category's two trigger lists; a NEW category = two trigger blocks + one `cfg` entry.
- id: bedroom_threshold_alert
  alias: Bedroom threshold alert
  description: Notify when any air-quality/battery/humidity threshold crosses; recovery when it clears; pulse the lights for air quality only.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
        - binary_sensor.bedroom_nox_high
      from: "off"
      to: "on"
      for: "00:00:30"
      id: airquality_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
        - binary_sensor.bedroom_nox_high
      from: "on"
      to: "off"
      for: "00:00:30"
      id: airquality_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_severe
        - binary_sensor.bedroom_pm2_5_severe
        - binary_sensor.bedroom_voc_severe
        - binary_sensor.bedroom_nox_severe
      from: "off"
      to: "on"
      for: "00:00:30"
      id: airqualitysevere_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_severe
        - binary_sensor.bedroom_pm2_5_severe
        - binary_sensor.bedroom_voc_severe
        - binary_sensor.bedroom_nox_severe
      from: "on"
      to: "off"
      for: "00:00:30"
      id: airqualitysevere_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_fp300_battery_low
        - binary_sensor.bedroom_tap_dial_battery_low
      from: "off"
      to: "on"
      for: "00:01:00"
      id: battery_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_fp300_battery_low
        - binary_sensor.bedroom_tap_dial_battery_low
      from: "on"
      to: "off"
      for: "00:01:00"
      id: battery_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_humidity_high
        - binary_sensor.bedroom_humidity_low
      from: "off"
      to: "on"
      for: "00:05:00"
      id: humidity_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_humidity_high
        - binary_sensor.bedroom_humidity_low
      from: "on"
      to: "off"
      for: "00:05:00"
      id: humidity_ok
  action:
    # Derive everything from the triggering threshold sensor — its `entity_id` attribute points at
    # its SOURCE sensor (live value + unit); the label is the threshold sensor's own friendly name
    # with the trailing " high"/" low" stripped (the extra ' low' strip is what makes battery and
    # the low-humidity sensor read correctly). Category + edge come from the trigger id.
    - variables:
        category: "{{ trigger.id.split('_')[0] }}"
        edge: "{{ trigger.id.split('_')[1] }}"
        src: "{{ trigger.to_state.attributes.entity_id }}"
        label: "{{ trigger.to_state.attributes.friendly_name | replace(' high', '') | replace(' low', '') | replace(' severe', '') }}"
        value: "{{ states(src) }}"
        unit: "{{ state_attr(src, 'unit_of_measurement') or '' }}"
        unit_sp: "{{ ' ' ~ unit if unit else '' }}"
        # Same tag for bad + recovery → the recovery replaces the alert on the phone.
        tag: "threshold_alert_{{ trigger.entity_id }}"
        # Per-category routing flags. `pulse` = brief red light flash (air quality only). `watch` =
        # also buzz the wrist (glanceable). `pierce` = sound even while quiet/DND (severe air quality
        # only — the can't-miss tier). `recovery` = send a "back to normal" notice (severe skips it;
        # the moderate recovery covers it). All notify goes through script.bedroom_notify (DND-aware).
        cfg: >-
          {{ {'airquality':       {'bad': '⚠️ Air quality', 'ok': '✅ Air quality', 'pulse': true,  'watch': true,  'pierce': false, 'recovery': true},
              'airqualitysevere': {'bad': '🚨 Air quality HIGH', 'ok': '✅ Air quality', 'pulse': true, 'watch': true, 'pierce': true, 'recovery': false},
              'battery':          {'bad': '🔋 Battery low', 'ok': '🔋 Battery OK', 'pulse': false, 'watch': false, 'pierce': false, 'recovery': true},
              'humidity':         {'bad': '💧 Humidity', 'ok': '💧 Humidity OK', 'pulse': false, 'watch': false, 'pierce': false, 'recovery': true}}[category] }}
        # Air-quality bad alerts get a "Boost fan" action button (circulate the air); other
        # categories get none. Handled by bedroom_notification_action.
        boost_actions: "{{ [{'action': 'BEDROOM_BOOST_FAN', 'title': 'Boost fan'}] if category in ['airquality', 'airqualitysevere'] else [] }}"
    - choose:
        - conditions: "{{ edge == 'bad' }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "{{ cfg.bad }}"
                message: "{{ label }} is {{ value }}{{ unit_sp }}"
                tag: "{{ tag }}"
                watch: "{{ cfg.watch }}"
                pierce: "{{ cfg.pierce }}"
                actions: "{{ boost_actions }}"
            # Light pulse only for air quality (cfg.pulse) and only when the lights are already on —
            # never wakes you, never fights Adaptive Lighting / the manual-off override at night.
            - if: "{{ cfg.pulse and is_state('light.bedroom_lights', 'on') }}"
              then:
                - service: script.bedroom_alert_pulse
      # off<->on edges only, so the remaining case (edge == 'ok') is the default. Recovery is always
      # routine (no watch/pierce); the severe tier skips it (cfg.recovery false).
      default:
        - if: "{{ cfg.recovery }}"
          then:
            - service: script.bedroom_notify
              data:
                title: "{{ cfg.ok }}"
                message: "{{ label }} back to normal ({{ value }}{{ unit_sp }})"
                tag: "{{ tag }}"

# Temperature → fan: drive fan.tower_fan from the AirGradient temperature via script.bedroom_apply_fan
# (off <72 / Low 72-74 / Medium 74-76 / High >=76 °F; Medium cap 22:00-06:00; 0.5°F deadband).
# Re-evaluates on every temperature change and at the night-cap boundaries (22:00 / 06:00) so the cap
# engages/releases even when the temperature is steady. Skipped while the manual override is on.
- id: bedroom_fan_temperature
  alias: Bedroom fan temperature control
  description: Set the tower fan speed from the AirGradient temperature (night-capped); skipped when the fan override is on.
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.bedroom_airgradient_one_temperature
    - platform: time
      at: "22:00:00"
    - platform: time
      at: "06:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.bedroom_fan_manual
      state: "off"
    # Don't drive the fan when nobody's home — else it would re-run seconds after the away-sweep
    # turns it off. The arrive nudge (bedroom_arrive_home) resumes it on return.
    - condition: state
      entity_id: person.daniel
      state: "home"
  action:
    - service: script.bedroom_apply_fan

# Manual-fan detector: when the fan's speed / preset / on-off changes and it was NOT our own
# command, engage the override so the temperature automation backs off. The DREO push integration
# echoes our OWN commands back parent-less, so context alone can't tell them apart — we ALSO compare
# the new fan LEVEL to input_number.bedroom_fan_expected_level (what bedroom_apply_fan last
# commanded): a match = our echo (ignore), a mismatch = a real manual/remote change (flag). A preset
# change is always manual (the automation never sets preset). Triggers on the controllable
# attributes only (NOT a bare state trigger) — the fan's onboard `temperature` attribute drifts and
# would false-fire. Ignores unavailable<->state reconnect noise.
- id: bedroom_fan_manual_detect
  alias: Bedroom fan manual override detect
  description: Set the fan manual override when the fan is changed by hand (level differs from what the automation commanded).
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id: fan.tower_fan
      attribute: percentage
    - platform: state
      entity_id: fan.tower_fan
      attribute: preset_mode
    - platform: state
      entity_id: fan.tower_fan
      to: "on"
    - platform: state
      entity_id: fan.tower_fan
      to: "off"
  condition:
    - condition: template
      value_template: >-
        {% set ts = trigger.to_state %}
        {% set fs = trigger.from_state %}
        {% set new_level = 0 if (ts is none or ts.state != 'on') else (ts.attributes.percentage | float(0) * 9 / 100) | round | int %}
        {% set expected = states('input_number.bedroom_fan_expected_level') | int(-1) %}
        {{ ts is not none
           and ts.state not in ['unavailable', 'unknown']
           and (fs is none or fs.state not in ['unavailable', 'unknown'])
           and ts.context.parent_id is none
           and ((trigger.attribute | default('')) == 'preset_mode' or new_level != expected) }}
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_fan_manual

# Sensor-offline alert: any bedroom-automation dependency going `unavailable` for 5 min sends a
# phone notification; a recovery notice fires when it returns (same tag, so it replaces the alert).
# The 5-min `for:` rides out HA restarts and the ~120s deploy recreate (entities go briefly
# unavailable, then back). Detection latency differs by device class and that's inherent: the
# AirGradient ONE and DREO fan (polled integrations) go unavailable within minutes; the FP300 and
# Tap Dial (battery Zigbee) only after Z2M's passive availability timeout (60 min — see the
# zigbee2mqtt config), because a sleeping radio can't be actively pinged. Z2M availability MUST be
# enabled for the two Zigbee entities to ever go unavailable. Adding a watched device = add its
# representative entity to BOTH trigger lists below (one entity per device suffices — Z2M flips all
# of a device's entities together). Brief flaps can emit a lone recovery with no prior alert (the
# offline edge needs a full 5 min down) — rare and low-harm, accepted like the air-quality engine.
- id: bedroom_sensor_offline_alert
  alias: Bedroom sensor offline alert
  description: Notify when a bedroom-automation dependency (AirGradient/FP300/Tap Dial/fan) goes unavailable; recovery notice when it returns.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id:
        - sensor.bedroom_airgradient_one_carbon_dioxide
        - binary_sensor.aqara_fp300_presence
        - sensor.0x001788010f0ccda4_battery
        - fan.tower_fan
      to: "unavailable"
      for: "00:05:00"
      id: offline
    - platform: state
      entity_id:
        - sensor.bedroom_airgradient_one_carbon_dioxide
        - binary_sensor.aqara_fp300_presence
        - sensor.0x001788010f0ccda4_battery
        - fan.tower_fan
      from: "unavailable"
      id: recovery
  action:
    # An entity's friendly_name attribute is EMPTY while it is unavailable, so derive the human name
    # from the AVAILABLE side of the transition: to_state for recovery, from_state for offline.
    # default(entity_id, true) falls back to the raw entity_id if neither side carries a name.
    - variables:
        name: >-
          {{ (trigger.to_state.attributes.friendly_name
              if (trigger.to_state is not none and trigger.to_state.attributes.friendly_name is defined)
              else trigger.from_state.attributes.friendly_name)
             | default(trigger.entity_id, true) }}
        # Same tag for offline + recovery → the recovery replaces the alert on the phone.
        tag: "sensor_offline_{{ trigger.entity_id }}"
    - choose:
        # A dead dependency buzzes the watch (glanceable) but is routine for DND — a sensor offline
        # overnight isn't worth waking for (no pierce). Recovery is routine, phone-only.
        - conditions: "{{ trigger.id == 'offline' }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "⚠️ Sensor offline"
                message: "{{ name }} is offline (no data)"
                tag: "{{ tag }}"
                watch: true
      # from:"unavailable" edges only, so the remaining case (id == 'recovery') is the default.
      default:
        - service: script.bedroom_notify
          data:
            title: "✅ Sensor back online"
            message: "{{ name }} is reporting again"
            tag: "{{ tag }}"

# Home/away: turn the bedroom off when you leave the HOUSE (person.daniel) — a different layer than
# the FP300's ROOM presence. Two stages absorb GPS jitter: 'leave' at 10 min away, a 'failsafe'
# re-sweep at 30 min. Triggering on from:"home" catches leaving to any away state (not_home or a
# named zone); the `for:` cancels on an early return (mailbox/jitter bounce). Turn-off is
# unconditional (leaving always allows off) and the override booleans are left UNTOUCHED (respecting
# them = never writing them here). The fan/light on-paths are separately gated on person.daniel ==
# home (bedroom_fan_temperature, bedroom_presence_on, the morning reset's fan apply) so nothing
# turns back on while away. Known gap: an HA restart while already away misses these (from:"home"
# needs a live transition) — the gates still prevent away-on, so it self-corrects.
- id: bedroom_away
  alias: Bedroom away
  description: When you leave home (10 min) and as a 30-min failsafe, turn off the bedroom lights + fan and notify what was on.
  mode: single
  trigger:
    - platform: state
      entity_id: person.daniel
      from: "home"
      for: "00:10:00"
      id: leave
    - platform: state
      entity_id: person.daniel
      from: "home"
      for: "00:30:00"
      id: failsafe
  action:
    - variables:
        on_items: >-
          {{ (['lights'] if is_state('light.bedroom_lights', 'on') else [])
           + (['fan'] if is_state('fan.tower_fan', 'on') else []) }}
    - choose:
        # Only act + notify when something is actually on — so the 30-min failsafe stays silent
        # unless it caught something the 10-min leave missed (or that came on since).
        - conditions: "{{ on_items | length > 0 }}"
          sequence:
            - service: light.turn_off
              target:
                entity_id: light.bedroom_lights
            - service: fan.turn_off
              target:
                entity_id: fan.tower_fan
            # Routine notify (you're not quiet when leaving) — one notify path for the whole system.
            - service: script.bedroom_notify
              data:
                title: "🏠 Left on"
                message: "Turned off bedroom {{ on_items | join(' + ') }} (you're away)"
                tag: bedroom_away
                # One-tap undo for a false-away (GPS jitter while you're actually home).
                actions:
                  - action: BEDROOM_AWAY_TURN_ON
                    title: Turn back on

# Arrive home nudge: resume the gated automations promptly on return (person.daniel -> home). NOT a
# welcome-home — never forces lights on. The fan resumes per the temperature band (unless the fan
# override is on); lights only re-check if you're actually standing in the bedroom (FP300 present)
# and haven't engaged the manual-off override — so arriving mid-day elsewhere in the house lights
# nothing. Both routes go through the apply_* scripts, which honor the overrides internally.
- id: bedroom_arrive_home
  alias: Bedroom arrive home
  description: On returning home, resume the fan per temperature and re-check lights if already in the bedroom.
  mode: single
  trigger:
    - platform: state
      entity_id: person.daniel
      to: "home"
  action:
    - if: "{{ is_state('input_boolean.bedroom_fan_manual', 'off') }}"
      then:
        - service: script.bedroom_apply_fan
    - if: >-
        {{ is_state('binary_sensor.aqara_fp300_presence', 'on')
           and is_state('input_boolean.bedroom_manual_off', 'off') }}
      then:
        - service: script.bedroom_apply_natural

# Bedtime: when the phone's Bedtime mode turns on (surfaced by the Pixel Watch companion app) while
# home, run the sleep routine (script.bedroom_bedtime: quiet fan cap + AL sleep mode + nightlight).
# The Tap Dial button-1 hold (in bedroom_tap_dial_control) is the manual fallback. Gated on home so
# it never sets the room up for sleep — or switches the fan on — while away. The morning reset
# unwinds it. Charging is deliberately NOT a trigger (the operator charges in-room at a desk).
- id: bedroom_bedtime
  alias: Bedroom bedtime
  description: When phone Bedtime mode turns on while home, run the bedtime/sleep routine.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.pixel_watch_3_bedtime_mode
      to: "on"
  condition:
    - condition: state
      entity_id: person.daniel
      state: "home"
  action:
    - service: script.bedroom_bedtime

# Actionable-notification dispatcher: handle taps on notification buttons. The companion app fires
# mobile_app_notification_action with the BEDROOM_* action id from the button. Buttons are attached
# by passing `actions` to script.bedroom_notify (air-quality bad -> Boost fan; away -> Turn back on;
# the bedtime prompt -> Start now). Add a new button = add its case here + pass it in the actions list.
- id: bedroom_notification_action
  alias: Bedroom notification action
  description: Dispatch taps on actionable notification buttons (mobile_app_notification_action).
  mode: queued
  max: 10
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
  action:
    - choose:
        # Boost fan: max circulation. Engages the manual override so it persists (clear via Tap Dial
        # button 3 or the morning reset). Honest caveat: moves air, doesn't lower CO2.
        - conditions: "{{ trigger.event.data.action == 'BEDROOM_BOOST_FAN' }}"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.bedroom_fan_manual
            - service: fan.turn_on
              target:
                entity_id: fan.tower_fan
            - service: fan.set_percentage
              target:
                entity_id: fan.tower_fan
              data:
                percentage: 100
        - conditions: "{{ trigger.event.data.action == 'BEDROOM_START_BEDTIME' }}"
          sequence:
            - service: script.bedroom_bedtime
        # Undo a false-away: restore lights + fan. Calls the apply_* scripts directly so they ignore
        # the home-gates (you're tapping because the tracker is wrong / you're actually home).
        - conditions: "{{ trigger.event.data.action == 'BEDROOM_AWAY_TURN_ON' }}"
          sequence:
            - service: script.bedroom_apply_natural
            - service: script.bedroom_apply_fan

# Bedtime prompt: at 22:00, if you're in the bedroom and haven't started bedtime, send a nudge with
# a "Start now" button (-> BEDROOM_START_BEDTIME -> script.bedroom_bedtime). Gated on present + not
# already in sleep mode + home, so it only nudges when you're actually around and haven't gone to bed.
- id: bedroom_bedtime_prompt
  alias: Bedroom bedtime prompt
  description: At 22:00, if present and not yet in sleep mode, prompt to start the bedtime routine.
  mode: single
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: binary_sensor.aqara_fp300_presence
      state: "on"
    - condition: state
      entity_id: input_boolean.bedroom_sleep_mode
      state: "off"
    - condition: state
      entity_id: person.daniel
      state: "home"
  action:
    - service: script.bedroom_notify
      data:
        title: "🌙 Ready for bed?"
        message: "Tap to start the bedtime routine."
        tag: bedtime_prompt
        actions:
          - action: BEDROOM_START_BEDTIME
            title: Start now

# Update-available digest: weekly (Sunday 10:00) roundup of pending device/integration updates that
# Renovate doesn't cover — Zigbee/sensor firmware + HACS integrations. Generic over ALL update.*
# entities (a newly paired device joins automatically). NOTIFY-ONLY — never auto-flashes firmware.
# Homelab-wide (no bedroom_ prefix) but routes through the shared bedroom_notify layer (routine).
- id: update_available_digest
  alias: Update available digest
  description: Sunday 10:00 — notify a digest of any device/integration updates available (notify-only).
  mode: single
  trigger:
    - platform: time
      at: "10:00:00"
  condition:
    # Sunday only (Mon=0 .. Sun=6), and only if at least one update is actually pending.
    - condition: template
      value_template: "{{ now().weekday() == 6 }}"
    - condition: template
      value_template: "{{ states.update | selectattr('state', 'eq', 'on') | list | count > 0 }}"
  action:
    - variables:
        pending: "{{ states.update | selectattr('state', 'eq', 'on') | list }}"
        # One bullet per pending update: "• <name> (<installed> → <latest>)". Zigbee versions are
        # opaque build integers / IEEE names until devices are renamed in Z2M — still informative.
        lines: >-
          {% for u in pending %}{{ '\n• ' ~ u.name ~ ' (' ~ (state_attr(u.entity_id, 'installed_version') | string) ~ ' → ' ~ (state_attr(u.entity_id, 'latest_version') | string) ~ ')' }}{% endfor %}
    - service: script.bedroom_notify
      data:
        title: "📦 {{ pending | count }} update(s) available"
        message: "{{ lines }}"
        tag: update_digest
