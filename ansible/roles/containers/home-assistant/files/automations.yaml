---
# Managed by Ansible (roles/containers/home-assistant/files/automations.yaml).
# Source of truth — copied to ./config and overwritten on deploy. HA UI automation edits
# are NOT persistent. To change, edit this file and run:
#   uv run ansible-playbook ansible/deploy.yml --tags "home-assistant"
#
# Trigger topic is the Hue Tap Dial's Z2M friendly_name — Z2M publishes one JSON blob per device on
# zigbee2mqtt/<friendly_name> (default output: json), so we read .action from the payload. The dial
# was renamed in Z2M to "Tap Dial" (2026-06-18), so the topic has a space; if renamed again, update
# the topic here to match. (Its HA entity_ids stay IEEE-based — sticky — so battery refs are unchanged.)
- id: bedroom_tap_dial_control
  alias: Bedroom Tap Dial control
  description: Hue Tap Dial (RDM002, Z2M name "Tap Dial") controls the Bedroom Lights group.
  mode: queued
  max: 10
  trigger:
    - platform: mqtt
      topic: zigbee2mqtt/Tap Dial
  # Z2M publishes the FULL device state to this topic on every report (battery, link quality, …),
  # not only on button/dial actions. Gate on an action actually being present so the automation
  # no-ops on those state reports — without this the dial_rotate_* conditions below stringify an
  # undefined `action` and log "dict object has no attribute 'action'" on every report (and on the
  # retained-state replay each HA restart). `payload_json is defined` first guards a non-JSON retain.
  condition:
    - condition: template
      value_template: "{{ trigger.payload_json is defined and trigger.payload_json.action is defined }}"
  action:
    # Read the action once, safely defaulted — so no condition below can hit an undefined attribute.
    - variables:
        act: "{{ trigger.payload_json.action | default('') }}"
    - choose:
        # Button 1 = POWER. PRESS = smart toggle: ON -> off + engage manual-off (presence won't
        # re-on); OFF -> Adaptive Lighting natural look (UNGATED — a manual tap always lights) +
        # clear manual-off. HOLD = reset to auto (below).
        - conditions: "{{ act == 'button_1_press_release' }}"
          sequence:
            - service: script.bedroom_exit_sleep
            - if: "{{ is_state('light.bedroom_lights', 'on') }}"
              then:
                - service: light.turn_off
                  target:
                    entity_id: light.bedroom_lights
                - service: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.bedroom_manual_off
              else:
                - service: script.bedroom_apply_natural
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_manual_off
        # Button 1 HOLD = reset to auto: clear the light + fan overrides, re-sync lights to their
        # natural state HONORING the lux gate (bright room -> off), and re-apply the fan if home.
        - conditions: "{{ act == 'button_1_hold_release' }}"
          sequence:
            - service: script.bedroom_exit_sleep
            - service: input_boolean.turn_off
              target:
                entity_id:
                  - input_boolean.bedroom_manual_off
                  - input_boolean.bedroom_fan_manual
            # Remember whether the lights were already off BEFORE the reset, so the acknowledgement
            # blip below only fires when the reset produces NO visible change (the lights "won't turn
            # on"), not when it turns an already-on light off (that's already visible feedback).
            - variables:
                was_off: "{{ is_state('light.bedroom_lights', 'off') }}"
            - service: script.bedroom_apply_natural_gated
            # Too-bright acknowledgement: if the reset left the lights off (room genuinely bright by
            # DAY: lux gate blocked AND the sun is up) and the lights were already off, soft-flash to
            # confirm the reset registered, exactly like bedroom_presence_blip does on a too-bright
            # arrival. The `sun above_horizon` term makes this the EXACT complement of the sun-aware gate
            # in bedroom_apply_natural_gated — at night the reset lights the room (sun term), so we must
            # NOT also blip. The blip needs the lights already off (it takes no snapshot); the blocked
            # daytime gate guarantees that. No feedback loop: button-driven, so the ~1s flash can't retrigger.
            - if: "{{ was_off and is_state('binary_sensor.bedroom_auto_light_allowed', 'off') and is_state('sun.sun', 'above_horizon') }}"
              then:
                - service: script.bedroom_blip
            - if: "{{ is_state('person.daniel', 'home') }}"
              then:
                - service: script.bedroom_apply_fan
        # Button 2 = BRIGHTNESS. PRESS = Relax/cozy scene; HOLD = Bright (full). Both clear manual-off.
        - conditions: "{{ act == 'button_2_press_release' }}"
          sequence:
            - service: script.bedroom_exit_sleep
            - service: scene.turn_on
              target:
                entity_id: scene.bedroom_relax
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ act == 'button_2_hold_release' }}"
          sequence:
            - service: script.bedroom_exit_sleep
            - service: scene.turn_on
              target:
                entity_id: scene.bedroom_bright
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_manual_off
        # Button 3 = SLEEP. HOLD = bedtime / sleep routine (15-min fade). PRESS = sleep TOGGLE:
        # while in sleep mode WITH the lights on (you've wound down and want the room fully dark to
        # sleep) -> lights OFF, staying in sleep mode so the fan stays quiet AND presence can't relight
        # you (bedroom_presence_on is gated on sleep_mode below). Otherwise (daytime, or lights already
        # off) -> the warm nightlight, clearing manual-off. So at night a tap toggles dark <-> nightlight,
        # and a daytime tap is unchanged (quick nightlight). The auto "got up overnight" nightlight is
        # gone by design (see the sleep_mode gate on bedroom_presence_on) — get light back with a tap.
        - conditions: "{{ act == 'button_3_press_release' }}"
          sequence:
            - if: "{{ is_state('input_boolean.bedroom_sleep_mode', 'on') and is_state('light.bedroom_lights', 'on') }}"
              then:
                - service: light.turn_off
                  target:
                    entity_id: light.bedroom_lights
              else:
                - service: scene.turn_on
                  target:
                    entity_id: scene.bedroom_nightlight
                - service: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.bedroom_manual_off
        - conditions: "{{ act == 'button_3_hold_release' }}"
          sequence:
            - service: script.bedroom_bedtime
        # Button 4 = FAN (fan only). TAP = clear the sleep_mode flag (un-caps the fan) + the fan override,
        # then apply the temp band — does NOT touch the lights or AL sleep (see the branch for why); also
        # cancels fan-dial mode. HOLD = toggle fan-dial mode (the dial then steps the fan +/-1 level; see
        # the dial_rotate branches + timer.bedroom_fan_dial). Replaces the old hold-to-boost-100%.
        - conditions: "{{ act == 'button_4_press_release' }}"
          sequence:
            # Fan ONLY. Clear the fan's sleep cap (the sleep_mode flag) + the fan override, then apply the
            # temp band. Deliberately does NOT touch the lights or AL sleep mode: clearing AL sleep makes
            # Adaptive Lighting self-on the lights, and the FP300 illuminance is dominated by the bedroom
            # lights THEMSELVES (~640 lux on / ~48 off) — so any light the fan button left on would just be
            # re-lit by presence (off-state reads "dark"). Light + AL-sleep state is owned by B1/B2 + presence.
            # Tapping "fan back to auto" also exits fan-dial mode (the dial returns to lights). No-op if idle.
            - service: timer.cancel
              target:
                entity_id: timer.bedroom_fan_dial
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_sleep_mode
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.bedroom_fan_manual
            - service: script.bedroom_apply_fan
        # Button 4 HOLD = toggle "fan-dial mode": while timer.bedroom_fan_dial is active the dial
        # controls the FAN level (see the dial_rotate branches); hold again to cancel. It auto-reverts
        # to light control when the 5-min timer expires (SLIDING — each dial turn restarts it). The
        # timer's `active` state IS the mode (no separate boolean) so it's off after any HA restart.
        # Replaces the old hold-to-boost-100% — max fan is still reachable by dialing to L9, and the
        # notification "Boost fan" action is unchanged.
        - conditions: "{{ act == 'button_4_hold_release' }}"
          sequence:
            - if: "{{ is_state('timer.bedroom_fan_dial', 'active') }}"
              then:
                - service: timer.cancel
                  target:
                    entity_id: timer.bedroom_fan_dial
              else:
                - service: timer.start
                  target:
                    entity_id: timer.bedroom_fan_dial
                # Seed the accumulator from the fan's ACTUAL level so the first dial step is relative
                # to reality (a prior remote change may have left expected_level stale).
                - service: input_number.set_value
                  target:
                    entity_id: input_number.bedroom_fan_expected_level
                  data:
                    value: "{% from 'fan.jinja' import pct_to_level %}{{ pct_to_level(state_attr('fan.tower_fan', 'percentage') | float(0) if is_state('fan.tower_fan', 'on') else 0) | int }}"
        # Dial rotate = brightness +/- 12% NORMALLY; in fan-dial mode (timer active) = fan +/-1 level.
        # (Substring match catches the *_step variants.)
        - conditions: "{{ 'dial_rotate_right' in act }}"
          sequence:
            - if: "{{ is_state('timer.bedroom_fan_dial', 'active') }}"
              then:
                - service: script.bedroom_fan_nudge
                  data:
                    delta: 1
                # Sliding window: each turn restarts the 5-min revert timer.
                - service: timer.start
                  target:
                    entity_id: timer.bedroom_fan_dial
              else:
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                  data:
                    brightness_step_pct: 12
                    transition: 0.2
        - conditions: "{{ 'dial_rotate_left' in act }}"
          sequence:
            - if: "{{ is_state('timer.bedroom_fan_dial', 'active') }}"
              then:
                - service: script.bedroom_fan_nudge
                  data:
                    delta: -1
                - service: timer.start
                  target:
                    entity_id: timer.bedroom_fan_dial
              else:
                - service: light.turn_on
                  target:
                    entity_id: light.bedroom_lights
                  data:
                    brightness_step_pct: -12
                    transition: 0.2

# Presence ON: occupied + not overridden → set the lights to their NATURAL state via the
# dispatcher (morning ramp in-window, else full Adaptive Lighting). The lux gate applies OUTSIDE
# the morning wake window only: during the window (45 min — alarm-15 to alarm+30) we wake regardless
# of ambient light; afterwards we only turn on when the room is dim. The
# window reads sensor.bedroom_wake_start — the SAME source the dispatcher's wake exception uses
# (inherently in sync, no duplicated formula).
- id: bedroom_presence_on
  alias: Bedroom presence on
  description: Set the lights to their natural state when the room becomes occupied OR when it darkens past the lux gate while you're already present (unless overridden); gated on darkness outside the morning wake window.
  mode: single
  trigger:
    # Two ways in: you arrive (presence off->on), OR the room dims past the gate while you're
    # already here (illuminance crossing below 75). The latter closes an edge-vs-level gap —
    # entering while it was still bright used to leave you in the dark as dusk fell, since the
    # only trigger was the arrival edge. The `for:` rides out transient lux dips (a passing shadow).
    # Keep this `below:` in sync with the auto_light_allowed gate threshold (lighting.jinja's
    # `lux < N`) — test_lux_gate_sync.py asserts they stay equal.
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "on"
    - platform: numeric_state
      entity_id: sensor.aqara_fp300_illuminance
      below: 75
      for: "00:00:30"
  # Gating moved into script.bedroom_lights_set / light_decision (the 'presence' reason applies
  # exactly these checks: manual_off off, sleep off, person home, presence on, lux gate on, light
  # off). presence_on's sole action is the light, so it routes straight through the mediator.
  action:
    - service: script.bedroom_lights_set
      data:
        reason: "presence"

# Presence BLIP: you arrived but the room is too bright for auto-on (the lux gate is OFF), so the
# lights won't come on. Flash them softly to acknowledge the detection. Sibling of bedroom_presence_on,
# sharing ONLY the arrival edge (not the dusk lux-crossing — that path is when lights DO come on), with
# the lux gate INVERTED. Mutually exclusive with presence_on per arrival: auto_light_allowed is either
# on (presence_on lights up) or off (this blips). Won't loop the lux trigger: a ~1s blip can't satisfy
# presence_on's `below: 75 for: 30s`, and it only fires when illuminance is already >= 75 (bright ambient).
- id: bedroom_presence_blip
  alias: Bedroom presence blip too bright
  description: Soft acknowledgement flash when presence is detected on arrival but the lux gate blocks auto-on.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "on"
  condition:
    # Didn't deliberately kill the lights.
    - condition: state
      entity_id: input_boolean.bedroom_manual_off
      state: "off"
    # Never blip an empty house on an FP300 radar false-positive.
    - condition: state
      entity_id: person.daniel
      state: "home"
    # Still actually occupied.
    - condition: state
      entity_id: binary_sensor.aqara_fp300_presence
      state: "on"
    # INVERTED lux gate: auto-on is BLOCKED (too bright) — the whole reason to blip instead of light up.
    - condition: state
      entity_id: binary_sensor.bedroom_auto_light_allowed
      state: "off"
    # Only "won't turn on" makes sense when the lights are currently off.
    - condition: state
      entity_id: light.bedroom_lights
      state: "off"
  action:
    - service: script.bedroom_blip

# Absence OFF: room empty for 5 minutes → lights off (ignores the override — leaving always allows off).
- id: bedroom_absence_off
  alias: Bedroom absence off
  description: Turn off the bedroom lights after the room has been empty for 5 minutes.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "off"
      for: "00:05:00"
  action:
    - service: script.bedroom_lights_set
      data:
        reason: "off"

# Air-purifier presence control: the "Air Purifier" smart plug (switch.air_purifier) auto-starts the
# purifier whenever it gets power, so toggling the plug = toggling the purifier. (entity_id renamed
# from its raw Z2M IEEE address in the HA registry — see role CLAUDE.md.) Run it while the room is
# occupied, cut it after 5 min empty —
# EXCEPT hold it on from bedtime through the end of the morning wake ramp (binary_sensor.bedroom_
# purifier_hold), because the FP300 drops a motionless sleeper and would otherwise kill it at 2am.
# ALSO run it regardless of presence while the Air Quality Monitor reads dirty (the AirGradient's
# PM2.5/VOC threshold sensors), since a HEPA+carbon purifier clears exactly those — so a pollution
# event with nobody home still gets filtered, and it stops once the air clears AND the room is empty.
#   present   -> turn on (edge-triggered on arrival; a manual off therefore "sticks" until you next
#                leave-and-return — same property bedroom_manual_light_detect gives the lights).
#   aqi_bad   -> indoor PM2.5 or VOC went high -> turn on regardless of presence (dirty air overrides
#                the manual-off-sticks property, by design — health wins).
#   absent    -> turn off after 5 min empty, UNLESS the overnight hold is active OR the air is dirty.
#   hold_end  -> the wake routine just finished; if the room is already empty AND the air is clean,
#                turn off NOW. Catches the case where the FP300 dropped you overnight and never
#                re-detected you, so the 5-min absent trigger fired-but-was-blocked and won't
#                re-fire (no fresh off-edge).
#   aqi_clear -> the air recovered; if the room is empty and we're not holding, the dirty-air reason
#                is gone, so stop (presence-occupied keeps it on via the normal path).
# AQI gates on PM2.5/VOC, NOT CO2 — a filter does nothing for CO2 (that's the window-advisor /
# Boost-fan job). Not a sanctioned-writer actuator (state/sanctioned_writers.yml governs only the
# lights + fan), so this drives switch.turn_on/off directly — no mediator script.
- id: bedroom_air_purifier_presence
  alias: Bedroom air purifier presence
  description: >-
    Run the air purifier while the room is occupied; cut power after 5 min empty — but hold it on
    from bedtime through the end of the morning wake ramp, since the FP300 can drop a motionless sleeper.
  mode: queued
  max: 5
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "on"
      id: present
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      to: "off"
      for: "00:05:00"
      id: absent
    - platform: state
      entity_id: binary_sensor.bedroom_purifier_hold
      from: "on"
      to: "off"
      id: hold_end
    - platform: state
      entity_id:
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
      to: "on"
      id: aqi_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
      to: "off"
      id: aqi_clear
  action:
    - choose:
        # Arrived (or FP300 re-detected you) -> make sure the purifier is powered.
        - conditions: "{{ trigger.id == 'present' }}"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.air_purifier
        # Indoor PM2.5/VOC went high -> run it regardless of presence (filters particulates + VOCs).
        - conditions: "{{ trigger.id == 'aqi_bad' }}"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.air_purifier
        # Empty for 5 min -> power off, UNLESS holding through sleep/wake OR the air is still dirty.
        - conditions:
            - "{{ trigger.id == 'absent' }}"
            - "{{ is_state('binary_sensor.bedroom_purifier_hold', 'off') }}"
            - "{{ is_state('binary_sensor.bedroom_pm2_5_high', 'off') and is_state('binary_sensor.bedroom_voc_high', 'off') }}"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.air_purifier
        # Wake routine ended -> if the room is empty AND the air is clean, power off now.
        - conditions:
            - "{{ trigger.id == 'hold_end' }}"
            - "{{ is_state('binary_sensor.aqara_fp300_presence', 'off') }}"
            - "{{ is_state('binary_sensor.bedroom_pm2_5_high', 'off') and is_state('binary_sensor.bedroom_voc_high', 'off') }}"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.air_purifier
        # Air cleared -> if the room is empty and we're not holding, the dirty-air reason is gone, stop.
        - conditions:
            - "{{ trigger.id == 'aqi_clear' }}"
            - "{{ is_state('binary_sensor.bedroom_pm2_5_high', 'off') and is_state('binary_sensor.bedroom_voc_high', 'off') }}"
            - "{{ is_state('binary_sensor.aqara_fp300_presence', 'off') }}"
            - "{{ is_state('binary_sensor.bedroom_purifier_hold', 'off') }}"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.air_purifier

# Manual light DETECT: make a hand/voice/dashboard light change set the SAME manual-off override the
# Tap Dial's power button does — so an external "off" STICKS instead of being re-lit by
# bedroom_presence_on's dusk-lux trigger. Turning the bulbs off drops sensor.aqara_fp300_illuminance
# (dominated by the lights themselves, ~550 on / ~48 off) below the gate, which otherwise re-fires
# presence_on ~30s later (the documented lights-dominate-illuminance feedback loop — see role CLAUDE.md).
# The Tap Dial already engaged manual-off on its off-press; voice (Google Assistant), the dashboard
# tile, and the companion app did not — this closes that gap for every control surface at once.
# Mirrors bedroom_fan_manual_detect: trigger.to_state.context.parent_id is none means the change came
# from a person/integration, NOT one of our own automations/scripts (whose service calls are parented),
# so absence_off / away / bedtime / apply_natural / the Tap Dial never reach the action here. Symmetric
# with button 1: OFF -> engage manual-off; ON -> clear it (a deliberate turn-on resumes presence auto).
- id: bedroom_manual_light_detect
  alias: Bedroom manual light detect
  description: A hand/voice/dashboard turn-off of the bedroom lights engages the manual-off override (so presence won't re-light it); a manual turn-on clears it.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id: light.bedroom_lights
      to: "on"
    - platform: state
      entity_id: light.bedroom_lights
      to: "off"
  condition:
    # Act ONLY on a genuine external/manual change. parent_id is none isolates person/voice/integration
    # actions (our automations' service calls are parented — same discriminator as the fan detector).
    # Guarding from_state against unavailable/unknown stops an HA restart / deploy recreate (the group
    # comes back unknown->on) from clearing the override.
    - condition: template
      value_template: >-
        {% set ts = trigger.to_state %}
        {% set fs = trigger.from_state %}
        {{ ts is not none
           and ts.state in ['on', 'off']
           and (fs is none or fs.state not in ['unavailable', 'unknown'])
           and ts.context.parent_id is none }}
  action:
    - if: "{{ trigger.to_state.state == 'off' }}"
      then:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.bedroom_manual_off
      else:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.bedroom_manual_off

# Morning reset + gentle wake, driven by the REAL alarm. The `alarm` trigger fires at
# sensor.bedroom_wake_start (watch alarm - 15 min, morning-only — see configuration.yaml); the
# `fallback` at 09:00 guarantees the overnight overrides clear even on a no-alarm day. Both clear the
# overrides (manual-off, fan-manual, sleep mode, AL sleep) and re-apply the fan if home; only the
# `alarm` trigger runs the wake ramp (the fallback never forces lights, so it can't clobber a scene
# you set after waking). The alarm encodes the day, so the old weekday/weekend split is gone.
- id: bedroom_morning_reset
  alias: Bedroom morning reset and wake
  description: At the alarm (wake ramp) + a 09:00 fallback (hygiene) — clear overnight overrides; gently wake if home.
  mode: single
  trigger:
    - platform: time
      at: sensor.bedroom_wake_start
      id: alarm
    - platform: time
      at: "09:00:00"
      id: fallback
  action:
    # Latch the sleep duration ONCE at the wake-window open (alarm trigger only) so the ramp's curve
    # shape is fixed for the whole window. bedroom_apply_wake reads this latched value, not the live
    # sensor: the Google Sleep API can finalize sleep_duration mid-window, and re-reading it live each
    # minute let the curve shape change under the ramp — a short-night value crossing the 360-min knee
    # mid-ramp could step brightness DOWN (a wake light visibly dimming). Latching at open keeps it
    # monotonic; a still-stale 0 here yields the normal curve, consistent with the documented
    # best-effort/stale-at-alarm-15 fallback. Not gated on home, so a mid-window arrival uses today's value.
    - if: "{{ trigger.id == 'alarm' }}"
      then:
        - service: input_number.set_value
          target:
            entity_id: input_number.bedroom_wake_sleep_min_latched
          data:
            value: "{{ states('sensor.pixel_9_pro_sleep_duration') | float(0) }}"
    # Daily hygiene (BOTH triggers): clear every overnight override (3 booleans + AL sleep) via the
    # shared script so sleep state / manual-off can't persist into the day. Single source of truth
    # with the test-harness reset (script.bedroom_clear_overrides).
    - service: script.bedroom_clear_overrides
    # Re-apply the fan now the sleep cap is cleared — only when home (this calls the fan script
    # DIRECTLY, bypassing bedroom_fan_temperature's home gate).
    - if: "{{ is_state('person.daniel', 'home') }}"
      then:
        - service: script.bedroom_apply_fan
    # Wake ramp: ONLY on the alarm trigger and only if HOME — gated on the GEOFENCE (person.daniel),
    # NOT the FP300 room sensor. At motion_sensitivity:high (reverted because no setting separates the
    # fan from a person — see the role CLAUDE.md / [[ha-fp300-fan-false-hold]]) the radar drops a
    # motionless sleeper, so `presence` can read `off` at the exact moment you need waking. person.daniel
    # == home is the reliable "you're here to be woken" signal and still won't ramp an empty bedroom while
    # away (an FP300 dog/false-positive can't trigger the wake either). apply_natural's wake exception
    # delegates to script.bedroom_apply_wake (the gentle-then-steep 30-min ramp, alarm at midpoint),
    # which automation.bedroom_wake_ramp then drives per-minute. The 09:00 fallback never forces lights.
    - if: "{{ trigger.id == 'alarm' and is_state('person.daniel', 'home') }}"
      then:
        - service: script.bedroom_lights_set
          data:
            reason: "natural"
        # Sleep-quality note: "you slept N h" (gentler wake if <6h — apply_wake softens the EARLY
        # curve, knee ~24% at alarm+15, though it still reaches 100% by alarm+30). Skipped if
        # sleep_duration is unknown/0 (Google Sleep API may lag).
        - variables:
            slept_h: "{{ (states('sensor.pixel_9_pro_sleep_duration') | float(0) / 60) | round(1) }}"
        - if: "{{ slept_h > 0 }}"
          then:
            - service: script.bedroom_notify
              data:
                title: "{{ '😴 Short night' if slept_h < 6 else '☀️ Good morning' }}"
                message: "You slept {{ slept_h }}h{{ ' — gentler wake.' if slept_h < 6 else '.' }}"
                tag: sleep_morning

# Per-minute sunrise ramp. While inside the 45-min wake window, set the current ramp frame
# (script.bedroom_apply_wake) each minute — stateless ticks resume cleanly after an HA restart. On
# the tick where the window just ended (elapsed 45..46), hand the lights back to Adaptive Lighting
# for the day (apply_natural default = ambient-fill). The ramp climbs all the way to 100% by window
# end, so AL takes over at full brightness — no sudden pop. Gated on home + not manual-off; the wake
# math (window + curve) lives in lighting.jinja.
- id: bedroom_wake_ramp
  alias: Bedroom wake ramp
  description: Drive the sunrise ramp once a minute through the wake window; hand back to AL at window end.
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/1"
  condition:
    - condition: state
      entity_id: person.daniel
      state: "home"
    - condition: state
      entity_id: input_boolean.bedroom_manual_off
      state: "off"
  action:
    - variables:
        ws: "{{ states('sensor.bedroom_wake_start') }}"
        elapsed: "{{ (now() - as_datetime(ws)).total_seconds() / 60 if ws not in ['unknown', 'unavailable'] else -1 }}"
        in_window: "{% from 'lighting.jinja' import in_wake_window %}{{ in_wake_window(elapsed) | bool }}"
    - choose:
        - conditions: "{{ in_window }}"
          sequence:
            - service: script.bedroom_lights_set
              data:
                reason: "wake"
        # Window just ended this minute -> hand the room back to Adaptive Lighting for the day.
        # Release manual control + apply so AL drives the natural daylight brightness/color curve.
        # The ramp has reached 100% by now, so AL takes over at full brightness (its 45s transition
        # then settles color/brightness to the daytime target) — the seamless hand-off this curve
        # was designed for. NOT reason:"natural" (ambient-fill): at window-end the lights are on at
        # ~100%, so natural_brightness would read the lights-DOMINATED FP300 illuminance (violating
        # its "read while OFF" precondition) and floor the room to ~11%, stranding AL paused until
        # the next leave+return. turn_on_lights:false so a mid-ramp manual-off is never re-lit.
        - conditions: "{{ elapsed >= 45 and elapsed < 46 }}"
          sequence:
            - service: adaptive_lighting.set_manual_control
              data:
                entity_id: switch.bedroom_adaptive_lighting_bedroom
                manual_control: false
            - service: adaptive_lighting.apply
              data:
                entity_id: switch.bedroom_adaptive_lighting_bedroom
                turn_on_lights: false

# Slow color tracking: while the lights are in AUTO mode, drift their color every 5 min toward
# Adaptive Lighting's CURRENT sun-curve color (read off the AL switch attribute — AL computes it even
# while taken over). Color only (no brightness arg), so the one-shot ambient brightness is untouched
# and there's no lux feedback loop. "Auto" = the live color is still within ~150K of what the auto
# path last set (input_number.bedroom_light_expected_color_temp); a manual scene/slider/RGB pick fails
# that and pauses tracking until a reset/fresh turn-on re-arms it. Gated off during the wake ramp
# (fixed warm), sleep/00:00-05:00 (night warmth), away, and lights-off.
- id: bedroom_color_track
  alias: Bedroom color tracking
  description: While in auto, slowly follow Adaptive Lighting's sun-curve color without touching brightness.
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: state
      entity_id: light.bedroom_lights
      state: "on"
    - condition: state
      entity_id: person.daniel
      state: "home"
    - condition: state
      entity_id: input_boolean.bedroom_manual_off
      state: "off"
    - condition: state
      entity_id: input_boolean.bedroom_sleep_mode
      state: "off"
    # Not the deep-night warmth window (00:00-05:00).
    - condition: template
      value_template: "{{ now().hour >= 5 }}"
    # Not during the wake ramp (it owns a fixed warm color).
    - condition: template
      value_template: >-
        {% set ws = states('sensor.bedroom_wake_start') %}
        {% from 'lighting.jinja' import in_wake_window %}
        {{ not (in_wake_window((now() - as_datetime(ws)).total_seconds() / 60 if ws not in ['unknown', 'unavailable'] else -1) | bool) }}
    # Only when the bulb is in color-temp mode (a manual RGB pick switches color_mode to xy -> skip).
    - condition: template
      value_template: "{{ state_attr('light.bedroom_lights', 'color_mode') == 'color_temp' }}"
    # Still "auto": live color within ~150K of what the auto path last set (else a manual color is active).
    - condition: template
      value_template: >-
        {{ (state_attr('light.bedroom_lights', 'color_temp_kelvin') | int(0)
            - states('input_number.bedroom_light_expected_color_temp') | int(0)) | abs <= 150 }}
  action:
    - variables:
        al_ct: "{{ state_attr('switch.bedroom_adaptive_lighting_bedroom', 'color_temp_kelvin') | int(0) }}"
    # Skip if AL's color is unreadable (0) — don't slam the lights to a bogus value.
    - condition: template
      value_template: "{{ al_ct > 0 }}"
    - service: light.turn_on
      target:
        entity_id: light.bedroom_lights
      data:
        color_temp_kelvin: "{{ al_ct }}"
        transition: 290
    - service: input_number.set_value
      target:
        entity_id: input_number.bedroom_light_expected_color_temp
      data:
        value: "{{ al_ct }}"

# Unified threshold alert engine: ALL `threshold` binary-sensors in configuration.yaml.j2 (air
# quality CO2/PM2.5/VOC/NOx + the SEVERE tier, battery FP300/Tap Dial, humidity high/low) feed this
# ONE automation. Hysteresis lives in the threshold sensors, so this just reacts to off<->on edges,
# anchored on off<->on (NOT unknown) so an HA restart while bad doesn't re-alert and an unavailable
# source can't false-alert (sensor-offline owns offline). The category is encoded in each trigger id
# (<category>_bad / <category>_ok); everything else is derived generically from the triggering
# sensor. Per-category differences live in the `cfg` map: title, `pulse` (light flash, air quality
# only), `watch` (wrist buzz), `pierce` (sound through DND — severe air quality only), `recovery`
# (whether to send a "back to normal" notice). All notify routes through script.bedroom_notify
# (DND/sleep-aware channel + importance + watch mirroring). Adding a metric = one threshold sensor +
# add it to its category's two trigger lists; a NEW category = two trigger blocks + one `cfg` entry.
- id: bedroom_threshold_alert
  alias: Bedroom threshold alert
  description: Notify when any air-quality/battery/humidity threshold crosses; recovery when it clears; pulse the lights for air quality only.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
        - binary_sensor.bedroom_nox_high
      from: "off"
      to: "on"
      for: "00:00:30"
      id: airquality_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_pm2_5_high
        - binary_sensor.bedroom_voc_high
        - binary_sensor.bedroom_nox_high
      from: "on"
      to: "off"
      for: "00:00:30"
      id: airquality_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_severe
        - binary_sensor.bedroom_pm2_5_severe
        - binary_sensor.bedroom_voc_severe
        - binary_sensor.bedroom_nox_severe
      from: "off"
      to: "on"
      for: "00:00:30"
      id: airqualitysevere_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_severe
        - binary_sensor.bedroom_pm2_5_severe
        - binary_sensor.bedroom_voc_severe
        - binary_sensor.bedroom_nox_severe
      from: "on"
      to: "off"
      for: "00:00:30"
      id: airqualitysevere_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_fp300_battery_low
        - binary_sensor.bedroom_tap_dial_battery_low
      from: "off"
      to: "on"
      for: "00:01:00"
      id: battery_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_fp300_battery_low
        - binary_sensor.bedroom_tap_dial_battery_low
      from: "on"
      to: "off"
      for: "00:01:00"
      id: battery_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_humidity_high
        - binary_sensor.bedroom_humidity_low
      from: "off"
      to: "on"
      for: "00:05:00"
      id: humidity_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_humidity_high
        - binary_sensor.bedroom_humidity_low
      from: "on"
      to: "off"
      for: "00:05:00"
      id: humidity_ok
    - platform: state
      entity_id:
        - binary_sensor.bedroom_temp_high
        - binary_sensor.bedroom_temp_low
      from: "off"
      to: "on"
      for: "00:05:00"
      id: temperature_bad
    - platform: state
      entity_id:
        - binary_sensor.bedroom_temp_high
        - binary_sensor.bedroom_temp_low
      from: "on"
      to: "off"
      for: "00:05:00"
      id: temperature_ok
    - platform: state
      entity_id:
        - binary_sensor.outdoor_pm2_5_high
      from: "off"
      to: "on"
      for: "00:00:30"
      id: airqualityoutdoor_bad
    - platform: state
      entity_id:
        - binary_sensor.outdoor_pm2_5_high
      from: "on"
      to: "off"
      for: "00:00:30"
      id: airqualityoutdoor_ok
    - platform: state
      entity_id:
        - binary_sensor.outdoor_pm2_5_severe
      from: "off"
      to: "on"
      for: "00:00:30"
      id: airqualityoutdoorsevere_bad
    - platform: state
      entity_id:
        - binary_sensor.outdoor_pm2_5_severe
      from: "on"
      to: "off"
      for: "00:00:30"
      id: airqualityoutdoorsevere_ok
  action:
    # Derive everything from the triggering threshold sensor — its `entity_id` attribute points at
    # its SOURCE sensor (live value + unit); the label is the threshold sensor's own friendly name
    # with the trailing " high"/" low" stripped (the extra ' low' strip is what makes battery and
    # the low-humidity sensor read correctly). Category + edge come from the trigger id.
    - variables:
        category: "{{ trigger.id.split('_')[0] }}"
        edge: "{{ trigger.id.split('_')[1] }}"
        src: "{{ trigger.to_state.attributes.entity_id }}"
        label: "{{ trigger.to_state.attributes.friendly_name | replace(' high', '') | replace(' low', '') | replace(' severe', '') }}"
        value: "{{ states(src) }}"
        unit: "{{ state_attr(src, 'unit_of_measurement') or '' }}"
        unit_sp: "{{ ' ' ~ unit if unit else '' }}"
        # Same tag for bad + recovery → the recovery replaces the alert on the phone.
        tag: "threshold_alert_{{ trigger.entity_id }}"
        # Per-category routing flags. `pulse` = brief red light flash (air quality only). `watch` =
        # also buzz the wrist (glanceable). `pierce` = sound even while quiet/DND (severe air quality
        # only — the can't-miss tier). `critical_away` = push while AWAY instead of holding for the
        # arrival digest (temperature only — it's the damage-class safety net for when nobody's home;
        # it does NOT pierce DND at home, so it's a tier below `pierce`). `recovery` = send a "back to
        # normal" notice (severe skips it; the moderate recovery covers it). All notify goes through
        # script.bedroom_notify (DND-aware).
        cfg: >-
          {{ {'airquality':       {'bad': '⚠️ Air quality', 'ok': '✅ Air quality', 'pulse': true,  'watch': true,  'pierce': false, 'recovery': true},
              'airqualitysevere': {'bad': '🚨 Air quality HIGH', 'ok': '✅ Air quality', 'pulse': true, 'watch': true, 'pierce': true, 'recovery': false},
              'battery':          {'bad': '🔋 Battery low', 'ok': '🔋 Battery OK', 'pulse': false, 'watch': false, 'pierce': false, 'recovery': true},
              'humidity':         {'bad': '💧 Humidity', 'ok': '💧 Humidity OK', 'pulse': false, 'watch': false, 'pierce': false, 'recovery': true},
              'temperature':      {'bad': '🌡️ Temperature', 'ok': '🌡️ Temperature OK', 'pulse': false, 'watch': true,  'pierce': false, 'critical_away': true, 'recovery': true},
              'airqualityoutdoor':       {'bad': '🌫️ Outdoor air', 'ok': '✅ Outdoor air', 'pulse': false, 'watch': true,  'pierce': false, 'recovery': true},
              'airqualityoutdoorsevere': {'bad': '🚨 Outdoor air HIGH', 'ok': '✅ Outdoor air', 'pulse': false, 'watch': true, 'pierce': true, 'recovery': false}}[category] }}
        # Air-quality bad alerts get a "Boost fan" action button (circulate the air); other
        # categories get none. Handled by bedroom_notification_action.
        boost_actions: "{{ [{'action': 'BEDROOM_BOOST_FAN', 'title': 'Boost fan'}] if category in ['airquality', 'airqualitysevere'] else [] }}"
        # A sudden spike can cross BOTH the moderate (_high) and severe (_severe) thresholds within
        # the same 30s window, firing two bad alerts at once. Flag a moderate whose matching severe
        # sensor is already on so we can suppress it (the severe alert, which pierces, supersedes it).
        # Only the indoor/outdoor air-quality categories have a severe counterpart (_high -> _severe).
        severe_shadowed: >-
          {{ category in ['airquality', 'airqualityoutdoor']
             and is_state(trigger.entity_id | replace('_high', '_severe'), 'on') }}
    - choose:
        - conditions: "{{ edge == 'bad' }}"
          sequence:
            # Suppress a moderate air-quality bad that an already-on severe sensor covers. Gate INSIDE
            # the bad branch (not via the choose condition) so a shadowed moderate can't fall through
            # to the recovery default below.
            - if: "{{ not severe_shadowed }}"
              then:
                - service: script.bedroom_notify
                  data:
                    title: "{{ cfg.bad }}"
                    message: "{{ label }} is {{ value }}{{ unit_sp }}"
                    tag: "{{ tag }}"
                    watch: "{{ cfg.watch }}"
                    pierce: "{{ cfg.pierce }}"
                    critical_away: "{{ cfg.critical_away | default(false) }}"
                    actions: "{{ boost_actions }}"
                # Light pulse only for air quality (cfg.pulse) and only when the lights are already on
                # — never wakes you, never fights Adaptive Lighting / the manual-off override at night.
                - if: "{{ cfg.pulse and is_state('light.bedroom_lights', 'on') }}"
                  then:
                    - service: script.bedroom_alert_pulse
      # off<->on edges only, so the remaining case (edge == 'ok') is the default. Recovery is always
      # routine (no watch/pierce); the severe tier skips it (cfg.recovery false).
      default:
        - if: "{{ cfg.recovery }}"
          then:
            - service: script.bedroom_notify
              data:
                title: "{{ cfg.ok }}"
                message: "{{ label }} back to normal ({{ value }}{{ unit_sp }})"
                tag: "{{ tag }}"
                recovery: true
                # A critical_away category (temperature) pushed its bad alert while away rather than
                # holding it, so its all-clear should push too (there's no hold_<tag> to cancel).
                critical_away: "{{ cfg.critical_away | default(false) }}"
          else:
            # Severe air quality (the only recovery:false categories) sends NO recovery PUSH by
            # design — the moderate recovery covers the all-clear — but its bad alert pierced and so
            # left a persistent "HIGH" note (id = tag) in the HA UI. Without this it lingered after
            # the air recovered, contradicting the live state. Dismiss the note directly (no push):
            # clears the stale HIGH while keeping the deliberate no-redundant-push behavior.
            - service: persistent_notification.dismiss
              data:
                notification_id: "{{ tag }}"

# Temperature → fan: drive fan.tower_fan from the AirGradient temperature via script.bedroom_apply_fan
# (off <72 / Low 72-74 / Medium 74-76 / High >=76 °F; Medium cap 22:00-06:00; 0.5°F deadband).
# Re-evaluates on every temperature change and at the night-cap boundaries (22:00 / 06:00) so the cap
# engages/releases even when the temperature is steady. Skipped while the manual override is on.
- id: bedroom_fan_temperature
  alias: Bedroom fan temperature control
  description: Set the tower fan speed from the AirGradient temperature (night-capped); skipped when the fan override is on.
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.bedroom_airgradient_one_temperature
    - platform: time
      at: "22:00:00"
    - platform: time
      at: "06:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.bedroom_fan_manual
      state: "off"
    # Don't drive the fan when nobody's home — else it would re-run seconds after the away-sweep
    # turns it off. The arrive nudge (bedroom_arrive_home) resumes it on return.
    - condition: state
      entity_id: person.daniel
      state: "home"
    # Ignore the boot-time temperature re-report: at HA start the AirGradient sensor comes up
    # unavailable/unknown then its first reading fires this state trigger, which would re-apply the auto
    # level while the manual override is still STALE-restored off (HA's unclean shutdown can drop a fan
    # speed you set in the ~15 min before a deploy — see bedroom_fan_startup_reconcile). Time triggers
    # (22:00/06:00) have no from_state and always pass. This first-reading skip also gives the reconcile
    # automation a clean window to rebuild the override before the second reading can drive the fan.
    - condition: template
      value_template: >-
        {{ trigger.platform != 'state'
           or (trigger.from_state is not none
               and trigger.from_state.state not in ['unknown', 'unavailable']) }}
  action:
    - service: script.bedroom_apply_fan

# Manual-fan detector: when the fan's speed / preset / on-off changes and it was NOT our own
# command, engage the override so the temperature automation backs off. The DREO push integration
# echoes our OWN commands back parent-less, so context alone can't tell them apart — we ALSO compare
# the new fan LEVEL to input_number.bedroom_fan_expected_level (what bedroom_apply_fan last
# commanded): a match = our echo (ignore), a mismatch = a real manual/remote change (flag). A preset
# change is always manual (the automation never sets preset). Triggers on the controllable
# attributes only (NOT a bare state trigger) — the fan's onboard `temperature` attribute drifts and
# would false-fire. Ignores unavailable<->state reconnect noise.
- id: bedroom_fan_manual_detect
  alias: Bedroom fan manual override detect
  description: Set the fan manual override when the fan is changed by hand (level differs from what the automation commanded).
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id: fan.tower_fan
      attribute: percentage
    - platform: state
      entity_id: fan.tower_fan
      attribute: preset_mode
    - platform: state
      entity_id: fan.tower_fan
      to: "on"
    - platform: state
      entity_id: fan.tower_fan
      to: "off"
  condition:
    - condition: template
      value_template: >-
        {% from 'fan.jinja' import pct_to_level %}
        {% set ts = trigger.to_state %}
        {% set fs = trigger.from_state %}
        {% set new_level = 0 if (ts is none or ts.state != 'on') else pct_to_level(ts.attributes.percentage) | int %}
        {% set expected = states('input_number.bedroom_fan_expected_level') | int(-1) %}
        {{ ts is not none
           and ts.state not in ['unavailable', 'unknown']
           and (fs is none or fs.state not in ['unavailable', 'unknown'])
           and ts.context.parent_id is none
           and ((trigger.attribute | default('')) == 'preset_mode' or new_level != expected) }}
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_fan_manual

# Fan override RECONCILE on restart. HA's unclean shutdown (SIGKILL on every deploy) can drop the
# input_boolean.bedroom_fan_manual + input_number.bedroom_fan_expected_level helpers when they changed
# within ~15 min of the restart (the restore_state dump cycle) — so a fan speed you just dialed by hand
# is restored STALE (override off, old expected level) and bedroom_fan_temperature re-applies the auto
# level on the first post-boot temp report (observed: a hand-set L3 bumped back to L5 after a deploy).
# This rebuilds the override from the PHYSICAL fan, whose speed the DREO cloud keeps across an HA
# restart. It captures the restored level BEFORE the temp sensor reports (so the capture can't be
# polluted by an auto re-apply racing in), then once temp is known compares it to the hysteresis-free
# auto ideal (fan_target_level with cur_level=0): under auto control the fan always tracks within ~1
# level of ideal, so a fan running MORE than 1 level off was hand-set — re-engage the override, re-arm
# expected_level, and re-assert the level (undoing any auto nudge that slipped in). Pairs with the
# from_state guard on bedroom_fan_temperature, which skips the first reading so this wins the race.
- id: bedroom_fan_startup_reconcile
  alias: Bedroom fan startup reconcile
  description: After an HA restart, rebuild the fan manual override from the physical fan so a hand-set speed survives the unclean-shutdown loss of the override helpers.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  action:
    # Capture the device's restored level FIRST — the DREO cloud holds the physical speed across the
    # restart, and the fan reconnects well before the AirGradient temp sensor's first poll.
    - wait_template: "{{ states('fan.tower_fan') in ['on', 'off'] }}"
      timeout: "00:01:30"
      continue_on_timeout: true
    - variables:
        boot_level: "{% from 'fan.jinja' import pct_to_level %}{{ (pct_to_level(state_attr('fan.tower_fan', 'percentage')) | int) if is_state('fan.tower_fan', 'on') else 0 }}"
    # Wait for the temperature so we can compute what auto WOULD pick.
    - wait_template: "{{ states('sensor.bedroom_airgradient_one_temperature') not in ['unknown', 'unavailable'] }}"
      timeout: "00:03:00"
      continue_on_timeout: true
    - variables:
        t: "{{ states('sensor.bedroom_airgradient_one_temperature') | float(-1) }}"
        is_night: "{{ now().hour >= 22 or now().hour < 6 }}"
        sleep: "{{ is_state('input_boolean.bedroom_sleep_mode', 'on') }}"
        # Hysteresis-free auto ideal — cur_level=0 bypasses fan_target_level's ±0.7-level deadband.
        ideal: "{% from 'fan.jinja' import fan_target_level %}{{ fan_target_level(t, 0, is_night, sleep) | int }}"
    # Hand-set fan? Home, fan on, temp known, running >1 level from auto's pick, and the override wasn't
    # restored (still off). The >1 tolerance absorbs the curve's hysteresis so a legit auto level never
    # trips this — only a deliberate manual speed sits that far from ideal.
    - condition: template
      value_template: >-
        {{ is_state('person.daniel', 'home')
           and (boot_level | int) > 0
           and t >= 0
           and ((boot_level | int) - (ideal | int)) | abs > 1
           and is_state('input_boolean.bedroom_fan_manual', 'off') }}
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_fan_manual
    # Arm expected_level BEFORE re-asserting, so our own cloud echo matches and bedroom_fan_manual_detect
    # doesn't re-flag it.
    - service: input_number.set_value
      target:
        entity_id: input_number.bedroom_fan_expected_level
      data:
        value: "{{ boot_level | int }}"
    # Re-assert the hand-set level last (level -> midpoint % via the shared macro, same DREO ceil
    # handling as bedroom_apply_fan), undoing any auto nudge that slipped in during boot.
    - service: fan.turn_on
      target:
        entity_id: fan.tower_fan
    - service: fan.set_percentage
      target:
        entity_id: fan.tower_fan
      data:
        percentage: "{% from 'fan.jinja' import level_to_pct %}{{ level_to_pct(boot_level | int) | int }}"

# Sensor-offline alert: any bedroom-automation dependency going `unavailable` for 5 min sends a
# phone notification; a recovery notice fires when it returns (same tag, so it replaces the alert).
# The 5-min `for:` rides out HA restarts and the ~120s deploy recreate (entities go briefly
# unavailable, then back). Detection latency differs by device class and that's inherent: the
# AirGradient ONE and DREO fan (polled integrations) go unavailable within minutes; the FP300
# (battery Zigbee) only after Z2M's passive availability timeout (60 min — see the zigbee2mqtt
# config), because a sleeping radio can't be actively pinged. Z2M availability MUST be enabled for
# the FP300 to ever go unavailable.
# The Tap Dial (RDM002) is deliberately NOT watched here: it's a passive INPUT device, so going
# quiet from disuse trips Z2M's 60-min passive timeout as a routine false positive — nothing depends
# on the dial reporting (unlike the FP300/fan/AirGradient, which feed live automations and whose
# silence actually breaks things). A genuinely dead dial is still caught by
# binary_sensor.bedroom_tap_dial_battery_low (the threshold engine) and is obvious on the next press.
# (Removed from this alert 2026-06-24 to cut idle-dial noise.)
# Adding a watched device = add its representative entity to BOTH trigger lists below (one entity
# per device suffices — Z2M flips all of a device's entities together). Brief flaps can emit a lone
# recovery with no prior alert (the offline edge needs a full 5 min down) — rare and low-harm,
# accepted like the air-quality engine.
- id: bedroom_sensor_offline_alert
  alias: Bedroom sensor offline alert
  description: Notify when a bedroom-automation dependency (AirGradient/FP300/fan) goes unavailable; recovery notice when it returns.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id:
        - sensor.bedroom_airgradient_one_carbon_dioxide
        - binary_sensor.aqara_fp300_presence
        - fan.tower_fan
      to: "unavailable"
      for: "00:05:00"
      id: offline
    - platform: state
      entity_id:
        - sensor.bedroom_airgradient_one_carbon_dioxide
        - binary_sensor.aqara_fp300_presence
        - fan.tower_fan
      from: "unavailable"
      id: recovery
  action:
    # An entity's friendly_name attribute is EMPTY while it is unavailable, so derive the human name
    # from the AVAILABLE side of the transition: to_state for recovery, from_state for offline.
    # default(entity_id, true) falls back to the raw entity_id if neither side carries a name.
    - variables:
        name: >-
          {{ (trigger.to_state.attributes.friendly_name
              if (trigger.to_state is not none and trigger.to_state.attributes.friendly_name is defined)
              else trigger.from_state.attributes.friendly_name)
             | default(trigger.entity_id, true) }}
        # Same tag for offline + recovery → the recovery replaces the alert on the phone.
        tag: "sensor_offline_{{ trigger.entity_id }}"
    - choose:
        # A dead dependency buzzes the watch (glanceable) but is routine for DND — a sensor offline
        # overnight isn't worth waking for (no pierce). Recovery is routine, phone-only.
        - conditions: "{{ trigger.id == 'offline' }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "⚠️ Sensor offline"
                message: "{{ name }} is offline (no data)"
                tag: "{{ tag }}"
                watch: true
      # from:"unavailable" edges only, so the remaining case (id == 'recovery') is the default.
      # Only notify recovery if the device was actually unavailable >= 5 min (the same threshold the
      # offline alert needs) — otherwise the unavailable→available blip on every HA/Z2M restart would
      # send a spurious "back online" with no preceding alert.
      default:
        - if: >-
            {{ trigger.from_state is not none and trigger.to_state is not none
               and (as_timestamp(trigger.to_state.last_changed) - as_timestamp(trigger.from_state.last_changed)) >= 300 }}
          then:
            - service: script.bedroom_notify
              data:
                title: "✅ Sensor back online"
                message: "{{ name }} is reporting again"
                tag: "{{ tag }}"
                recovery: true

# Home/away: turn the bedroom off when you leave the HOUSE (person.daniel) — a different layer than
# the FP300's ROOM presence. Two stages absorb GPS jitter: 'leave' at 10 min away, a 'failsafe'
# re-sweep at 30 min. Triggering on from:"home" catches leaving to any away state (not_home or a
# named zone); the `for:` cancels on an early return (mailbox/jitter bounce). Turn-off is
# unconditional (leaving always allows off) and the override booleans are left UNTOUCHED (respecting
# them = never writing them here). The fan/light on-paths are separately gated on person.daniel ==
# home (bedroom_fan_temperature, bedroom_presence_on, the morning reset's fan apply) so nothing
# turns back on while away. Known gap: an HA restart while already away misses these (from:"home"
# needs a live transition) — the gates still prevent away-on, so it self-corrects.
- id: bedroom_away
  alias: Bedroom away
  description: When you leave home (10 min) and as a 30-min failsafe, turn off the bedroom lights + fan and notify what was on.
  mode: single
  trigger:
    - platform: state
      entity_id: person.daniel
      from: "home"
      for: "00:10:00"
      id: leave
    - platform: state
      entity_id: person.daniel
      from: "home"
      for: "00:30:00"
      id: failsafe
  action:
    - variables:
        on_label: >-
          {% from 'lighting.jinja' import away_items_label %}{{ away_items_label(is_state('light.bedroom_lights', 'on'), is_state('fan.tower_fan', 'on')) }}
    - choose:
        # Only act + notify when something is actually on — so the 30-min failsafe stays silent
        # unless it caught something the 10-min leave missed (or that came on since).
        - conditions: "{{ on_label != '' }}"
          sequence:
            - service: script.bedroom_lights_set
              data:
                reason: "off"
            - service: script.bedroom_fan_set
              data:
                reason: "off"
            # Routine notify (you're not quiet when leaving) — one notify path for the whole system.
            - service: script.bedroom_notify
              data:
                title: "🏠 Left on"
                message: "Turned off bedroom {{ on_label }} (you're away)"
                tag: bedroom_away
                # Deliver NOW, don't hold for the arrival digest: bedroom_away only ever fires while
                # away, so without this the message + its "Turn back on" button are parked as a held
                # persistent_notification (flushed phone-only on arrival, actions stripped) and the
                # button can never be tapped — defeating the false-away undo it exists for.
                # critical_away pushes while away without piercing DND at home.
                critical_away: true
                # One-tap undo for a false-away (GPS jitter while you're actually home).
                actions:
                  - action: BEDROOM_AWAY_TURN_ON
                    title: Turn back on

# Arrive home nudge: resume the gated automations promptly on return (person.daniel -> home). NOT a
# welcome-home — never forces lights on. The fan resumes per the temperature band (unless the fan
# override is on); lights only re-check if you're actually standing in the bedroom (FP300 present)
# and haven't engaged the manual-off override — so arriving mid-day elsewhere in the house lights
# nothing. Both routes go through the apply_* scripts, which honor the overrides internally.
- id: bedroom_arrive_home
  alias: Bedroom arrive home
  description: On returning home, resume the fan per temperature and re-check lights if already in the bedroom.
  mode: single
  trigger:
    - platform: state
      entity_id: person.daniel
      to: "home"
  action:
    # Clear the away "Left on" note if it's still up — arriving home makes its false-away undo moot
    # (created by bedroom_away with notification_id: bedroom_away; only the BEDROOM_AWAY_TURN_ON tap
    # dismissed it before, and the hold_-prefixed arrival flush doesn't match it). A stray dismiss
    # of an absent id no-ops, so this is safe when nothing was left on.
    - service: persistent_notification.dismiss
      data:
        notification_id: bedroom_away
    - if: "{{ is_state('input_boolean.bedroom_fan_manual', 'off') }}"
      then:
        - service: script.bedroom_apply_fan
    - if: >-
        {% from 'lighting.jinja' import arrive_relight_allowed %}{{ arrive_relight_allowed(
           is_state('binary_sensor.aqara_fp300_presence', 'on'),
           is_state('input_boolean.bedroom_manual_off', 'on'),
           is_state('light.bedroom_lights', 'on')) | bool }}
      then:
        - service: script.bedroom_lights_set
          data:
            reason: "natural"

# Sleep-mode fan reapply: when bedroom_sleep_mode is toggled DIRECTLY (dashboard tile / voice), the
# fan's level cap (L2 in sleep mode) should engage/release immediately — otherwise it waits for the
# next temperature report. The bedtime / Tap-Dial / morning-reset callers flip sleep_mode
# programmatically and re-apply the fan themselves; those writes are parented, so the parent_id gate
# skips them and only a genuine manual toggle reaches the mediator.
- id: bedroom_sleep_mode_fan
  alias: Bedroom sleep mode fan reapply
  description: Re-apply the fan (via the bedroom_fan_set mediator) when sleep_mode is toggled directly, so its level cap engages/releases at once.
  mode: single
  trigger:
    - platform: state
      entity_id: input_boolean.bedroom_sleep_mode
      from: "off"
      to: "on"
    - platform: state
      entity_id: input_boolean.bedroom_sleep_mode
      from: "on"
      to: "off"
  condition:
    # Direct/external toggle only — our own automations' parented turn_on/off carry a parent_id
    # (same discriminator as bedroom_manual_light_detect / bedroom_fan_manual_detect).
    - condition: template
      value_template: "{{ trigger.to_state.context.parent_id is none }}"
    # Respect a manual fan override, and don't spin the fan in an empty house (same gates as
    # bedroom_fan_temperature).
    - condition: state
      entity_id: input_boolean.bedroom_fan_manual
      state: "off"
    - condition: state
      entity_id: person.daniel
      state: "home"
  action:
    - service: script.bedroom_fan_set
      data:
        reason: "auto"

# Flush held notifications on arrival: when you re-enter the home geofence, any alerts that were
# parked while you were away (persistent_notification ids starting with hold_) and did NOT resolve
# meanwhile are delivered as ONE "While you were out" digest, then cleared. Anything that resolved
# while away was already dismissed by its recovery (bedroom_notify), so it never appears here. The
# condition gates the whole thing so arriving with nothing held is silent. `match` is start-anchored,
# so 'hold_' won't catch the pierce path's bare-tag persistent notifications.
- id: bedroom_flush_held_notifications
  alias: Bedroom flush held notifications
  description: On arrival home, deliver any still-unresolved away-held alerts as one digest, then clear them.
  mode: single
  trigger:
    - platform: state
      entity_id: person.daniel
      to: "home"
  condition:
    - condition: template
      value_template: "{{ states.persistent_notification | selectattr('object_id', 'match', 'hold_') | list | count > 0 }}"
  action:
    - variables:
        held: "{{ states.persistent_notification | selectattr('object_id', 'match', 'hold_') | list }}"
        count: "{{ held | count }}"
        body: "{{ held | map(attribute='attributes.message') | map('regex_replace', '^', '• ') | join('\n') }}"
    - service: notify.mobile_app_pixel_9_pro
      data:
        title: "🏠 While you were out ({{ count }})"
        message: "{{ body }}"
        data:
          tag: held_digest
    - repeat:
        for_each: "{{ held | map(attribute='object_id') | list }}"
        sequence:
          - service: persistent_notification.dismiss
            data:
              notification_id: "{{ repeat.item }}"

# Bedtime: when the phone's Bedtime mode turns on (surfaced by the Pixel Watch companion app) while
# home, run the sleep routine (script.bedroom_bedtime: quiet fan cap + AL sleep mode + nightlight).
# The Tap Dial button-1 hold (in bedroom_tap_dial_control) is the manual fallback. Gated on home so
# it never sets the room up for sleep — or switches the fan on — while away. The morning reset
# unwinds it. Charging is deliberately NOT a trigger (the operator charges in-room at a desk).
- id: bedroom_bedtime
  alias: Bedroom bedtime
  description: When phone Bedtime mode turns on while home, run the bedtime/sleep routine.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.pixel_watch_3_bedtime_mode
      to: "on"
  condition:
    - condition: state
      entity_id: person.daniel
      state: "home"
  action:
    - service: script.bedroom_bedtime

# Actionable-notification dispatcher: handle taps on notification buttons. The companion app fires
# mobile_app_notification_action with the BEDROOM_* action id from the button. Buttons are attached
# by passing `actions` to script.bedroom_notify (air-quality bad -> Boost fan; away -> Turn back on;
# the bedtime prompt -> Start now). Add a new button = add its case here + pass it in the actions list.
- id: bedroom_notification_action
  alias: Bedroom notification action
  description: Dispatch taps on actionable notification buttons (mobile_app_notification_action).
  mode: queued
  max: 10
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
  action:
    - choose:
        # Boost fan: max circulation. Engages the manual override so it persists (clear via Tap Dial
        # button 3 or the morning reset). Honest caveat: moves air, doesn't lower CO2.
        - conditions: "{{ trigger.event.data.action == 'BEDROOM_BOOST_FAN' }}"
          sequence:
            - service: script.bedroom_fan_set
              data:
                reason: "boost"
        - conditions: "{{ trigger.event.data.action == 'BEDROOM_START_BEDTIME' }}"
          sequence:
            - service: script.bedroom_bedtime
        # Undo a false-away: restore lights + fan. Calls the apply_* scripts directly so they ignore
        # the home-gates (you're tapping because the tracker is wrong / you're actually home).
        - conditions: "{{ trigger.event.data.action == 'BEDROOM_AWAY_TURN_ON' }}"
          sequence:
            - service: script.bedroom_lights_set
              data:
                reason: "natural"
            - service: script.bedroom_fan_set
              data:
                reason: "auto"
            # Clear the "Left on" HA persistent note (the critical_away visibility fallback) now that
            # you've acted on it — the bedroom_away tag has no recovery path of its own.
            - service: persistent_notification.dismiss
              data:
                notification_id: bedroom_away

# Bedtime prompt: at 22:00, if you're in the bedroom and haven't started bedtime, send a nudge with
# a "Start now" button (-> BEDROOM_START_BEDTIME -> script.bedroom_bedtime). Gated on present + not
# already in sleep mode + home, so it only nudges when you're actually around and haven't gone to bed.
- id: bedroom_bedtime_prompt
  alias: Bedroom bedtime prompt
  description: At wind-down time (alarm − 8h, or 22:30 fallback on no-alarm nights), if present and not yet in sleep mode, prompt to start the bedtime routine.
  mode: single
  trigger:
    - platform: time
      at: sensor.bedroom_winddown_start
      id: dynamic
    - platform: time
      at: "22:30:00"
      id: fallback
  condition:
    - condition: state
      entity_id: binary_sensor.aqara_fp300_presence
      state: "on"
    - condition: state
      entity_id: input_boolean.bedroom_sleep_mode
      state: "off"
    - condition: state
      entity_id: person.daniel
      state: "home"
    # The fixed 22:30 fallback only fires on no-alarm nights (sensor unavailable) -> no double prompt
    # on a night that already has an alarm-anchored dynamic trigger.
    - condition: template
      value_template: "{{ trigger.id == 'dynamic' or states('sensor.bedroom_winddown_start') in ['unknown', 'unavailable'] }}"
  action:
    - service: script.bedroom_notify
      data:
        title: "🌙 Ready for bed?"
        message: "Tap to start the bedtime routine."
        tag: bedtime_prompt
        actions:
          - action: BEDROOM_START_BEDTIME
            title: Start now

# Update-available digest: weekly (Sunday 10:00) roundup of pending device/integration updates that
# Renovate doesn't cover — Zigbee/sensor firmware + HACS integrations. Generic over ALL update.*
# entities (a newly paired device joins automatically). NOTIFY-ONLY — never auto-flashes firmware.
# Homelab-wide (no bedroom_ prefix) but routes through the shared bedroom_notify layer (routine).
- id: update_available_digest
  alias: Update available digest
  description: Sunday 10:00 — notify a digest of any device/integration updates available (notify-only).
  mode: single
  trigger:
    - platform: time
      at: "10:00:00"
  condition:
    # Sunday only (Mon=0 .. Sun=6), and only if at least one update is actually pending.
    - condition: template
      value_template: "{{ now().weekday() == 6 }}"
    - condition: template
      value_template: "{{ states.update | selectattr('state', 'eq', 'on') | list | count > 0 }}"
  action:
    - variables:
        pending: "{{ states.update | selectattr('state', 'eq', 'on') | list }}"
        # One bullet per pending update: "• <name> (<installed> → <latest>)". Zigbee versions are
        # opaque build integers / IEEE names until devices are renamed in Z2M — still informative.
        lines: >-
          {% for u in pending %}{{ '\n• ' ~ u.name ~ ' (' ~ (state_attr(u.entity_id, 'installed_version') | string) ~ ' → ' ~ (state_attr(u.entity_id, 'latest_version') | string) ~ ')' }}{% endfor %}
    - service: script.bedroom_notify
      data:
        title: "📦 {{ pending | count }} update(s) available"
        message: "{{ lines }}"
        tag: update_digest

# Unexpected-occupancy tripwire: FP300 presence newly detected (off->on, 30s) while you're away ->
# security alert. Triggers on the EDGE (a fresh detection), so a GPS glitch while you're physically
# present can't fire it (presence already on). Away guard requires person not-home for >5 min, so a
# brief away-glitch-then-return can't alarm; the fan is off while away (no airflow false-positive).
# watch + pierce (a security event should reach you even in DND). Pairs with the home/away logic.
- id: bedroom_unexpected_occupancy
  alias: Bedroom unexpected occupancy
  description: Alert (watch + pierce) when the bedroom is occupied while you're away.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.aqara_fp300_presence
      from: "off"
      to: "on"
      for: "00:00:30"
  condition:
    - condition: template
      value_template: >-
        {{ states('person.daniel') not in ['home', 'unknown', 'unavailable']
           and (now() - states.person.daniel.last_changed).total_seconds() > 300 }}
  action:
    - service: script.bedroom_notify
      data:
        title: "🚨 Bedroom occupied"
        message: "Motion detected in the bedroom while you're away."
        tag: unexpected_occupancy
        watch: true
        pierce: true

# Quarterly CO2 calibration reminder: the AirGradient ONE's SenseAir CO2 sensor drifts over months,
# which would quietly skew the air-quality alert thresholds. 4x/year (the 1st of Jan/Apr/Jul/Oct at
# 10:00 — daily trigger + a date condition, same shape as update_available_digest) nudge to
# recalibrate. NOTIFY-ONLY with the live reading + an air-out-FIRST instruction: manual calibration
# sets the CURRENT reading as the 400 ppm baseline, so it must be done at the outdoor baseline. A
# one-tap "calibrate now" button is deliberately omitted — an accidental tap on stale indoor air
# would lock in a wrong baseline. Routine via bedroom_notify (phone-only, silent while quiet).
- id: bedroom_co2_calibration_reminder
  alias: Bedroom CO2 calibration reminder
  description: Quarterly nudge to recalibrate the AirGradient CO2 sensor against the outdoor ~400 ppm baseline.
  mode: single
  trigger:
    - platform: time
      at: "10:00:00"
  condition:
    - condition: template
      value_template: "{{ now().day == 1 and now().month in [1, 4, 7, 10] }}"
  action:
    - service: script.bedroom_notify
      data:
        title: "🌬️ CO₂ sensor calibration due"
        message: >-
          Air the room out (~15 min, window open) to reach the outdoor ~400 ppm baseline, then press
          the AirGradient "Calibrate CO₂" button (Settings → Devices → AirGradient ONE). Current
          reading: {{ states('sensor.bedroom_airgradient_one_carbon_dioxide') }} ppm.
        tag: co2_calibration_reminder

# UPS power-event alert: nothing else watches the UPS. Driven off the RAW NUT status flags
# (sensor.apc_ups_status_data: "OL"=online, "OB"=on battery, "LB"=low battery, "CHRG"=charging) —
# more reliable than the friendly status string. Triggers on every status_data change and derives the
# edge from from_state/to_state, requiring BOTH sides valid (not unavailable) so the unavailable->OL
# reconnect on every HA restart can't fire a spurious "Power restored" (the same startup-spam trap the
# sensor-offline recovery hit). Three edges: newly on battery (outage), newly low battery (server may
# shut down — pierce DND), and recovered (was on battery, mains back). One coalescing tag so the
# lifecycle outage -> low battery -> restored replaces in place. Homelab-wide (no bedroom_ prefix) but
# routes through the shared bedroom_notify layer, like the update digest.
- id: ups_power_event
  alias: UPS power event
  description: Notify when the UPS goes on battery (outage), warn on low battery, and recover when mains returns.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id: sensor.apc_ups_status_data
  condition:
    # Ignore unavailable<->value reconnect noise: only act on transitions between two real flag values.
    - condition: template
      value_template: >-
        {{ trigger.to_state is not none and trigger.to_state.state not in ['unavailable', 'unknown']
           and trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}
  action:
    - variables:
        prev: "{{ trigger.from_state.state }}"
        cur: "{{ trigger.to_state.state }}"
        was_ob: "{{ 'OB' in prev }}"
        is_ob: "{{ 'OB' in cur }}"
        was_lb: "{{ 'LB' in prev }}"
        is_lb: "{{ 'LB' in cur }}"
        charge: "{{ states('sensor.apc_ups_battery_charge') }}"
        runtime_min: "{{ (states('sensor.apc_ups_battery_runtime') | float(0) / 60) | round }}"
    - choose:
        # Newly low battery FIRST — the can't-miss tier. `choose:` is first-match-wins, so a sudden
        # OL->"OB LB" transition (battery already weak when mains drops, both flags set in one step)
        # must hit this pierce branch and not be shadowed by the routine outage branch below. The
        # normal OL->OB->"OB LB" sequence is unaffected: on the OL->OB step is_lb is false, so the
        # outage branch still fires, then this one fires on the later OB->"OB LB" step.
        - conditions: "{{ is_lb and not was_lb }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "🪫 UPS low battery"
                message: "Battery critical ({{ charge }}%) — server may shut down. ~{{ runtime_min }} min left."
                tag: ups_power
                watch: true
                pierce: true
        # Newly on battery — a routine outage. Watch buzz; routine for DND (a brief blip shouldn't wake
        # you; the low-battery escalation above is the can't-miss one).
        - conditions: "{{ is_ob and not was_ob }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "🔌 Power outage"
                message: "UPS on battery ({{ charge }}% · ~{{ runtime_min }} min runtime)."
                tag: ups_power
                watch: true
        # Recovered — was on battery, mains is back (can only be a genuine OB->OL runtime transition,
        # never the startup reconnect, because from_state must be a valid OB flag, not unavailable).
        - conditions: "{{ was_ob and not is_ob }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "✅ Power restored"
                message: "Mains power back; UPS online ({{ charge }}%)."
                tag: ups_power
                recovery: true

# Zigbee bridge offline alert: binary_sensor.zigbee2mqtt_bridge_connection_state (HA auto-discovers it
# from Z2M; on=online / off=offline, fed by the zigbee2mqtt/bridge/state topic) going `off` means the
# WHOLE Zigbee mesh is down — coordinator unreachable, Z2M crashed, or MQTT dropped. Because Mosquitto
# publishes Z2M's MQTT Last-Will 'offline' if Z2M disconnects, this fires even on a hard Z2M crash as
# long as Mosquitto + HA are up — ONE fast root-cause signal vs. waiting on the per-device
# bedroom_sensor_offline_alert (5 min × each device). The 2-min `for:` rides out the brief
# offline/online flap on a Z2M restart/redeploy (and HA's own restart, where the sensor is briefly
# unknown). Routine + watch — same severity model as the per-device offline alert (glanceable, silent
# in DND/sleep, and a mesh outage often self-heals). Homelab-wide (no bedroom_ prefix), shared notify.
- id: zigbee_bridge_offline
  alias: Zigbee bridge offline alert
  description: Notify when the Zigbee2MQTT bridge goes offline (whole mesh down); recovery when it returns.
  mode: queued
  max: 10
  trigger:
    - platform: state
      entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state
      to: "off"
      for: "00:02:00"
      id: offline
    - platform: state
      entity_id: binary_sensor.zigbee2mqtt_bridge_connection_state
      from: "off"
      to: "on"
      id: recovery
  action:
    - choose:
        - conditions: "{{ trigger.id == 'offline' }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "🛑 Zigbee bridge offline"
                message: "Zigbee2MQTT / the coordinator is down — all Zigbee devices are unavailable."
                tag: zigbee_bridge
                watch: true
      # from:"off" -> "on" recovery edge only (the remaining default case). Same tag replaces the alert.
      default:
        - service: script.bedroom_notify
          data:
            title: "✅ Zigbee bridge online"
            message: "Zigbee2MQTT is back; devices are reconnecting."
            tag: zigbee_bridge
            recovery: true

# AL self-on suppression: Adaptive Lighting re-applies its managed state on every HA start and turns
# light.bedroom_lights ON by itself (AL's own log flags this; it happens on every deploy, ~120s). Cancel
# it — but ONLY when the room is empty AND it's not the morning wake window, so it never fights a
# legitimate on-state (worst case it leaves the lights on = status quo, never off-when-you-want-on). The
# 20s delay must outlast AL's startup apply; if a restart shows AL re-on the lights AFTER this fires,
# bump the delay (watch `custom_components.adaptive_lighting` in the log for the apply timing).
- id: bedroom_al_startup_suppress
  alias: Bedroom suppress AL self-on at startup
  description: AL turns the bedroom lights on by itself after every HA restart; turn them back off unless the room is occupied or it's the wake window.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  action:
    - delay: "00:00:20"
    - if: >-
        {{ is_state('binary_sensor.aqara_fp300_presence', 'off')
           and states('sensor.bedroom_wake_start') in ['unknown', 'unavailable'] }}
      then:
        - service: script.bedroom_lights_set
          data:
            reason: "off"

# HA automation-engine heartbeat: stamp input_datetime.ha_heartbeat with now() every minute so its
# last_changed stays fresh ONLY while the automation scheduler is executing. monitor-bridge polls it
# (check_ha_heartbeat) over the apps net and pushes the "Home Assistant Automations" Kuma monitor down
# when it goes stale — detecting a wedged-but-running HA the container healthcheck (HTTP :8123) can't
# see. No conditions (must tick unconditionally); homelab-wide (no bedroom_ prefix); does NOT route
# through bedroom_notify. Excluded from the recorder (see configuration.yaml). Spec:
# docs/superpowers/specs/2026-06-19-ha-automation-heartbeat-watchdog-design.md.
- id: ha_heartbeat
  alias: HA heartbeat
  description: Stamp input_datetime.ha_heartbeat every minute so monitor-bridge can detect a wedged automation engine.
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/1"
  action:
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ha_heartbeat
      data:
        timestamp: "{{ now().timestamp() }}"

# Window advisor: suggest opening a window when it's worth it AND safe. Two paths, both gated on
# OUTDOOR air being safe + no dirtier than indoors (the smoke guard lives in ventilation.jinja, so
# this can never advise ventilating into bad air): (a) STALE — indoor CO2/VOC crossed high while it's
# clean + comfortable outside; (b) COOL — the room is warm and it's meaningfully cooler + clean
# outside (free cooling vs. running the fan). The decision is the tested ventilation_advice macro;
# this automation only reads entities + notifies. Routine via bedroom_notify (silent while DND/sleep,
# phone-only, away-hold-aware), coalescing tag so a persistent condition refreshes in place. The
# cooling 'above: 78' trigger must track the macro's comfort_hi default (78). No cooldown initially —
# the routine channel updates the same tag silently; add a debounce only if it proves chatty.
- id: bedroom_window_advisor
  alias: Bedroom window advisor
  description: Suggest opening a window for stale air or free cooling when outdoor air is safe.
  mode: single
  trigger:
    # Stale-air edge: indoor CO2/VOC crosses high (fires promptly, once per episode).
    - platform: state
      entity_id:
        - binary_sensor.bedroom_co2_high
        - binary_sensor.bedroom_voc_high
      from: "off"
      to: "on"
    # Free-cooling: the room crosses into "warm" (edge, 5-min stable — NOT a `for:` on a noisy temp
    # value, which would never settle). Re-checked when outdoor PM updates (~every 30 min) so a
    # clearing-outside while already warm still nudges. A time-pattern is intentionally avoided.
    - platform: numeric_state
      entity_id: sensor.bedroom_airgradient_one_temperature
      above: 78
      for: "00:05:00"
    - platform: state
      entity_id: sensor.outdoor_pm2_5
  condition:
    - condition: state
      entity_id: person.daniel
      state: "home"
    - condition: state
      entity_id: input_boolean.bedroom_sleep_mode
      state: "off"
  action:
    # The macro is evaluated ONCE here (DRY — no duplicate call in a condition gate). When the
    # verdict is 'none' (e.g. an outdoor-PM poll fired but nothing's actionable) the choose below
    # matches no branch and the automation no-ops. Single-line {% from %}{{ }} (no surrounding
    # whitespace) so verdict is exactly 'stale'/'cool'/'none' — same single-line import pattern as
    # the fan.jinja use elsewhere in this file.
    - variables:
        verdict: "{% from 'ventilation.jinja' import ventilation_advice %}{{ ventilation_advice(states('sensor.bedroom_airgradient_one_temperature'), state_attr('weather.forecast_home', 'temperature'), states('sensor.bedroom_airgradient_one_pm2_5'), states('sensor.outdoor_pm2_5'), is_state('binary_sensor.bedroom_co2_high', 'on') or is_state('binary_sensor.bedroom_voc_high', 'on'), states('sensor.outdoor_pm10')) }}"
        out_temp: "{{ state_attr('weather.forecast_home', 'temperature') | float(0) | round }}"
        in_temp: "{{ states('sensor.bedroom_airgradient_one_temperature') | round }}"
        co2: "{{ states('sensor.bedroom_airgradient_one_carbon_dioxide') }}"
    - choose:
        - conditions: "{{ verdict == 'stale' }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "🪟 Open a window?"
                message: "Air's stale (CO₂ {{ co2 }} ppm) — it's {{ out_temp }}°F & clean outside. Crack a window."
                tag: window_advice
        - conditions: "{{ verdict == 'cool' }}"
          sequence:
            - service: script.bedroom_notify
              data:
                title: "🪟 Free cooling"
                message: "It's {{ out_temp }}°F outside ({{ in_temp - out_temp }}° cooler) & clean — open up instead of the fan."
                tag: window_advice

# ── Nest Hub Max dashboard (cast to media_player.bedroom_display) ─────────────────────────────────
# Keep the Bedroom Lovelace view up on the Hub while the room is lit + awake; let it fall back to the
# Hub's ambient screen when dark or in sleep mode. Cast itself is config-entry/UI-only (known_hosts =
# 10.0.0.137); these just drive cast.show_lovelace_view / media_player.turn_off. Lux thresholds
# (show > 60, dark < 50; FP300 reads ~553 lights-on / ~48 lights-off) are STARTING POINTS — tune here.
- id: bedroom_display_show
  alias: Bedroom display keep dashboard up
  description: >-
    Re-cast the Bedroom Lovelace view to media_player.bedroom_display while the room is lit
    (FP300 illuminance > 60) and not in sleep mode. Only casts when the Hub is NOT already playing
    something (state != playing) so it never re-casts an already-shown dashboard (no flicker) nor
    overrides user-started media; re-establishes after an HA restart or when the Hub returns to its
    ambient screen.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
    - platform: time_pattern
      minutes: "/10"
    - platform: state
      entity_id: media_player.bedroom_display
      to:
        - idle
        - "off"
        - standby
    - platform: state
      entity_id: input_boolean.bedroom_sleep_mode
      to: "off"
    - platform: numeric_state
      entity_id: sensor.aqara_fp300_illuminance
      above: 60
      for: "00:00:30"
  condition:
    - condition: state
      entity_id: input_boolean.bedroom_sleep_mode
      state: "off"
    - condition: numeric_state
      entity_id: sensor.aqara_fp300_illuminance
      above: 60
    # The Hub must actually be reachable. When it's unavailable/unknown (powered off, off the
    # network, or its cast connection to HA is down), every re-cast fails — flooding the log with
    # pychromecast NotConnected errors AND logging the cast user's refresh_token in plaintext on
    # each attempt. Gate those states out so we only (re)cast a Hub that can receive it.
    - condition: not
      conditions:
        - condition: state
          entity_id: media_player.bedroom_display
          state:
            - unavailable
            - unknown
    # Only (re)cast when the Hub isn't actively showing something — avoids flicker on an already-cast
    # dashboard and never clobbers user-started media (both report media_player state 'playing').
    - condition: not
      conditions:
        - condition: state
          entity_id: media_player.bedroom_display
          state: playing
  action:
    - service: cast.show_lovelace_view
      data:
        entity_id: media_player.bedroom_display
        dashboard_path: lovelace
        view_path: bedroom

- id: bedroom_display_dismiss
  alias: Bedroom display go ambient when dark or sleeping
  description: >-
    Send the Hub back to its ambient screen the moment the room goes dark (FP300 illuminance < 50)
    or sleep mode turns on — but ONLY if it is currently showing the HA dashboard
    (app_name == "Home Assistant Lovelace"), so user-started media is never interrupted. Edge-
    triggered (not periodic) so it can't repeatedly kill media later.
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.aqara_fp300_illuminance
      below: 50
      for: "00:00:30"
    - platform: state
      entity_id: input_boolean.bedroom_sleep_mode
      to: "on"
  condition:
    - condition: state
      entity_id: media_player.bedroom_display
      attribute: app_name
      state: "Home Assistant Lovelace"
  action:
    - service: media_player.turn_off
      target:
        entity_id: media_player.bedroom_display
# HA runtime-error alert (homelab-wide, no bedroom_ prefix). Actively notifies when OUR code
# (automations/scripts/template sensors/template helpers) logs an ERROR/CRITICAL at runtime — the
# runtime complement to the static validation (a macro that throws on an edge case, a template that
# errors at render). Scope is the pure, tested error_in_scope(level, logger) macro
# (custom_templates/diagnostics.jinja); third-party/HACS chatter and WARNINGs are excluded there.
# Routine via bedroom_notify (silent while DND/sleep, held-then-digested while away). The per-source
# tag coalesces a repeating error into one updating notification. Loop-guard: this automation must
# not re-trigger on an ERROR it (directly or indirectly) caused — so the condition excludes BOTH its
# own logger AND the notify script's. A failing notify path (e.g. a lapsed FCM token raising
# service_not_found, logged under homeassistant.components.script.bedroom_notify) would otherwise
# re-fire this alert -> call bedroom_notify -> error again: a self-sustaining loop exactly when
# notifications are already broken. Spec: docs/superpowers/specs/2026-06-22-ha-runtime-error-alert-design.md.
- id: ha_runtime_error_alert
  alias: HA runtime error alert
  description: Notify when one of our automations/scripts/templates logs an ERROR/CRITICAL at runtime.
  mode: queued
  max: 10
  trigger:
    - platform: event
      event_type: system_log_event
  condition:
    - condition: template
      value_template: >-
        {% from 'diagnostics.jinja' import error_in_scope %}
        {{ (error_in_scope(trigger.event.data.level, trigger.event.data.name) | bool)
           and trigger.event.data.name != 'homeassistant.components.automation.ha_runtime_error_alert'
           and not (trigger.event.data.name | string).startswith('homeassistant.components.script.bedroom_notify') }}
  action:
    - service: script.bedroom_notify
      data:
        title: "⚠️ HA error: {{ trigger.event.data.name.split('.')[-1] }}"
        message: "{{ (trigger.event.data.message | join(' '))[:200] }}"
        tag: "ha_error_{{ trigger.event.data.name | replace('.', '_') }}"
