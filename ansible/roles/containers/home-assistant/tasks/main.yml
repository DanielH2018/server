---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      # HA auto-loads custom_templates/*.jinja at startup (shared Jinja macros — see fan.jinja).
      - "{{ container_item.name }}/config/custom_templates"

- name: Create configuration.yaml from template
  tags: [config]
  ansible.builtin.template:
    src: configuration.yaml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/configuration.yaml"
    mode: "0664"
  register: home_assistant_config

# HA secrets.yaml — resolves the !secret references in configuration.yaml (Google Assistant
# service-account fields + project_id, derived from the SOPS google_assistant_service_account JSON;
# external_url/internal_url for Google Cast). Ansible-rendered (NOT copy'd) so the domain var and
# SOPS values can be templated here, kept out of the verbatim-copied configuration.yaml.
- name: Create Home Assistant secrets.yaml from template
  tags: [config]
  ansible.builtin.template:
    src: secrets.yaml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/secrets.yaml"
    mode: "0640"
  no_log: true  # contains the Google service-account private key
  register: home_assistant_secrets

- name: Create entity customizations from template
  tags: [config]
  ansible.builtin.template:
    src: customize.yaml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/customize.yaml"
    mode: "0664"
  register: home_assistant_customize

- name: Create root Lovelace dashboard from template
  tags: [config]
  ansible.builtin.template:
    src: ui-lovelace.yaml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/ui-lovelace.yaml"
    mode: "0664"
  register: home_assistant_dashboard

- name: Remove the superseded per-dashboard file (migrated to root ui-lovelace.yaml)
  tags: [config]
  ansible.builtin.file:
    path: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/dashboards"
    state: absent

# Automations + scenes are shipped as STATIC files via copy (not template): HA automation
# YAML uses {{ }} Jinja that Ansible's templater would try to render and fail. copy ships
# them verbatim. Git is the source of truth; UI edits are overwritten on deploy.
- name: Deploy automations from static file
  tags: [config]
  ansible.builtin.copy:
    src: automations.yaml
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/automations.yaml"
    mode: "0664"
  register: home_assistant_automations

- name: Deploy scenes from static file
  tags: [config]
  ansible.builtin.copy:
    src: scenes.yaml
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/scenes.yaml"
    mode: "0664"
  register: home_assistant_scenes

- name: Deploy scripts from static file
  tags: [config]
  ansible.builtin.copy:
    src: scripts.yaml
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/scripts.yaml"
    mode: "0664"
  register: home_assistant_scripts

- name: Deploy template sensors from static file
  tags: [config]
  ansible.builtin.copy:
    src: templates.yaml
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/templates.yaml"
    mode: "0664"
  register: home_assistant_templates

- name: Deploy REST sensors from static file
  tags: [config]
  ansible.builtin.copy:
    src: rest.yaml
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/rest.yaml"
    mode: "0664"
  register: home_assistant_rest

# Shared HA Jinja macros (custom_templates/*.jinja), imported by automations/scripts/templates.
# Whole-directory copy (HA Jinja, not Ansible-templated) so new macro files ship automatically —
# same copy-not-template reason as automations/scenes/scripts.
- name: Deploy custom Jinja templates from static files
  tags: [config]
  ansible.builtin.copy:
    src: custom_templates/
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/config/custom_templates/"
    mode: "0664"
  register: home_assistant_custom_templates

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # All three are bind-mounted templated configs — recreate so HA reloads them on edit.
    common_config_changed: "{{ (home_assistant_config is changed) or (home_assistant_secrets is changed) or (home_assistant_customize is changed) or (home_assistant_dashboard is changed) or (home_assistant_automations is changed) or (home_assistant_scenes is changed) or (home_assistant_scripts is changed) or (home_assistant_templates is changed) or (home_assistant_rest is changed) or (home_assistant_custom_templates is changed) }}"
