---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "{{ container_item.name }}/cache"
      - "{{ container_item.name }}/logs"
      - "{{ container_item.name }}/rclone"
      - "{{ container_item.name }}/scripts"

- name: Deploy Kopia entrypoint script
  tags: [config]
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/scripts/entrypoint.sh"
    mode: "0755"
  register: kopia_cfg_entrypoint

- name: Deploy Kopia ignore rules
  tags: [config]
  ansible.builtin.template:
    src: kopiaignore.j2
    dest: "/home/{{ sys_user }}/server/containers/.kopiaignore"
    mode: "0644"

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # entrypoint.sh is the bind-mounted container entrypoint — only a recreate applies a
    # change. kopiaignore is read at snapshot time (data, not container config), so excluded.
    common_config_changed: "{{ kopia_cfg_entrypoint is changed }}"

- name: Create restore-drill state directory
  tags: [cron]
  # monitor-bridge bind-mounts this read-only and alerts on failed/stale/missing
  # state — created here (not by Docker) so it's sys_user-writable for the cron.
  ansible.builtin.file:
    path: /var/lib/kopia-restore-drill
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the monthly restore-drill script
  tags: [cron]
  # Companion to the verify cron below: verify proves blobs are READABLE, the drill
  # proves a restore reproduces a service's files (rotating one service per month).
  ansible.builtin.copy:
    src: restore-drill.sh
    dest: /usr/local/bin/kopia-restore-drill.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule monthly Kopia restore drill
  tags: [cron]
  # 1st of the month, 05:00 — after the 00:00 snapshot, clear of the Wednesday-04:00
  # verify and the Sunday-06:00 rebuild crons. Result lands in
  # /var/lib/kopia-restore-drill/state.json -> monitor-bridge -> Kuma + syslog.
  ansible.builtin.cron:
    name: "Monthly Kopia restore drill"
    minute: "0"
    hour: "5"
    day: "1"
    job: "/usr/local/bin/kopia-restore-drill.sh"
    user: "{{ sys_user }}"
  become: true

- name: Schedule weekly Kopia backup integrity verification
  tags: [cron]
  # "A backup you've never restored isn't a backup." snapshot scheduling and retention
  # are handled inside the container (entrypoint.sh policy); this closes the remaining
  # gap — confirming the stored data is actually RESTORABLE, not merely present.
  # `kopia snapshot verify` re-reads snapshot metadata/index from B2 and, via
  # --verify-files-percent, downloads a sample of file contents and checks their hashes.
  # It runs against the already-connected repo inside the running container (reusing its
  # B2 connection + KOPIA_PASSWORD) and is read-only, so it's safe alongside the live
  # server. Output goes to syslog -> Promtail -> Loki, so a failure shows up in Grafana
  # just like the host rkhunter/aide integrity scans. The backup source is containers/
  # (config + app data, not media), so a 1% content sample is cheap on B2 egress.
  ansible.builtin.cron:
    name: "Weekly Kopia snapshot verify"
    minute: "0"
    hour: "4"
    weekday: "3"  # Wednesday — off the Monday rkhunter/aide slot to spread load
    job: >-
      /usr/bin/docker exec kopia /usr/bin/kopia snapshot verify
      --verify-files-percent=1 2>&1 | /usr/bin/logger -t kopia-verify
    user: "{{ sys_user }}"
  become: true
