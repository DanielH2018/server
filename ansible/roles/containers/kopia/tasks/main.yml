---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"
      - "{{ container_item.name }}/cache"
      - "{{ container_item.name }}/logs"
      - "{{ container_item.name }}/rclone"
      - "{{ container_item.name }}/scripts"

- name: Deploy Kopia entrypoint script
  tags: [config]
  ansible.builtin.template:
    src: entrypoint.sh.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/scripts/entrypoint.sh"
    mode: "0755"
  register: kopia_cfg_entrypoint

- name: Deploy Kopia ignore rules
  tags: [config]
  ansible.builtin.template:
    src: kopiaignore.j2
    dest: "/home/{{ sys_user }}/server/containers/.kopiaignore"
    mode: "0644"

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # entrypoint.sh is the bind-mounted container entrypoint — only a recreate applies a
    # change. kopiaignore is read at snapshot time (data, not container config), so excluded.
    common_config_changed: "{{ kopia_cfg_entrypoint is changed }}"

- name: Deploy the shared kopia state-file helper
  tags: [cron]
  # Sourced by every kopia host cron (verify/content-verify/maintenance-check/restore-drill/
  # b2-usage) for the atomic {ts,ok,msg} state write monitor-bridge polls. Fixed absolute path so
  # each cron can `source` it; must exist before those crons run.
  ansible.builtin.copy:
    src: kopia-lib.sh
    dest: /usr/local/lib/kopia-lib.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
  become: true

- name: Create restore-drill state directory
  tags: [cron]
  # monitor-bridge bind-mounts this read-only and alerts on failed/stale/missing
  # state — created here (not by Docker) so it's sys_user-writable for the cron.
  ansible.builtin.file:
    path: /var/lib/kopia-restore-drill
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the monthly restore-drill script
  tags: [cron]
  # Companion to the verify cron below: verify proves blobs are READABLE, the drill
  # proves a restore reproduces a service's files (rotating one service per month).
  ansible.builtin.copy:
    src: restore-drill.sh
    dest: /usr/local/bin/kopia-restore-drill.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule monthly Kopia restore drill
  tags: [cron]
  # 1st of the month, 05:00 — after the 00:00 snapshot, clear of the Wednesday-04:00
  # verify and the Sunday-06:00 rebuild crons. Result lands in
  # /var/lib/kopia-restore-drill/state.json -> monitor-bridge -> Kuma + syslog.
  ansible.builtin.cron:
    name: "Monthly Kopia restore drill"
    minute: "0"
    hour: "5"
    day: "1"
    job: "/usr/local/bin/kopia-restore-drill.sh"
    user: "{{ sys_user }}"
  become: true

- name: Create B2-usage state directory
  tags: [cron]
  # monitor-bridge bind-mounts this read-only and alerts on over-threshold/stale/
  # missing state — created here (not by Docker) so it's sys_user-writable for the cron.
  ansible.builtin.file:
    path: /var/lib/kopia-b2-usage
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the daily B2-usage probe script
  tags: [cron]
  # The repo's B2 bucket is the 10 GB free tier; billable bytes (incl. hidden
  # versions) must stay under it or backups die silently. See files/b2-usage.sh.
  ansible.builtin.copy:
    src: b2-usage.sh
    dest: /usr/local/bin/kopia-b2-usage.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule daily B2-usage probe
  tags: [cron]
  # 02:30 daily — clear of the 00:00 snapshot, Wed-04:00 verify, Sun-06:00 rebuild
  # and 1st-05:00 restore drill. One version-listing call against B2 (~450 blobs ≈
  # one page); negligible API usage. Result lands in
  # /var/lib/kopia-b2-usage/state.json -> monitor-bridge -> Kuma + syslog.
  ansible.builtin.cron:
    name: "Daily Kopia B2 usage probe"
    minute: "30"
    hour: "2"
    job: "/usr/local/bin/kopia-b2-usage.sh"
    user: "{{ sys_user }}"
  become: true

- name: Create verify state directory
  tags: [cron]
  # monitor-bridge bind-mounts this read-only and alerts on a failed/stale/missing
  # verify — created here (not by Docker) so it's sys_user-writable for the cron.
  ansible.builtin.file:
    path: /var/lib/kopia-verify
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the weekly verify script
  tags: [cron]
  # Companion to the restore-drill above: verify proves stored blobs are READABLE across
  # ALL snapshots, the drill proves one service's tree restores. See files/verify.sh.
  ansible.builtin.copy:
    src: verify.sh
    dest: /usr/local/bin/kopia-verify.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule weekly Kopia backup integrity verification
  tags: [cron]
  # "A backup you've never restored isn't a backup." snapshot scheduling and retention
  # are handled inside the container (entrypoint.sh policy); this closes the remaining
  # gap — confirming the stored data is actually READABLE, not merely present.
  # `kopia snapshot verify` re-reads snapshot metadata/index from B2 and, via
  # --verify-files-percent, downloads a sample of file contents and checks their hashes.
  # The wrapper script captures the verify's OWN exit code and writes
  # /var/lib/kopia-verify/state.json -> monitor-bridge's `verify` check -> the
  # "Backup Verify" Kuma monitor. (The old `... | logger` form made cron see logger's
  # always-zero exit and silently swallow a non-zero verify — the gap this closes.)
  ansible.builtin.cron:
    name: "Weekly Kopia snapshot verify"
    minute: "0"
    hour: "4"
    weekday: "3"  # Wednesday — off the Monday rkhunter/aide slot to spread load
    job: "/usr/local/bin/kopia-verify.sh"
    user: "{{ sys_user }}"
  become: true

- name: Create content-verify state directory
  tags: [cron]
  # monitor-bridge bind-mounts this read-only and its `content_verify` check alerts on a failed/
  # stale/missing verify — created here (not by Docker) so it's sys_user-writable for the cron.
  ansible.builtin.file:
    path: /var/lib/kopia-content-verify
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the quarterly deep content-verify script
  tags: [cron]
  # The deep tier below the weekly 1% verify: a 25% content re-read, quarterly. See
  # files/content-verify.sh.
  ansible.builtin.copy:
    src: content-verify.sh
    dest: /usr/local/bin/kopia-content-verify.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule quarterly Kopia deep content verify
  tags: [cron]
  # 1st of Mar/Jun/Sep/Dec at 06:00 — an hour after the 05:00 restore drill (same day-1 slot) so the
  # two heavy kopia jobs don't contend; 25% content is 25x the weekly download, hence quarterly.
  # Result -> /var/lib/kopia-content-verify/state.json -> monitor-bridge's content_verify check.
  ansible.builtin.cron:
    name: "Quarterly Kopia deep content verify"
    minute: "0"
    hour: "6"
    day: "1"
    month: "3,6,9,12"
    job: "/usr/local/bin/kopia-content-verify.sh"
    user: "{{ sys_user }}"
  become: true

- name: Seed the content-verify state so its monitor is green until the first quarterly run
  tags: [cron]
  # The quarterly cron can be up to ~3 months out; without a seed, content_verify false-DOWNs
  # "never ran" until then. Write a neutral placeholder (ts now, ok) that the cron overwrites on its
  # first real run. force:false = only when absent, so a real result is never clobbered; sys_user-
  # owned so the sys_user cron can truncate it later. The weekly 1% verify (monitored separately)
  # covers actual integrity in the interim. `date +%s` runs on the controller (== daniel-server here).
  ansible.builtin.copy:
    dest: /var/lib/kopia-content-verify/state.json
    content: "{{ {'ts': (lookup('pipe', 'date +%s') | int), 'ok': true, 'msg': 'seeded — first quarterly content verify pending'} | to_json }}"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
    force: false
  become: true

- name: Create maintenance-check state directory
  tags: [cron]
  # monitor-bridge bind-mounts this read-only and alerts on an unhealthy/stale/missing
  # state — created here (not by Docker) so it's sys_user-writable for the cron.
  ansible.builtin.file:
    path: /var/lib/kopia-maintenance
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the daily full-maintenance check script
  tags: [cron]
  # Full maintenance GCs expired blobs from B2; the entrypoint asserts it's enabled+owned, but
  # nothing monitored that it keeps SUCCEEDING — a stall only surfaced weeks later as the b2_usage
  # symptom. See files/maintenance-check.sh.
  ansible.builtin.copy:
    src: maintenance-check.sh
    dest: /usr/local/bin/kopia-maintenance-check.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule daily Kopia full-maintenance check
  tags: [cron]
  # 03:30 daily — clear of the 02:30 b2-usage probe and 04:00 verify. Result lands in
  # /var/lib/kopia-maintenance/state.json -> monitor-bridge's `maintenance` check -> the
  # "Backup Maintenance" Kuma monitor.
  ansible.builtin.cron:
    name: "Daily Kopia full-maintenance check"
    minute: "30"
    hour: "3"
    job: "/usr/local/bin/kopia-maintenance-check.sh"
    user: "{{ sys_user }}"
  become: true

- name: Seed backup-monitor state files on first deploy (idempotent)
  tags: [cron]
  # monitor-bridge reports a backup monitor DOWN when its state file is MISSING ("never ran?").
  # The crons write these on weekly/monthly/daily cadences, so a fresh host / bare-metal DR would
  # false-DOWN Backup Verify / Restore Drill / B2 / Maintenance for up to their full cadence —
  # precisely during recovery, when real backup signal matters most. Run each script ONCE now to
  # seed its state file; `creates:` makes every reseed a no-op (the crons own ongoing refresh), and
  # failed_when:false means a probe that can't run yet (repo still reconnecting) doesn't fail the
  # deploy — it self-corrects on the next cron. Runs as the cron user (sys_user); on the live host
  # the existing state files mean all but a newly-added monitor skip.
  ansible.builtin.command:
    cmd: "{{ item.script }}"
    creates: "{{ item.state }}"
  loop:
    - {script: /usr/local/bin/kopia-verify.sh, state: /var/lib/kopia-verify/state.json}
    - {script: /usr/local/bin/kopia-restore-drill.sh, state: /var/lib/kopia-restore-drill/state.json}
    - {script: /usr/local/bin/kopia-b2-usage.sh, state: /var/lib/kopia-b2-usage/state.json}
    - {script: /usr/local/bin/kopia-maintenance-check.sh, state: /var/lib/kopia-maintenance/state.json}
  loop_control:
    label: "{{ item.script | basename }}"
  changed_when: false
  failed_when: false
