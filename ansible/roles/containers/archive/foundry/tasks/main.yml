---
- ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    dirs_to_create:
      - "{{ container_item.name }}/data"
      - "{{ container_item.name }}/foundrydl"

- name: Copy zip
  ansible.builtin.copy:
    src: FoundryVTT-10.288.zip
    dest: "/home/{{ SYS_USER }}/server/containers/foundry/foundrydl/FoundryVTT.zip"

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
