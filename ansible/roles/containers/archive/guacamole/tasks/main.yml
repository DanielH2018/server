- include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    dirs_to_create:
    - "{{ container_item.name }}/data"
    - "{{ container_item.name }}/drive"
    - "{{ container_item.name }}/record"
    - "{{ container_item.name }}/init"

#- include_tasks: dns.yml
#  with_items:
#    - "{{ role_name }}"

- name: Setup Init script Permissions
  shell: chmod -R +x /home/{{ SYS_USER }}/server/containers/{{ role_name }}/init
  become: true
  become_method: sudo

- name: Add DB Init Script
  shell: docker run --rm guacamole/guacamole /opt/guacamole/bin/initdb.sh --postgresql > initdb.sql
  args:
    chdir: "/home/{{ SYS_USER }}/server/containers/{{ role_name }}/init"
  become: true
  become_method: sudo

- include_role:
    name: common
    tasks_from: docker_deploy.yml
