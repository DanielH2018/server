---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}"

- name: Create Dockerfile from template
  tags: [config]
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "/home/{{ sys_user }}/server/containers/crowdsec/Dockerfile"
    mode: "0664"

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml

- name: Schedule weekly redeploy cron job
  tags: [cron]
  ansible.builtin.include_role:
    name: common
    tasks_from: redeploy_cron.yml
  vars:
    common_redeploy_cron_minute: "10"
