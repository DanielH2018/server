- include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    dirs_to_create:
    - "{{ container_item.name }}/config/www/freshrss/extensions"


- name: Unzip sidebar toggle extension
  unarchive:
    src: "{{ item }}"
    dest: "/home/{{ SYS_USER }}/server/containers/freshrss/config/www/freshrss/extensions"
  with_fileglob:
    - "*.zip"

