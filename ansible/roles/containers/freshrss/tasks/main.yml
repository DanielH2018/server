---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config/www/freshrss/extensions"

- name: Copy nginx feed cache config
  ansible.builtin.copy:
    src: nginx-feed-cache.conf
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/nginx-feed-cache.conf"
    mode: "0644"

- name: Unzip extensions
  ansible.builtin.unarchive:
    src: "{{ item }}"
    dest: "/home/{{ sys_user }}/server/containers/freshrss/config/www/freshrss/extensions"
  with_fileglob:
    - "*.zip"

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
