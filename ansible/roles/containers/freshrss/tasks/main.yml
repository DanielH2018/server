---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config/www/freshrss/extensions"

# Bind-mounted into the nginx sidecar — register so a conf edit forces a recreate
# (recreate: auto can't see bind-mounted file changes; see common/CLAUDE.md).
- name: Copy nginx feed cache config
  tags: [config]
  ansible.builtin.copy:
    src: nginx-feed-cache.conf
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/nginx-feed-cache.conf"
    mode: "0644"
  register: freshrss_nginx_conf

- name: Unzip extensions
  tags: [config]
  ansible.builtin.unarchive:
    src: "{{ item }}"
    dest: "/home/{{ sys_user }}/server/containers/freshrss/config/www/freshrss/extensions"
  with_fileglob:
    - "*.zip"

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    common_config_changed: "{{ freshrss_nginx_conf is changed }}"
