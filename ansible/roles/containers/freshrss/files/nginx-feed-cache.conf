proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=feed_cache:1m max_size=10m inactive=25h use_temp_path=off;

server {
    listen 80;

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass https://rachelbythebay.com;
        proxy_ssl_server_name on;
        proxy_set_header Host rachelbythebay.com;
        proxy_set_header User-Agent "FreshRSS/feed-cache";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_cache feed_cache;
        proxy_cache_valid 200 24h;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        proxy_ignore_headers Cache-Control Expires;
    }
}
