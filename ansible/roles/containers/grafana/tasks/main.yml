---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/data"
      - "{{ container_item.name }}/provisioning"
      - "{{ container_item.name }}/dashboards"

- name: Render the Grafana admin password to a file (kept out of the container's Env)
  tags: [config]
  # GF_SECURITY_ADMIN_PASSWORD inlined lands in grafana's Env, readable via the read-only
  # docker-proxy by any monitoring-net container. Grafana reads GF_SECURITY_ADMIN_PASSWORD__FILE,
  # so file-mounting keeps it out of container metadata (2026-07-15 review M2). no_log; 0600 owned
  # by sys_user (grafana runs as UID 1000) — NO become.
  no_log: true
  ansible.builtin.copy:
    content: "{{ grafana_admin_password }}"
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/admin_password"
    mode: "0600"
  register: grafana_cfg_admin_password

- name: Provision Grafana datasources (Prometheus + Loki)
  tags: [config]
  ansible.builtin.template:
    src: provisioning/datasources.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/provisioning/datasources.yml"
    mode: "0664"
  register: grafana_cfg_datasources

- name: Provision Grafana dashboard file-provider
  tags: [config]
  ansible.builtin.template:
    src: provisioning/dashboards.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/provisioning/dashboards.yml"
    mode: "0664"
  register: grafana_cfg_dashboards_cfg

# Recurses subdirectories — with foldersFromFilesStructure: true each subdir
# (e.g. dashboards/Security/) becomes a Grafana folder of the same name.
# synchronize (not copy) so removing/renaming a dashboard in the role prunes its stale
# file from the mount: plain copy is additive and a leftover file keeps the board
# provisioned, so Grafana refuses to delete it ("provisioned dashboard cannot be deleted")
# and it ghosts in its old folder forever.
- name: Mirror provisioned dashboards (community seeds + exported custom boards)
  tags: [config]
  ansible.posix.synchronize:
    src: "{{ role_path }}/files/dashboards/"
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/dashboards/"
    archive: false
    recursive: true
    checksum: true
    delete: true
    rsync_opts:
      - "--chmod=F664,D775"
  register: grafana_cfg_dashboards

- name: Create loki-config.yml from template
  tags: [config]
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/loki-config.yaml"
    mode: "0664"
  register: grafana_cfg_loki

- name: Create promtail-config.yml from template
  tags: [config]
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/promtail-config.yaml"
    mode: "0664"
  register: grafana_cfg_promtail

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    common_config_changed: >-
      {{ (grafana_cfg_datasources is changed) or (grafana_cfg_dashboards_cfg is changed)
         or (grafana_cfg_dashboards is changed) or (grafana_cfg_loki is changed)
         or (grafana_cfg_promtail is changed) or (grafana_cfg_admin_password is changed) }}
