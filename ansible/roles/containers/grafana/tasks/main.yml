---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/data"
      - "{{ container_item.name }}/provisioning"
      - "{{ container_item.name }}/dashboards"

- name: Provision Grafana datasources (Prometheus + Loki)
  ansible.builtin.template:
    src: provisioning/datasources.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/provisioning/datasources.yml"
    mode: "0664"

- name: Provision Grafana dashboard file-provider
  ansible.builtin.template:
    src: provisioning/dashboards.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/provisioning/dashboards.yml"
    mode: "0664"

# Recurses subdirectories — with foldersFromFilesStructure: true each subdir
# (e.g. dashboards/Crowdsec/) becomes a Grafana folder of the same name.
- name: Copy provisioned dashboards (community seeds + exported custom boards)
  ansible.builtin.copy:
    src: dashboards/
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/dashboards/"
    mode: "0664"

- name: Create loki-config.yml from template
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/loki-config.yaml"
    mode: "0664"

- name: Create promtail-config.yml from template
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/promtail-config.yaml"
    mode: "0664"

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
