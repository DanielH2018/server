---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config/.ssh"

- name: Check if github key exists
  ansible.builtin.stat:
    path: "/home/{{ sys_user }}/server/containers/ansible/roles/code-server/templates/github"
  register: containers_github_data

- name: Copy github key
  ansible.builtin.template:
    src: github
    dest: "/home/{{ sys_user }}/server/containers/code-server/config/.ssh/github"
    mode: "0644"
  when: containers_github_data.stat.exists

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- name: Create Dockerfile from template
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/Dockerfile"
    mode: "0664"

- name: Copy proprietary extensions startup script
  ansible.builtin.copy:
    src: proprietary-extensions.sh
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/proprietary-extensions.sh"
    mode: "0755"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
