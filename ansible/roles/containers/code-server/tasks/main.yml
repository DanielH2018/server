---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config/.ssh"

- name: Check if github key exists
  ansible.builtin.stat:
    path: "/home/{{ sys_user }}/server/ansible/roles/containers/code-server/templates/github"
  register: containers_github_data

# `copy`, not `template`: this is a private key — Jinja must never parse it (a key
# containing `{%`/`{{` byte sequences would be mangled or fail the render).
- name: Copy github key
  ansible.builtin.copy:
    src: "/home/{{ sys_user }}/server/ansible/roles/containers/code-server/templates/github"
    dest: "/home/{{ sys_user }}/server/containers/code-server/config/.ssh/github"
    mode: "0600"
  when: containers_github_data.stat.exists

- name: Create Dockerfile from template
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/Dockerfile"
    mode: "0664"

- name: Copy extensions startup script
  ansible.builtin.copy:
    src: extensions.sh
    dest: "/home/{{ sys_user }}/server/containers/{{ role_name }}/extensions.sh"
    mode: "0755"

- name: Deploy Container
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml

- name: Schedule weekly redeploy cron job
  ansible.builtin.include_role:
    name: common
    tasks_from: redeploy_cron.yml
  vars:
    common_redeploy_cron_minute: "0"

# Image cleanup happens via the daily `docker system prune -a -f --filter "until=168h"`
# root cron installed by setup/initial_setup ("Clean unused Docker images") — a filtered
# docker_prune task here was redundant with it, so it was removed (2026-06-11).
