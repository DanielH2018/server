---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/config"

- name: Create Authelia log directory
  tags: [config]
  ansible.builtin.file:
    path: /var/log/authelia
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Set Authelia Config dir
  tags: [config]
  ansible.builtin.set_fact:
    authelia_config_dir: "/home/{{ sys_user }}/server/containers/authelia/config"

# configuration.yml is rendered fresh on EVERY deploy — template edits reach the live
# install and recreate the container via common_config_changed. All inputs are
# deterministic: static template text + SOPS vars, including the four formerly
# first-run-generated values asserted below (migrated to secrets.yml 2026-06-11; see
# docs/superpowers/specs/2026-06-11-authelia-retemplatable-config-design.md).
- name: Require the generated Authelia OIDC secrets from SOPS
  tags: [config]
  ansible.builtin.assert:
    that:
      - authelia_oidc_hmac_secret is defined
      - authelia_client_password_hash is defined
      - authelia_oidc_rsa_key_content is defined
    fail_msg: >-
      Missing Authelia OIDC secrets in ansible/vars/secrets.yml. On a fresh install,
      generate and add them first — see "Fresh install" in
      ansible/roles/containers/authelia/CLAUDE.md.
    quiet: true

- name: Create configuration.yml from template
  tags: [config]
  ansible.builtin.template:
    src: configuration.yml.j2
    dest: "{{ authelia_config_dir }}/configuration.yml"
    mode: "0600"
  become: true
  no_log: true
  register: authelia_cfg_config

- name: Check if users_database.yml exists
  tags: [config]
  ansible.builtin.stat:
    path: "{{ authelia_config_dir }}/users_database.yml"
  register: authelia_users_db_stat

# users_database.yml stays FIRST-RUN-ONLY: Authelia writes password changes back into
# it at runtime, so re-templating would clobber live user state. The argon2 hashing
# docker-run lives in here too — its output is only consumed by this template.
- name: Initial users database setup
  tags: [config]
  when: not authelia_users_db_stat.stat.exists
  block:
    - name: Hash password
      ansible.builtin.command: >-
        docker run --rm authelia/authelia:latest authelia crypto hash generate argon2
        --password '{{ authelia_password }}' --iterations 3 --memory 65536
        --parallelism 4 --salt-size 16 --key-size 32
      register: authelia_hash_output
      become: true
      no_log: true
      changed_when: false

    - name: Remove prefix from hash
      ansible.builtin.set_fact:
        authelia_password_hash: "{{ authelia_hash_output.stdout | regex_replace('^Digest: ', '') }}"
      no_log: true

    - name: Create users_database.yml from template
      ansible.builtin.template:
        src: users_database.yml.j2
        dest: "{{ authelia_config_dir }}/users_database.yml"
        mode: "0600"
      become: true
      register: authelia_cfg_users
      # Renders the argon2 password hash into the file; without this a --diff run
      # prints the digest to the console/CI log (matches the sibling hash tasks above).
      no_log: true

- name: Enforce secure permissions on Authelia config files
  tags: [config]
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0600"
  loop:
    - "{{ authelia_config_dir }}/configuration.yml"
    - "{{ authelia_config_dir }}/users_database.yml"
  failed_when: false

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # configuration.yml re-renders every run; users_database.yml is first-run-only
    # (skipped -> not changed on existing installs). is defined guards the skips.
    common_config_changed: >-
      {{ (authelia_cfg_config is defined and authelia_cfg_config is changed)
         or (authelia_cfg_users is defined and authelia_cfg_users is changed) }}
