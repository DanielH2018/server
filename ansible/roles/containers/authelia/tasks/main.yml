---
- ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    dirs_to_create:
      - "{{ container_item.name }}/config"

- name: Hash password
  ansible.builtin.command: "docker run authelia/authelia:latest authelia crypto hash generate argon2 --password '{{ AUTHELIA_PASSWORD }}' --iterations 3 --memory
    65536 --parallelism 4 --salt-length 16 --key-length 32"
  register: authelia_hash_output
  become: true

- name: Remove prefix from hash
  ansible.builtin.set_fact:
    authelia_password_hash: "{{ authelia_hash_output.stdout | regex_replace('^Digest: ', '') }}"

- name: Debug the cleaned hash
  ansible.builtin.debug:
    msg: "{{ authelia_password_hash }}"

- name: Create configuration.yml from template
  ansible.builtin.template:
    src: configuration.yml.j2
    dest: "/home/{{ SYS_USER }}/server/containers/authelia/config/configuration.yml"
    mode: "0755"
  become: true

- name: Check if users_database.yml exists
  ansible.builtin.stat:
    path: "/home/{{ SYS_USER }}/server/containers/authelia/config/users_database.yml"
  register: users_db_stat

- name: Create users_database.yml from template
  ansible.builtin.template:
    src: users_database.yml.j2
    dest: "/home/{{ SYS_USER }}/server/containers/authelia/config/users_database.yml"
    mode: "0755"
  when: not users_db_stat.stat.exists

# - include_tasks: dns.yml
#   with_items:
#     - auth

- ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
