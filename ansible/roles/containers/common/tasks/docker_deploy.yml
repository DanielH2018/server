---
- name: Create docker-compose from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml"
    mode: "0600"

- name: Deploy Container {{ container_item.name }}
  community.docker.docker_compose_v2:
    project_src: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}"
    state: present
    build: always
    # `recreate: always` is INTENTIONAL — do not "fix" it to `auto` on idempotency
    # grounds without first reading the trade-off below.
    #
    # It's load-bearing: it's the de-facto restart-on-config-change mechanism for the
    # ~11 services that bind-mount an Ansible-templated config file (authelia, traefik,
    # pihole, homepage, grafana, prometheus, janitorr, livesync, peanut, recyclarr,
    # qbittorrent). There is no notify/handler pattern in the repo, so an always-recreate
    # is what makes a `config.yml.j2` edit actually take effect on the next deploy.
    #
    # `recreate: auto` (the module default) only recreates when the *compose service
    # definition* changes (its config-hash) or the image changes. Editing a bind-mounted
    # config file does NOT change the compose hash, so under `auto` the container would
    # keep running with the old config and the edit would silently not apply.
    #
    # A generic one-file fix (e.g. checksum the project dir in this task) doesn't work:
    # the container dirs also hold runtime data (logs/DBs) next to the managed configs,
    # so a dir checksum would thrash. Switching to `auto` safely requires per-service
    # work — a `config-hash` label computed from each service's config file(s), or
    # notify-handlers — pushed into the ~11 config-mounting roles.
    #
    # Cost of keeping `always`: a redeploy recreates the target container even when
    # nothing changed. Blast radius is small in practice — `deploy.yml`'s dependency
    # expansion means a tagged run only touches the target service + any *down* deps;
    # the full fleet only bounces on a tagless `deploy.yml`. (Reviewed 2026-06-05.)
    recreate: always
    remove_orphans: true
