---
- name: Create docker-compose from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/docker-compose.yml"
    mode: "0600"

- name: Deploy Container {{ container_item.name }}
  community.docker.docker_compose_v2:
    project_src: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}"
    state: present
    build: always
    # `recreate` is CONDITIONAL, not hardcoded `always` — this keeps deploys idempotent:
    #
    #   common_config_changed=true  -> recreate: always
    #   otherwise (the default)        -> recreate: auto
    #
    # WHY the conditional is needed: 11 roles bind-mount an Ansible-templated config file
    # (authelia, traefik, homepage, grafana, prometheus, janitorr, livesync, peanut,
    # recyclarr, kopia, pihole). Editing such a file does NOT change the Compose service definition (its
    # config-hash), so `auto` alone would leave the container running with stale config —
    # the edit would silently not apply. Those roles `register:` their config tasks and
    # pass `common_config_changed` so a changed config forces a recreate that picks it
    # up. It is passed as an `include_role` var, NOT a `set_fact`: a fact would persist
    # across the deploy.yml role loop and wrongly recreate *later* services.
    #
    # WHY `auto` is safe for everything else: a changed image (`build: always` rebuilds;
    # an identical rebuild is a no-op) and a changed docker-compose.yml both bump the
    # Compose config-hash and trigger an auto-recreate. Only the bind-mounted external
    # config case is invisible to `auto` — exactly what the conditional fills.
    #
    # Result: a no-op deploy recreates nothing; editing one config recreates only that
    # service. See
    # docs/superpowers/specs/2026-06-07-idempotent-deploys-conditional-recreate-design.md
    recreate: "{{ 'always' if common_config_changed | default(false) | bool else 'auto' }}"
    remove_orphans: true
