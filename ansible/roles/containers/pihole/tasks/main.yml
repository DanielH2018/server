---
- name: Create required directories
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/data/unbound"
      - "{{ container_item.name }}/data/etc-dnsmasq.d"

- name: Create docker-compose.yml from template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/pihole/docker-compose.yml"
    mode: "0664"
  vars:
    container: "{{ role_name }}"

- name: Create unbound.conf from template
  ansible.builtin.template:
    src: unbound.conf.j2
    dest: "/home/{{ sys_user }}/server/containers/pihole/data/unbound/my_settings.conf"
    mode: "0664"
  vars:
    container: "{{ role_name }}"

- name: Create dnsmasq.conf from template
  ansible.builtin.template:
    src: dnsmasq.yml.j2
    dest: "/home/{{ sys_user }}/server/containers/pihole/data/etc-dnsmasq.d/02-wildcard.conf"
    mode: "0644"
  vars:
    container: "{{ role_name }}"

- name: Pull Pihole Image
  ansible.builtin.command: docker pull pihole/pihole:latest
  become: true
  become_method: ansible.builtin.sudo

- name: Pull Unbound Image
  ansible.builtin.command: docker pull klutchell/unbound:latest
  become: true
  become_method: ansible.builtin.sudo

- name: Stop systemd-resolved.service
  ansible.builtin.systemd:
    name: systemd-resolved.service
    state: stopped
  become: true
  become_method: ansible.builtin.sudo

- name: Disable systemd-resolved.service
  ansible.builtin.systemd:
    name: systemd-resolved.service
    enabled: false
  become: true
  become_method: ansible.builtin.sudo

- name: Deploy Pihole
  ansible.builtin.command: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ sys_user }}/server/containers/pihole/"
  become: true
  become_method: ansible.builtin.sudo

- name: Update /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    insertbefore: BOF
    line: "127.0.0.1 {{ sys_user }}"
  become: true
  become_method: ansible.builtin.sudo

- name: Remove /etc/resolv.conf symlink # TODO Add check for if already done
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  become: true
  become_method: ansible.builtin.sudo

- name: Create /etc/resolv.conf from template
  ansible.builtin.template:
    src: resolv.conf.j2
    dest: "/etc/resolv.conf"
    mode: "0644"
  become: true
  become_method: ansible.builtin.sudo
