---
- name: Set Pihole base path
  tags: [config, deploy]
  ansible.builtin.set_fact:
    pihole_base: "/home/{{ sys_user }}/server/containers/pihole"

- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}/data/unbound"
      - "{{ container_item.name }}/data/etc-dnsmasq.d"

# Bind-mounted resolver configs: a change here is invisible to Compose's config-hash,
# so it must force a recreate via `common_config_changed` (see common/CLAUDE.md).
- name: Create resolver configuration files from templates
  tags: [config]
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ pihole_base }}/{{ item.dest }}"
    mode: "0644"
  loop:
    - src: unbound.conf.j2
      dest: data/unbound/my_settings.conf
    - src: dnsmasq.yml.j2
      dest: data/etc-dnsmasq.d/02-wildcard.conf
  register: pihole_cfg_resolver

# Pre-render the compose file so we know BEFORE deploying whether a recreate is coming
# (docker_deploy.yml re-renders it to identical content — a no-op). That early knowledge
# gates the resolv.conf fallback below to runs where host DNS will actually blip.
- name: Create docker-compose.yml from template
  tags: [config]
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ pihole_base }}/docker-compose.yml"
    mode: "0600"
  register: pihole_cfg_compose

- name: Stop systemd-resolved.service
  tags: [deploy]
  ansible.builtin.systemd:
    name: systemd-resolved.service
    state: stopped
  become: true
  become_method: ansible.builtin.sudo
  register: pihole_resolved_stop

- name: Disable systemd-resolved.service
  tags: [deploy]
  ansible.builtin.systemd:
    name: systemd-resolved.service
    enabled: false
  become: true
  become_method: ansible.builtin.sudo

- name: Check /etc/resolv.conf state
  tags: [deploy]
  ansible.builtin.stat:
    path: /etc/resolv.conf
    follow: false
  register: pihole_resolv_stat

# Guarded so it removes only the systemd-resolved stub symlink — once Pi-hole's regular
# file is in place, an unconditional `state: absent` would delete it on every run.
- name: Remove /etc/resolv.conf symlink
  tags: [deploy]
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  become: true
  become_method: ansible.builtin.sudo
  when: pihole_resolv_stat.stat.islnk | default(false)
  register: pihole_resolved_symlink

- name: Check current Pi-hole container state
  tags: [deploy]
  community.docker.docker_container_info:
    name: pihole
  register: pihole_existing

# Write the Cloudflare fallback only when host DNS is actually at risk: first install,
# stack about to be recreated (config/compose change), or systemd-resolved was just
# displaced. A steady-state no-op run must NOT flip resolv.conf away from Pi-hole.
- name: Create fallback /etc/resolv.conf for deployment
  tags: [deploy]
  ansible.builtin.copy:
    content: "nameserver 1.1.1.1\n"
    dest: /etc/resolv.conf
    mode: "0644"
  become: true
  become_method: ansible.builtin.sudo
  when: >-
    (not pihole_existing.exists)
    or not (pihole_existing.container.State.Running | default(false))
    or pihole_cfg_resolver is changed
    or pihole_cfg_compose is changed
    or pihole_resolved_stop is changed
    or pihole_resolved_symlink is changed
    or not pihole_resolv_stat.stat.exists

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # Compose-file changes are handled by `recreate: auto` (config-hash); only the
    # bind-mounted resolver configs need the forced recreate.
    common_config_changed: "{{ pihole_cfg_resolver is changed }}"

- name: Update /etc/hosts
  tags: [deploy]
  ansible.builtin.lineinfile:
    path: /etc/hosts
    insertbefore: BOF
    line: "127.0.0.1 {{ sys_user }}"
  become: true
  become_method: ansible.builtin.sudo

- name: Wait for Pihole to be healthy
  tags: [deploy]
  community.docker.docker_container_info:
    name: pihole
  register: pihole_health
  retries: 18
  delay: 10
  until: pihole_health.container.State.Health.Status == "healthy"
  become: true
  become_method: ansible.builtin.sudo

- name: Point /etc/resolv.conf at Pihole
  tags: [deploy]
  ansible.builtin.template:
    src: resolv.conf.j2
    dest: "/etc/resolv.conf"
    mode: "0644"
  become: true
  become_method: ansible.builtin.sudo
