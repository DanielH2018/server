---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}"

- name: Deploy autofix-bridge script
  tags: [config]
  ansible.builtin.copy:
    src: autofix.py
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/autofix.py"
    mode: "0644"
  register: autofix_script

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # autofix.py is bind-mounted; the loop reads it once at startup, so only a recreate
    # applies a code change. Without this a script-only edit leaves recreate: auto and the
    # new logic silently never deploys. See common/CLAUDE.md.
    common_config_changed: "{{ autofix_script is changed }}"

- name: Create the disk-autoprune monitor state directory
  tags: [config]
  # monitor-bridge bind-mounts this read-only (/autofix-disk); its `disk_prune` check alerts on a
  # failed/stale run. Created sys_user-owned so the non-root cron can write state.json; deploy
  # autofix-bridge before monitor-bridge on a fresh host (else Docker auto-creates it root-owned).
  ansible.builtin.file:
    path: /var/lib/autofix-disk-prune
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Deploy the disk-autoprune script
  tags: [config]
  ansible.builtin.template:
    src: autofix-disk-prune.sh.j2
    dest: /usr/local/bin/autofix-disk-prune.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0750"
  become: true

- name: Install journald SystemMaxUse drop-in (bounds journald growth)
  tags: [config]
  # A standing host cap (not a cron) — the biggest one-time reclaim. Lives in this role to keep
  # disk hygiene cohesive + iterable via `deploy.yml --tags autofix-bridge`.
  ansible.builtin.template:
    src: 60-autofix-journald.conf.j2
    dest: /etc/systemd/journald.conf.d/60-autofix-journald.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  register: autofix_journald_conf

- name: Restart systemd-journald to apply the cap # noqa no-handler
  tags: [config]
  ansible.builtin.systemd_service:
    name: systemd-journald
    state: restarted
  become: true
  when: autofix_journald_conf is changed

- name: Schedule the disk-autoprune cron
  tags: [cron]
  ansible.builtin.cron:
    name: "autofix disk prune"
    minute: "0"
    user: "{{ sys_user }}"
    job: /usr/local/bin/autofix-disk-prune.sh
    state: present
  become: true
