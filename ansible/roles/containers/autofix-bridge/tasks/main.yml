---
- name: Create required directories
  tags: [config]
  ansible.builtin.include_role:
    name: common
    tasks_from: setup_dirs.yml
  vars:
    common_dirs_to_create:
      - "{{ container_item.name }}"

- name: Deploy autofix-bridge script
  tags: [config]
  ansible.builtin.copy:
    src: autofix.py
    dest: "/home/{{ sys_user }}/server/containers/{{ container_item.name }}/autofix.py"
    mode: "0644"
  register: autofix_bridge_script

- name: Deploy Container
  tags: [deploy]
  ansible.builtin.include_role:
    name: common
    tasks_from: docker_deploy.yml
  vars:
    # autofix.py is bind-mounted; the loop reads it once at startup, so only a recreate
    # applies a code change. Without this a script-only edit leaves recreate: auto and the
    # new logic silently never deploys. See common/CLAUDE.md.
    common_config_changed: "{{ autofix_bridge_script is changed }}"

- name: Create the disk-autoprune monitor state directory
  tags: [config]
  # monitor-bridge bind-mounts this read-only (/autofix-disk); its `disk_prune` check alerts on a
  # failed/stale run. Created sys_user-owned so the non-root cron can write state.json; deploy
  # autofix-bridge before monitor-bridge on a fresh host (else Docker auto-creates it root-owned).
  ansible.builtin.file:
    path: /var/lib/autofix-disk-prune
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Ensure jq is installed for the disk-autoprune state writer
  tags: [config]
  # The disk-prune script builds state.json with jq. initial_setup already installs jq (for
  # Claude Code hook parsing) so it should always be present — but that's an unrelated reason on
  # a different role, so pin the dependency here too rather than rely on it implicitly.
  ansible.builtin.apt:
    name: jq
    state: present
  become: true

- name: Deploy the shared host-cron state-file writer
  tags: [config]
  # autofix-disk-prune.sh sources this for its atomic {ts,ok,msg} state write (the shell twin of
  # host_lib.py's cross-role Python sharing). Cross-role source lives in the common role; ordered
  # before the prune script + its deploy-time seed so it's on disk first.
  ansible.builtin.copy:
    src: "{{ role_path }}/../common/files/state-lib.sh"
    dest: /usr/local/lib/state-lib.sh
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Deploy the disk-autoprune script
  tags: [config]
  ansible.builtin.template:
    src: autofix-disk-prune.sh.j2
    dest: /usr/local/bin/autofix-disk-prune.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0750"
  become: true

- name: Remove the stale autofix-bridge journald drop-in
  tags: [config]
  # The journald disk cap is owned SOLELY by initial_setup's 50-homelab.conf (1G — a reasoned
  # host-forensics window). This role briefly shipped a 60- SystemMaxUse=200M drop-in that
  # silently won (systemd merges drop-ins last-wins-by-filename), cutting the journal 5x and
  # leaving the 1G as dead config. Remove the stale file so 50-homelab.conf's 1G takes effect
  # again; a fresh host never had it, so this is a no-op there. Journald cap = one source of truth.
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d/60-autofix-journald.conf
    state: absent
  become: true
  register: autofix_bridge_journald_removed

- name: Restart systemd-journald after removing the drop-in # noqa no-handler
  tags: [config]
  ansible.builtin.systemd_service:
    name: systemd-journald
    state: restarted
  become: true
  when: autofix_bridge_journald_removed is changed

- name: Schedule the disk-autoprune cron
  tags: [cron]
  ansible.builtin.cron:
    name: "autofix disk prune"
    minute: "0"
    user: "{{ sys_user }}"
    job: /usr/local/bin/autofix-disk-prune.sh
    state: present
  become: true

- name: Seed the disk-autoprune state on first deploy (idempotent)
  tags: [cron]
  # monitor-bridge reports "Disk Autoprune" DOWN when the state file is MISSING ("never ran?").
  # The hourly cron writes it, so a fresh host / bare-metal DR would false-DOWN for up to ~1h,
  # precisely during recovery. Run the script ONCE now to seed it; `creates:` makes every reseed
  # a no-op (the cron owns ongoing refresh) and failed_when:false keeps a not-yet-ready run off
  # the deploy path. Mirrors kopia's seed-on-first-deploy; runs as the cron user (sys_user).
  ansible.builtin.command:
    cmd: /usr/local/bin/autofix-disk-prune.sh
    creates: /var/lib/autofix-disk-prune/state.json
  changed_when: false
  failed_when: false

# --- fake-remux host scan (host plane) ---------------------------------------
# ffprobe-backed detector for files whose quality claims a Remux but whose stream is a re-encode
# (long GOP or a consumer re-encoder ENCODER tag). It lives on the host plane, not in the sidecar,
# because it runs ffprobe via `docker exec jellyfin` — which the zero-privilege container can't do.
# Reports like the other host crons: a {ts,ok,msg} state file -> monitor-bridge's "Fake Remux Scan".
- name: Create fake-remux scan directories
  tags: [config]
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /opt/autofix-fake-remux, mode: "0750" } # scripts
    - { path: /etc/autofix-fake-remux, mode: "0750" } # config.env (0600 secret inside)
    - { path: /var/lib/autofix-fake-remux, mode: "0755" } # state.json + monitor-bridge bind source
  become: true

- name: Install fake-remux scan scripts
  tags: [config]
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/autofix-fake-remux/{{ item }}"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  loop:
    - fake_remux_scan.py
    - fake_remux_logic.py
  become: true

- name: Install the shared host_lib helper for the fake-remux scan
  tags: [config]
  # Source of truth in roles/setup/common/files; deployed beside the script so `from host_lib import`
  # resolves the sibling copy (same pattern as gitops_deploy/renovate_notify). Kept 3.12-clean.
  ansible.builtin.copy:
    src: "{{ role_path }}/../../setup/common/files/host_lib.py"
    dest: /opt/autofix-fake-remux/host_lib.py
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Write the fake-remux scan config (secret Sonarr key + webhook, host-only)
  tags: [config]
  ansible.builtin.template:
    src: fake-remux.config.env.j2
    dest: /etc/autofix-fake-remux/config.env
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0600"
  become: true
  no_log: true

- name: Schedule the daily fake-remux scan cron
  tags: [cron]
  # 04:45 — after the configarr sync (04:30) refreshes the Anime profile's NTRX block, so a live
  # re-search grabs against the current rules. Runs as sys_user (in the docker group: docker exec).
  ansible.builtin.cron:
    name: "autofix fake-remux scan"
    minute: "45"
    hour: "4"
    user: "{{ sys_user }}"
    job: >-
      /usr/bin/python3 /opt/autofix-fake-remux/fake_remux_scan.py
      >/dev/null 2>&1 || logger -t autofix-fake-remux 'fake-remux scan failed'
    state: present
  become: true

- name: Seed the fake-remux scan state on first deploy (idempotent)
  tags: [cron]
  # monitor-bridge reports "Fake Remux Scan" DOWN when the state file is MISSING. The daily cron
  # writes it, so a fresh host / DR would false-DOWN until the first run; seed once now. `creates:`
  # makes every reseed a no-op (the cron owns ongoing refresh) and failed_when:false keeps a run
  # that can't reach Sonarr/jellyfin yet off the deploy path. Runs as the cron user (sys_user, in
  # the docker group). Mirrors the disk-prune seed.
  ansible.builtin.command:
    cmd: /usr/bin/python3 /opt/autofix-fake-remux/fake_remux_scan.py
    creates: /var/lib/autofix-fake-remux/state.json
  changed_when: false
  failed_when: false

# --- fake-remux reconciler (host plane) ---------------------------------------
# Search-first replacer: acquires a genuine replacement before ever deleting the fake the detector
# seeded into the ledger. Runs every 20 min, gated by FAKE_REMUX_REPLACE_MODE (off/shadow/live).
# NB: delete_mode: recycle-bin only makes deletes recoverable if Sonarr's Recycling Bin path
# (Settings -> Media Management) is set — a Sonarr-side config outside this repo. Unset, deletes are
# permanent, but still gated on a verified-genuine downloaded replacement, so never data-loss of an
# un-replaced episode.
- name: Render the fake-remux selection policy
  tags: [config]
  ansible.builtin.copy:
    content: "{{ autofix_fake_remux_policy | to_json }}"
    dest: /etc/autofix-fake-remux/policy.json
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0640"
  become: true
  register: autofix_fake_remux_policy_file

- name: Install the fake-remux reconciler script
  tags: [config]
  ansible.builtin.copy:
    src: fake_remux_replace.py
    dest: /opt/autofix-fake-remux/fake_remux_replace.py
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Install the fake-remux reconciler's pure decision core
  tags: [config]
  ansible.builtin.copy:
    src: fake_remux_replace_logic.py
    dest: /opt/autofix-fake-remux/fake_remux_replace_logic.py
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0755"
  become: true

- name: Schedule the fake-remux reconcile cron
  tags: [cron]
  ansible.builtin.cron:
    name: "autofix fake-remux reconcile"
    minute: "*/20"
    user: "{{ sys_user }}"
    job: >-
      /usr/bin/python3 /opt/autofix-fake-remux/fake_remux_replace.py
      >/dev/null 2>&1 || logger -t autofix-fake-remux-replace 'reconcile failed'
    state: present
  become: true

- name: Seed the fake-remux reconciler state on first deploy (idempotent)
  tags: [cron]
  # monitor-bridge's "Fake Remux Replace" check reports DOWN when the state file is MISSING; the
  # */20 cron writes it, so a fresh host / DR would false-DOWN for up to 20 min. Seed once now,
  # mirroring the scan-state seed above.
  ansible.builtin.copy:
    content: '{"ts": 0, "ok": true, "msg": "never run"}'
    dest: /var/lib/autofix-fake-remux/replace_state.json
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
    force: false
  become: true
