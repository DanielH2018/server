- name: Create directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/qbittorrent/config"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/qbittorrent/docker-compose.yml"
    
- name: Deploy qBittorrent
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/qbittorrent/"
  become: yes
  become_method: sudo