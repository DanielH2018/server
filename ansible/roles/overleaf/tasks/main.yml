- name: Creates directories
  file:
    path: "/home/{{ SYS_USER }}/server/overleaf"
    state: directory
    mode: 0755
  
- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ SYS_USER }}/server/overleaf/docker-compose.yml"
    
- name: Deploy Overleaf
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ SYS_USER }}/server/overleaf/"
  become: yes
  become_method: sudo
