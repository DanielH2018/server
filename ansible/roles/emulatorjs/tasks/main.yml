- name: Creates directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/emulatorjs/config"
    state: directory
    mode: 0755

- name: Creates directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/emulatorjs/data"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/emulatorjs/docker-compose.yml"
    
- name: Deploy Emulatorjs
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/emulatorjs/"
  become: yes
  become_method: sudo