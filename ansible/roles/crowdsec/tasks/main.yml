- name: Creates directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/crowdsec/config"
    state: directory
    mode: 0755

- name: Create acquis.yaml from template
  template:
    src: acquis.yaml.j2
    dest: "/home/{{ env.SYS_USER }}/server/crowdsec/config/acquis.yaml"

- name: Create Dockerfile from template
  template:
    src: Dockerfile.j2
    dest: "/home/{{ env.SYS_USER }}/server/crowdsec/Dockerfile"

- name: Create docker-compose.yml from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/crowdsec/docker-compose.yml"

- name: Deploy Crowdsec
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/crowdsec/"
  become: yes
  become_method: sudo

- name: Add Traefik collection
  shell: docker exec crowdsec cscli collections install crowdsecurity/traefik
  become: yes
  become_method: sudo

- name: Update & Upgrade hubs
  shell: docker exec crowdsec cscli hub update && docker exec crowdsec cscli hub upgrade
  become: yes
  become_method: sudo

- name: Make sure script has correct permissions
  shell: chmod +x crowdsecUpdate.sh
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/ansible/roles/crowdsec/scripts/"
  become: yes
  become_method: sudo

- name: Add update & upgrade cronjob
  shell: ./crowdsecUpdate.sh
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/ansible/roles/crowdsec/scripts/"
  become: yes
  become_method: sudo
