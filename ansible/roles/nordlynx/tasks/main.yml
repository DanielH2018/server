- name: Create nordlynx directories
  file:
    path: "/home/{{ SYS_USER }}/server/nordlynx"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ SYS_USER }}/server/nordlynx/docker-compose.yml"

- name: Deploy NordLynx
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ SYS_USER }}/server/nordlynx/"
  become: yes
  become_method: sudo