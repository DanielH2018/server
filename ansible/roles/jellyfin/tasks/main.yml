- name: Create jellyfin directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/jellyfin/config"
    state: directory
    mode: 0755

- name: Create movie directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/library/movies"
    state: directory
    mode: 0755

- name: Create tv directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/library/tvseries"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/jellyfin/docker-compose.yml"
    
- name: Deploy Jellyfin
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/jellyfin/"
  become: yes
  become_method: sudo