- include_tasks: directory.yml
  with_items:
    - "{{ role_name }}/config"

- name: Create configuration.yaml from template
  template:
    src: configuration.yaml.j2
    dest: "/home/{{ SYS_USER }}/server/home-assistant/config/configuration.yaml"

# - include_tasks: dns.yml
#   with_items:
#     - "{{ role_name }}"

- include_tasks: docker.yml
  vars:
    container: "{{ role_name }}"

- name: Run HACS download script
  shell: wget -O - https://raw.githubusercontent.com/hacs/get/main/get | bash -
  args:
    chdir: "/home/{{ SYS_USER }}/server/home-assistant/config"
  become: yes
  become_method: sudo
