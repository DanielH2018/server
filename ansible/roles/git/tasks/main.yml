- name: Git Pull
  shell: git pull --all
  register: git

- name: Set Ansible command
  set_fact: 
    playbook_command: ansible-playbook playbook.yml --tags "
    playbook_roles:
      - 'docker'
      - 'traefik'
      - 'portainer'
      - 'authelia'
      - 'cloudflare-ddns'
      - 'crowdsec'
      - 'code-server'
      - 'freshrss'
      - 'librespeed'
      - 'heimdall'
      - 'uptime-kuma'
      - 'pihole'
      - 'smokeping'
      - 'filebrowser'
      - 'scrutiny'
      - 'guacamole'
      - 'nordlynx'
      - 'qbittorrent'
      - 'prowlarr'
      - 'sonarr'
      - 'radarr'
      - 'jellyfin'
      - 'minecraft'
      - 'prometheus'
      - 'grafana'
      - 'netdata'
      - 'home-assistant'
      - 'watchtower'
      - 'git'

- name: Loop over stdout_lines
  debug:
    msg: "{{ item }}"
  loop: "{{ playbook_roles }}"
  when: item in git.stdout_lines

- debug:
    msg: "{{ playbook_command }}"