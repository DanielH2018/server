- name: Creates directories
  file:
    path: "/home/{{ SYS_USER }}/server/sharelatex"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ SYS_USER }}/server/sharelatex/docker-compose.yml"

- name: Deploy Sharelatex
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ SYS_USER }}/server/sharelatex/"
  become: yes
  become_method: sudo
