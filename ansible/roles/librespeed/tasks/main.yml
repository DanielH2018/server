- name: Creates directories
  file:
    path: "/home/{{ SYS_USER }}/server/librespeed/config"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ SYS_USER }}/server/librespeed/docker-compose.yml"
    
- name: Deploy Librespeed
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ SYS_USER }}/server/librespeed/"
  become: yes
  become_method: sudo
