---
- name: Set variables
  # Dual-tagged: vars are consumed by the gpu_mem task AND the zram task.
  tags: [gpu-mem, zram]
  ansible.builtin.set_fact:
    optimize_pi_gpu_memory_mb: 16
    optimize_pi_zram_percentage: 50

# -------------------------------------------------------
# 1. DYNAMIC CONFIG PATH DETECTION (Bookworm vs Bullseye)
# -------------------------------------------------------
- name: Check if /boot/firmware/config.txt exists (Bookworm)
  # Dual-tagged: the resolved config path is used by gpu_mem AND the watchdog dtparam.
  tags: [gpu-mem, watchdog]
  ansible.builtin.stat:
    path: /boot/firmware/config.txt
  register: optimize_pi_firmware_config

- name: Set config.txt path variable
  tags: [gpu-mem, watchdog]
  ansible.builtin.set_fact:
    optimize_pi_rpi_config_path: "{{ '/boot/firmware/config.txt' if optimize_pi_firmware_config.stat.exists else '/boot/config.txt' }}"

# -------------------------------------------------------
# 2. GPU MEMORY SPLIT (Reclaim RAM)
# -------------------------------------------------------
- name: Set GPU memory MB to {{ optimize_pi_gpu_memory_mb }}
  tags: [gpu-mem]
  ansible.builtin.lineinfile:
    path: "{{ optimize_pi_rpi_config_path }}"
    regexp: "^gpu_mem="
    line: "gpu_mem={{ optimize_pi_gpu_memory_mb }}"
    mode: "0755"
    create: true
  notify: Reboot Pi

# -------------------------------------------------------
# 3. ZRAM CONFIGURATION (Compressed RAM)
# -------------------------------------------------------
- name: Install zram-tools
  tags: [zram]
  ansible.builtin.apt:
    name: zram-tools
    state: present
    update_cache: true
  become: true

- name: Configure ZRAM percentage
  tags: [zram]
  ansible.builtin.lineinfile:
    path: /etc/default/zramswap
    regexp: "^PERCENT="
    line: "PERCENT={{ optimize_pi_zram_percentage }}"
  notify: Restart ZRAM

# -------------------------------------------------------
# 4. LOG2RAM (Save SD Card)
# -------------------------------------------------------
- name: Install python3-debian (required by deb822_repository, below)
  tags: [log2ram]
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true
  become: true

- name: Add Azlux GPG key for Log2Ram
  tags: [log2ram]
  ansible.builtin.get_url:
    url: https://azlux.fr/repo.gpg
    dest: /usr/share/keyrings/azlux-archive-keyring.gpg
    mode: "0644"

- name: Add Log2Ram repository
  tags: [log2ram]
  # deb822 format (.sources) — the one-line "deb [...] ..." apt_repository form is deprecated.
  ansible.builtin.deb822_repository:
    name: azlux
    types: [deb]
    uris: http://packages.azlux.fr/debian/
    suites: bookworm
    components: [main]
    signed_by: /usr/share/keyrings/azlux-archive-keyring.gpg
    state: present
  become: true

- name: Remove the deprecated one-line Log2Ram APT source
  tags: [log2ram]
  # deb822_repository writes azlux.sources; drop any azlux.list left by the old
  # apt_repository task so apt doesn't see the repo "configured multiple times".
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/azlux.list
    state: absent
  become: true

- name: Install Log2Ram
  tags: [log2ram]
  ansible.builtin.apt:
    name: log2ram
    state: present
    update_cache: true
  notify: Reboot Pi
  become: true

# -------------------------------------------------------
# 5. HARDWARE WATCHDOG (Auto-Reboot on Freeze)
# -------------------------------------------------------
- name: Enable watchdog kernel module in {{ optimize_pi_rpi_config_path }}
  tags: [watchdog]
  ansible.builtin.lineinfile:
    path: "{{ optimize_pi_rpi_config_path }}"
    regexp: "^dtparam=watchdog="
    line: "dtparam=watchdog=on"
  notify: Reboot Pi

- name: Install watchdog daemon
  tags: [watchdog]
  ansible.builtin.apt:
    name: watchdog
    state: present
  become: true

- name: Configure watchdog device
  tags: [watchdog]
  ansible.builtin.lineinfile:
    path: /etc/watchdog.conf
    regexp: "^#?watchdog-device"
    line: "watchdog-device = /dev/watchdog"

- name: Configure watchdog max load (Reboot if load > 24)
  tags: [watchdog]
  ansible.builtin.lineinfile:
    path: /etc/watchdog.conf
    regexp: "^#?max-load-1\\s="
    line: "max-load-1 = 24"
  notify: Restart Watchdog

- name: Ensure watchdog service is enabled
  tags: [watchdog]
  ansible.builtin.service:
    name: watchdog
    enabled: true
    state: started

# -------------------------------------------------------
# 6. DEBLOAT (Reclaim RAM on the 512 MB board)
# -------------------------------------------------------
- name: Purge Open vSwitch (unused) and snapd (no snaps installed)
  tags: [debloat]
  # Found 2026-06-11: openvswitch-switch-dpdk was installed (apt-mark: manual) but
  # `ovs-vsctl show` had no bridges and netplan has no OVS stanzas — yet ovs-vswitchd
  # ran with --mlockall, pinning ~14 MB of unswappable RAM. snapd ran with zero snaps
  # installed. netplan-generator only *Suggests* openvswitch-switch, so this purge is
  # dependency-safe (verified with `apt-get -s purge`: exactly these 4, nothing else).
  ansible.builtin.apt:
    name:
      - openvswitch-switch-dpdk
      - openvswitch-switch
      - openvswitch-common
      - snapd
    state: absent
    purge: true
    autoremove: true
  become: true
