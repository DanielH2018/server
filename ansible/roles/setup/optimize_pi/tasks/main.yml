---
- name: Set variables
  # Dual-tagged: vars are consumed by the gpu_mem task AND the zram task.
  # zram 75% of RAM is the device's UNCOMPRESSED capacity (~343 MB), not its RAM
  # cost — with zstd (~3.5:1 on typical anon pages) a full device costs ~98 MB
  # physical, about what lz4 paid for the old 50% device. Net: +115 MB swap
  # capacity before the SD-card swapfile gets touched, for free.
  tags: [gpu-mem, zram]
  ansible.builtin.set_fact:
    optimize_pi_gpu_memory_mb: 16
    optimize_pi_zram_percentage: 75

# -------------------------------------------------------
# 1. DYNAMIC CONFIG PATH DETECTION (Bookworm vs Bullseye)
# -------------------------------------------------------
- name: Check if /boot/firmware/config.txt exists (Bookworm)
  # Dual-tagged: the resolved config path is used by gpu_mem AND the watchdog dtparam.
  tags: [gpu-mem, watchdog]
  ansible.builtin.stat:
    path: /boot/firmware/config.txt
  register: optimize_pi_firmware_config

- name: Set config.txt path variable
  tags: [gpu-mem, watchdog]
  ansible.builtin.set_fact:
    optimize_pi_rpi_config_path: "{{ '/boot/firmware/config.txt' if optimize_pi_firmware_config.stat.exists else '/boot/config.txt' }}"

# -------------------------------------------------------
# 2. GPU MEMORY SPLIT (Reclaim RAM)
# -------------------------------------------------------
- name: Set GPU memory MB to {{ optimize_pi_gpu_memory_mb }}
  tags: [gpu-mem]
  ansible.builtin.lineinfile:
    path: "{{ optimize_pi_rpi_config_path }}"
    regexp: "^gpu_mem="
    line: "gpu_mem={{ optimize_pi_gpu_memory_mb }}"
    mode: "0755"
    create: true
  notify: Reboot Pi

# -------------------------------------------------------
# 3. ZRAM CONFIGURATION (Compressed RAM)
# -------------------------------------------------------
- name: Install zram-tools
  tags: [zram]
  ansible.builtin.apt:
    name: zram-tools
    state: present
    update_cache: true
  become: true

- name: Configure ZRAM percentage
  tags: [zram]
  ansible.builtin.lineinfile:
    path: /etc/default/zramswap
    regexp: "^PERCENT="
    line: "PERCENT={{ optimize_pi_zram_percentage }}"
  notify: Restart ZRAM

- name: Compress ZRAM with zstd instead of lz4
  tags: [zram]
  # ~3.5:1 vs lz4's ~2.5:1 on this workload — the better ratio is what makes the
  # 75% device size affordable. zstd costs more CPU per page than lz4, but the
  # A53 cores idle ~95% here; the SD-card swapfile this avoids is FAR slower.
  ansible.builtin.lineinfile:
    path: /etc/default/zramswap
    regexp: "^#?ALGO="
    line: "ALGO=zstd"
  notify: Restart ZRAM

- name: Prefer zram swap over page-cache eviction (vm.swappiness=130)
  tags: [zram]
  # Kernel default 60 treats swap as expensive (true for the SD swapfile, false
  # for zram). >100 (valid on 5.8+; this is 6.8) tells reclaim that compressing
  # an idle anon page is cheaper than re-reading a hot file page from SD.
  # daniel-server runs swappiness=10 for the opposite reason — see initial_setup.
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "130"
    state: present
    sysctl_set: true
  become: true

- name: Disable swap readahead (vm.page-cluster=0)
  tags: [zram]
  # 3 = 8-page readahead per fault: a win on rotating disks, pure decompression
  # waste on zram where each page is random-access. 0 cuts swap-in latency ~8x.
  ansible.posix.sysctl:
    name: vm.page-cluster
    value: "0"
    state: present
    sysctl_set: true
  become: true

# -------------------------------------------------------
# 4. LOG2RAM (Save SD Card)
# -------------------------------------------------------
- name: Install python3-debian (required by deb822_repository, below)
  tags: [log2ram]
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true
  become: true

- name: Add Azlux GPG key for Log2Ram
  tags: [log2ram]
  ansible.builtin.get_url:
    url: https://azlux.fr/repo.gpg
    dest: /usr/share/keyrings/azlux-archive-keyring.gpg
    mode: "0644"

- name: Verify the Azlux GPG key fingerprint
  tags: [log2ram]
  # Fail the play closed if the fetched key is not Azlux's signing key (fingerprint
  # 98B824A5 FA7D3A10 FDB225B7 CA548A0A 0312D8E6, uid "Azlux <github@azlux.fr>"). Azlux is a
  # third-party repo with no prominently-published checksum, so this pins the fingerprint of
  # the key currently trusted on the Pi — a swapped/MITM'd key on a later fetch then fails the
  # play before deb822 trusts it. Runs every play (changed_when: false).
  ansible.builtin.command:
    cmd: gpg --show-keys --with-colons /usr/share/keyrings/azlux-archive-keyring.gpg
  register: optimize_pi_azlux_key_fpr
  changed_when: false
  failed_when: "'98B824A5FA7D3A10FDB225B7CA548A0A0312D8E6' not in optimize_pi_azlux_key_fpr.stdout"

- name: Add Log2Ram repository
  tags: [log2ram]
  # deb822 format (.sources) — the one-line "deb [...] ..." apt_repository form is deprecated.
  ansible.builtin.deb822_repository:
    name: azlux
    types: [deb]
    uris: http://packages.azlux.fr/debian/
    suites: bookworm
    components: [main]
    signed_by: /usr/share/keyrings/azlux-archive-keyring.gpg
    state: present
  become: true

- name: Remove the deprecated one-line Log2Ram APT source
  tags: [log2ram]
  # deb822_repository writes azlux.sources; drop any azlux.list left by the old
  # apt_repository task so apt doesn't see the repo "configured multiple times".
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/azlux.list
    state: absent
  become: true

- name: Install Log2Ram
  tags: [log2ram]
  ansible.builtin.apt:
    name: log2ram
    state: present
    update_cache: true
  notify: Reboot Pi
  become: true

# -------------------------------------------------------
# 5. HARDWARE WATCHDOG (Auto-Reboot on Freeze)
# -------------------------------------------------------
- name: Enable watchdog kernel module in {{ optimize_pi_rpi_config_path }}
  tags: [watchdog]
  ansible.builtin.lineinfile:
    path: "{{ optimize_pi_rpi_config_path }}"
    regexp: "^dtparam=watchdog="
    line: "dtparam=watchdog=on"
  notify: Reboot Pi

- name: Install watchdog daemon
  tags: [watchdog]
  ansible.builtin.apt:
    name: watchdog
    state: present
  become: true

- name: Configure watchdog device
  tags: [watchdog]
  ansible.builtin.lineinfile:
    path: /etc/watchdog.conf
    regexp: "^#?watchdog-device"
    line: "watchdog-device = /dev/watchdog"

- name: Configure watchdog max load (Reboot if load > 24)
  tags: [watchdog]
  ansible.builtin.lineinfile:
    path: /etc/watchdog.conf
    regexp: "^#?max-load-1\\s="
    line: "max-load-1 = 24"
  notify: Restart Watchdog

- name: Ensure watchdog service is enabled
  tags: [watchdog]
  ansible.builtin.service:
    name: watchdog
    enabled: true
    state: started

# -------------------------------------------------------
# 6. DEBLOAT (Reclaim RAM on the 512 MB board)
# -------------------------------------------------------
- name: Purge Open vSwitch (unused) and snapd (no snaps installed)
  tags: [debloat]
  # Found 2026-06-11: openvswitch-switch-dpdk was installed (apt-mark: manual) but
  # `ovs-vsctl show` had no bridges and netplan has no OVS stanzas — yet ovs-vswitchd
  # ran with --mlockall, pinning ~14 MB of unswappable RAM. snapd ran with zero snaps
  # installed. netplan-generator only *Suggests* openvswitch-switch, so this purge is
  # dependency-safe (verified with `apt-get -s purge`: exactly these 4, nothing else).
  ansible.builtin.apt:
    name:
      - openvswitch-switch-dpdk
      - openvswitch-switch
      - openvswitch-common
      - snapd
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Purge fwupd (no LVFS-updatable firmware on a Pi; daemon start thrashes 512 MB RAM)
  tags: [debloat]
  # Found 2026-06-11: fwupd-refresh.timer fired ~hourly; each dbus activation of
  # fwupd.service swapped the Zero 2 W into the ground (zram 100% full, IO PSI
  # full>40%, RCU stalls) — every container healthcheck timed out and autoheal
  # restart-stormed (RestartCount=20 on itself). fwupd never even started: it hit
  # the 25 s dbus activation timeout every time, so it provided nothing. Pi firmware
  # ships via apt (raspi packages), not LVFS. Dependency-safe: `apt-get -s purge`
  # removes exactly fwupd; ubuntu-server/ubuntu-server-raspi only Recommend it.
  # daniel-server already has no fwupd installed, so this is Pi-only debloat.
  ansible.builtin.apt:
    name: fwupd
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Check the purged fwupd units for stale failed state # noqa command-instead-of-module
  tags: [debloat]
  # Found 2026-06-12: apt purge removes the unit files but never runs reset-failed,
  # so units that were `failed` at purge time (fwupd.service hit the 25 s dbus
  # timeout every activation) stay pinned in memory as not-found/failed and pollute
  # `systemctl --failed` until a reset or reboot.
  ansible.builtin.command: systemctl is-failed {{ item }}
  loop: [fwupd.service, fwupd-refresh.service]
  register: optimize_pi_fwupd_unit_state
  changed_when: false
  failed_when: false
  check_mode: false # read-only query; must run under --check or the when: below breaks
  become: true

- name: Clear stale failed state left behind by the purge
  tags: [debloat]
  ansible.builtin.command: systemctl reset-failed {{ item.item }}
  loop: "{{ optimize_pi_fwupd_unit_state.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stdout == 'failed'
  changed_when: true
  become: true

# Reclaim ~17 MB more on the 512 MB board by shedding a redundant logger, an unused radio's
# supplicant, and a stale init log — all found 2026-07-06 while auditing where the ~310 MB used
# goes (dockerd+containerd+shims are ~108 MB of it and can't be trimmed). Pi-only, since this whole
# role is `when: inventory_hostname == 'daniel-pi'` — the server keeps these (it has RAM to spare).

- name: Disable + mask rsyslog (journald is the log of record here)
  tags: [debloat]
  # journald already captures everything (journalctl works) and fail2ban reads the journal
  # (systemd backend, verified), so rsyslog is a redundant SECOND logger — and its text logs
  # (/var/log/{syslog,kern,auth,daemon}.log) land in the log2ram tmpfs = REAL RAM. Mask, not just
  # disable, so a package/dependency update can't silently re-enable it. journald provides /dev/log
  # via its own socket, so syslog() calls still get captured.
  ansible.builtin.systemd:
    name: rsyslog.service
    state: stopped
    enabled: false
    masked: true
  become: true

- name: Find the stale rsyslog text logs left in the log2ram tmpfs
  tags: [debloat]
  # rsyslog stops writing once masked, but the files it already produced sit in RAM-backed /var/log
  # until logrotate/reboot. Collect them (incl. rotated .1/.gz) to reclaim the RAM now — journald
  # retains the same records and nothing here reads these text files.
  ansible.builtin.find:
    paths: /var/log
    patterns:
      ["syslog*", "kern.log*", "auth.log*", "daemon.log*", "user.log*", "messages*", "debug*"]
    recurse: false
  register: optimize_pi_rsyslog_logs
  become: true

- name: Remove the stale rsyslog text logs
  tags: [debloat]
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ optimize_pi_rsyslog_logs.files }}"
  loop_control:
    label: "{{ item.path }}"
  become: true

- name: Disable + mask wpa_supplicant (the Pi is on wired ethernet; wlan0 is down)
  tags: [debloat]
  # The USB ethernet NIC carries the default route and wlan0 is DOWN, so the WiFi supplicant runs
  # for nothing. Mask, don't purge — netplan / the network stack depend on the wpasupplicant package;
  # this stops the daemon (and the idle radio) without touching those deps.
  ansible.builtin.systemd:
    name: wpa_supplicant.service
    state: stopped
    enabled: false
    masked: true
  become: true

- name: Remove the stale AIDE init log from the log2ram tmpfs (RAM)
  tags: [debloat]
  # /var/log/aide/aide.log is the one-time `aideinit` report (~9 MB, written when the DB was first
  # built). The weekly `aide --check` cron logs to journald (`| logger -t aide`, see initial_setup),
  # NOT here, so this file has been dead since init yet sits in RAM-backed /var/log. Safe to remove:
  # AIDE reads its DB (/var/lib/aide), never this log, and aideinit is `creates:`-guarded (won't rerun).
  ansible.builtin.file:
    path: /var/log/aide/aide.log
    state: absent
  become: true

# -------------------------------------------------------
# 7. LOG RAM BUDGET (log2ram tmpfs is 128 MB of REAL RAM)
# -------------------------------------------------------
# Everything under /var/log lives in log2ram's RAM-backed tmpfs. Found 2026-06-11
# at 81% (103/128 MB): journald carried the server-sized 1G cap from initial_setup
# (would overflow the tmpfs and fail log writes), and acct's savelog kept 30 daily
# pacct generations (36 MB and growing toward ~90 MB). Cap both.

- name: Cap journald to fit the log2ram tmpfs (overrides initial_setup's 1G)
  tags: [log2ram]
  # 60-homelab-pi sorts after initial_setup's 50-homelab.conf, so this wins.
  # journald vacuums archived journals down to the cap on restart.
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/60-homelab-pi.conf
    content: |
      # Managed by Ansible (optimize_pi role) — edits here are overwritten.
      # /var/log is a 128 MB log2ram tmpfs (= RAM); the 1G default would overflow it.
      [Journal]
      SystemMaxUse=32M
      SystemMaxFileSize=8M
    mode: "0644"
  become: true
  notify: Restart systemd-journald

- name: Keep 3 days of process accounting, not 30 (ACCT_LOGGING)
  tags: [log2ram]
  # /etc/cron.daily/acct rotates pacct with savelog -c $ACCT_LOGGING. The healthcheck
  # exec churn writes ~28 MB/day, all of it RAM via log2ram; 30 generations is a
  # server-disk default. 3 days keeps enough for "what ran last night" forensics.
  ansible.builtin.lineinfile:
    path: /etc/default/acct
    regexp: '^#?ACCT_LOGGING='
    line: 'ACCT_LOGGING="3"'
  become: true

# -------------------------------------------------------
# 8. EARLYOOM (kill the hog before the watchdog reboots)
# -------------------------------------------------------
- name: Install earlyoom
  tags: [earlyoom]
  ansible.builtin.apt:
    name: earlyoom
    state: present
  become: true

- name: Configure earlyoom thresholds and protected processes
  tags: [earlyoom]
  # Without this the only escape from a memory spiral is the hardware watchdog
  # hard-rebooting at load 24 (≥10 min of full stall first). earlyoom SIGTERMs the
  # largest process once BOTH avail mem < 10% AND free swap < 10% — a true OOM
  # spiral, not the swap-heavy-but-stable steady state this box likes to run.
  # --avoid shields the processes whose death would be worse than the stall.
  ansible.builtin.lineinfile:
    path: /etc/default/earlyoom
    regexp: '^#?EARLYOOM_ARGS='
    line: >-
      EARLYOOM_ARGS="-m 10 -s 10 -r 3600 --avoid
      '(^|/)(systemd|systemd-.*|init|sshd|dockerd|containerd|containerd-shim.*|watchdog)$'"
  become: true
  notify: Restart earlyoom

- name: Enable earlyoom service
  tags: [earlyoom]
  ansible.builtin.systemd:
    name: earlyoom
    enabled: true
    state: started
  become: true

- name: Deploy the SD-card health heartbeat script
  tags: [sd-health]
  # SD cards can't do SMART (no ATA/NVMe command set behind mmcblk0), so scrutiny is
  # useless here; the ext4 errors_count sysfs counter is the earliest reliable
  # failure signal. The script pushes it to the static "Daniel Pi SD Health" Kuma
  # push monitor (defined in the uptime-kuma role) through the LAN-only Authelia
  # bypass on ^/api/push/. Mode 0700: the push token is embedded, so it's legible
  # only to the cron user that runs it.
  ansible.builtin.template:
    src: pi-sd-health.sh.j2
    dest: /usr/local/bin/pi-sd-health.sh
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0700"
  become: true

- name: Schedule the SD-card health heartbeat
  tags: [sd-health]
  # Every 5 min — the Kuma monitor's 600s heartbeat window is 2x this, so one
  # missed push is tolerated but a dead cron/host alerts. Cost per run: one sysfs
  # read + one LAN HTTPS request; nothing measurable on the Zero 2 W.
  ansible.builtin.cron:
    name: "Pi SD-card health heartbeat"
    minute: "*/5"
    job: "/usr/local/bin/pi-sd-health.sh"
    user: "{{ sys_user }}"
  become: true
