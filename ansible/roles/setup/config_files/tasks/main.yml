---
# The play (initial_setup.yml) runs become:true, so a become:false `echo $HOME` used to be
# needed to avoid shipping these dotfiles to /root. The deploy user's home is just
# /home/{{ sys_user }} (also hardcoded in sops_setup's .bashrc path), so hardcode it directly
# and drop the extra shell task.
- name: Copy .gitconfig to home directory
  ansible.builtin.copy:
    src: .gitconfig
    dest: "/home/{{ sys_user }}/.gitconfig"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
    backup: true
  tags: git

- name: Copy .bashrc to home directory
  ansible.builtin.copy:
    src: .bashrc
    dest: "/home/{{ sys_user }}/.bashrc"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
    backup: true
  tags: bash

- name: Display completion message
  ansible.builtin.debug:
    msg: "Configuration files have been deployed successfully"
