---
- name: Resolve the deploy user's home directory
  # The play (initial_setup.yml) runs become:true, so facts were gathered escalated and
  # ansible_facts.env.HOME is /root — using it for dest sent these dotfiles to root's
  # home instead of the deploy user's. Same fix class as initial_setup's resolver task;
  # this role runs first in the play, so it needs its own copy of the pattern.
  ansible.builtin.shell: echo "$HOME"
  become: false
  changed_when: false
  register: config_files_user_home
  tags: [git, bash]

- name: Copy .gitconfig to home directory
  ansible.builtin.copy:
    src: .gitconfig
    dest: "{{ config_files_user_home.stdout }}/.gitconfig"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
    backup: true
  tags: git

- name: Copy .bashrc to home directory
  ansible.builtin.copy:
    src: .bashrc
    dest: "{{ config_files_user_home.stdout }}/.bashrc"
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
    backup: true
  tags: bash

- name: Display completion message
  ansible.builtin.debug:
    msg: "Configuration files have been deployed successfully"
