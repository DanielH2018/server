---
- name: Add packages
  tags: [docker-repo]
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-debian  # required by ansible.builtin.deb822_repository (below)
  become: true

- name: Download Docker GPG key
  tags: [docker-repo]
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg
    mode: "0644"

- name: Dearmor Docker GPG key
  tags: [docker-repo]
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg --yes /tmp/docker.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg
  become: true

- name: Add Docker APT repository
  tags: [docker-repo]
  # deb822 format (.sources) — the one-line "deb [...] ..." apt_repository form is deprecated.
  # No update_cache here (deb822_repository lacks it); the next task refreshes the cache.
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts.distribution_release }}"
    components: [stable]
    architectures: ["{{ repo_arch }}"]
    signed_by: /usr/share/keyrings/docker-archive-keyring.gpg
    state: present
  vars:
    # Map ansible_facts.architecture (x86_64) to dpkg terms (amd64)
    repo_arch: "{{ 'amd64' if ansible_facts.architecture == 'x86_64' else 'arm64' }}"
  become: true

- name: Remove the deprecated one-line Docker APT source
  tags: [docker-repo]
  # deb822_repository writes docker.sources; drop any docker.list left by the old
  # apt_repository task so apt doesn't see the repo "configured multiple times".
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  become: true

- name: Update apt-get repo and cache
  tags: [docker-repo]
  ansible.builtin.apt:
    upgrade: true
    update_cache: true
    force_apt_get: true
  become: true

- name: Install Docker
  tags: [docker-engine]
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      # Compose v2 is the engine behind community.docker.docker_compose_v2 (our
      # deploy module) and buildx backs its `build: always`. Declared explicitly
      # so the dependency is reproducible and not left to docker-ce-cli Recommends
      # (which apt marks auto-installed and could drop under a stricter apt config).
      - docker-compose-plugin
      - docker-buildx-plugin
  become: true

- name: Remove the deprecated linuxserver docker-compose v1 wrapper
  tags: [docker-engine]
  # Superseded by docker-compose-plugin (`docker compose`). The old run.sh wrapper
  # shipped EOL Compose v1.29 and was fetched from an unpinned GitHub master.
  ansible.builtin.file:
    path: /usr/local/bin/docker-compose
    state: absent
  become: true

- name: Resolve the deploy user (for docker group membership)
  tags: [docker-group]
  # ansible_facts.env.USER is "root" under the play's become:true, but the user who runs
  # docker (the become:false connecting user) is who needs docker-group membership.
  ansible.builtin.command: id -un
  become: false
  changed_when: false
  register: docker_install_deploy_user

- name: Add user to docker group
  tags: [docker-group]
  ansible.builtin.user:
    name: "{{ docker_install_deploy_user.stdout }}"
    groups: docker
    append: true
  become: true

- name: Configure Docker daemon (log limits + live-restore)
  tags: [docker-daemon]
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    # live-restore keeps containers running across a daemon restart (e.g. a
    # docker-ce package upgrade), so a Docker restart doesn't bounce all ~42
    # containers. Safe on this single-node, non-swarm host.
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true
      }
    mode: "0644"
    owner: root
    group: root
  become: true
  register: docker_install_daemon_config

- name: Restart Docker to apply daemon config # noqa no-handler
  tags: [docker-daemon]
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: true
  when: docker_install_daemon_config.changed

- name: Create Docker networks
  tags: [docker-networks]
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ docker_network }}"
    - monitoring
    - media
    - apps
    - homepage_private
    - lifecycle  # private net: Watchtower + Autoheal <-> docker-proxy-lifecycle only
    - kopia      # isolation net: Kopia <-> Traefik only (unauthenticated repo not reachable by other apps)
    - ups        # isolation net: NUT <-> Home Assistant only (UPS state, kept off apps)
    - mqtt       # isolation net: Mosquitto <-> Zigbee2MQTT <-> Home Assistant only (MQTT off apps)
  become: true
