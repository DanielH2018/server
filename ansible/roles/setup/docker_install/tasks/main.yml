---
- name: Add packages
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg
    mode: "0644"

- name: Dearmor Docker GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg --yes /tmp/docker.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg
  become: true

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    # We construct the repo string using Ansible variables instead of shell commands
    repo: >-
      deb [arch={{ repo_arch }} signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts.distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  vars:
    # Map ansible_facts.architecture (x86_64) to dpkg terms (amd64)
    repo_arch: "{{ 'amd64' if ansible_facts.architecture == 'x86_64' else 'arm64' }}"
  become: true

- name: Update apt-get repo and cache
  ansible.builtin.apt:
    upgrade: true
    update_cache: true
    force_apt_get: true
  become: true

- name: Install Docker
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      # Compose v2 is the engine behind community.docker.docker_compose_v2 (our
      # deploy module) and buildx backs its `build: always`. Declared explicitly
      # so the dependency is reproducible and not left to docker-ce-cli Recommends
      # (which apt marks auto-installed and could drop under a stricter apt config).
      - docker-compose-plugin
      - docker-buildx-plugin
  become: true

- name: Remove the deprecated linuxserver docker-compose v1 wrapper
  # Superseded by docker-compose-plugin (`docker compose`). The old run.sh wrapper
  # shipped EOL Compose v1.29 and was fetched from an unpinned GitHub master.
  ansible.builtin.file:
    path: /usr/local/bin/docker-compose
    state: absent
  become: true

- name: Resolve the deploy user (for docker group membership)
  # ansible_facts.env.USER is "root" under the play's become:true, but the user who runs
  # docker (the become:false connecting user) is who needs docker-group membership.
  ansible.builtin.command: id -un
  become: false
  changed_when: false
  register: docker_install_deploy_user

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_install_deploy_user.stdout }}"
    groups: docker
    append: true
  become: true

- name: Configure Docker daemon (log limits + live-restore)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    # live-restore keeps containers running across a daemon restart (e.g. a
    # docker-ce package upgrade), so a Docker restart doesn't bounce all ~42
    # containers. Safe on this single-node, non-swarm host.
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true
      }
    mode: "0644"
    owner: root
    group: root
  become: true
  register: docker_install_daemon_config

- name: Restart Docker to apply daemon config # noqa no-handler
  ansible.builtin.systemd:
    name: docker
    state: restarted
  become: true
  when: docker_install_daemon_config.changed

- name: Create Docker networks
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ docker_network }}"
    - monitoring
    - media
    - apps
    - homepage_private
    - lifecycle  # private net: Watchtower + Autoheal <-> docker-proxy-lifecycle only
    - kopia      # isolation net: Kopia <-> Traefik only (unauthenticated repo not reachable by other apps)
  become: true
