---
- name: Add packages
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg
    mode: "0644"

- name: Dearmor Docker GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg --yes /tmp/docker.gpg
  args:
    creates: /usr/share/keyrings/docker-archive-keyring.gpg
  become: true

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    # We construct the repo string using Ansible variables instead of shell commands
    repo: >-
      deb [arch={{ repo_arch }} signed-by=/usr/share/keyrings/docker-archive-keyring.gpg]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  vars:
    # Map ansible_architecture (x86_64) to dpkg terms (amd64)
    repo_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
  become: true

- name: Update apt-get repo and cache
  ansible.builtin.apt:
    upgrade: true
    update_cache: true
    force_apt_get: true
  become: true

- name: Install Docker
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
  become: true

- name: Install Docker Compose
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/linuxserver/docker-docker-compose/master/run.sh
    dest: /usr/local/bin/docker-compose
    mode: "0755"
  become: true

- name: Chmod Docker Compose
  ansible.builtin.file:
    dest: /usr/local/bin/docker-compose
    mode: +x
  become: true

- name: Add sudo to user
  ansible.builtin.command: "usermod -aG docker {{ ansible_env.USER }}"
  become: true

- name: Create Network
  ansible.builtin.shell: "docker network create {{ docker_network }} --subnet=172.18.0.0/16 || true"
  become: true
