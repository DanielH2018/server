---
# -------------------------------------------------------
# 1. INSTALLATION
# -------------------------------------------------------
- name: Ensure 'age' is installed (Debian/Ubuntu)
  tags: [sops-install]
  ansible.builtin.apt:
    name: age
    state: present
    update_cache: true

- name: Download and install SOPS binary
  tags: [sops-install]
  ansible.builtin.get_url:
    url: "{{ sops_binary_url }}"
    dest: /usr/local/bin/sops
    mode: "0755"
  vars:
    # You can check https://github.com/getsops/sops/releases for the latest
    sops_version: "v3.9.2"
    sops_arch: "{{ 'amd64' if ansible_facts.architecture == 'x86_64' else 'arm64' }}"
    sops_binary_url: "https://github.com/getsops/sops/releases/download/{{ sops_version }}/sops-{{ sops_version }}.linux.{{ sops_arch }}"

- name: Install pinned Ansible collections from requirements.yml
  tags: [collections]
  # Install community.sops (and the rest of the pinned set) at the versions locked in
  # ansible/requirements.yml rather than pulling unpinned latest — keeps the runtime
  # collections in lockstep with the tooling. Install into the path ansible.cfg loads
  # from (collections_path = ansible/collections), matching the prek lint hook.
  # Run as the regular user (become: false) so it installs for the repo owner.
  become: false
  ansible.builtin.command: >-
    ansible-galaxy collection install
    -r {{ playbook_dir }}/requirements.yml
    -p {{ playbook_dir }}/collections
  changed_when: false

# -------------------------------------------------------
# 2. KEY GENERATION
# -------------------------------------------------------

- name: Setup SOPS config directory
  tags: [age-key]
  ansible.builtin.set_fact:
    sops_setup_sops_config_dir: "{{ home_dir }}/.config/sops/age"
  vars:
    home_dir: "/home/{{ sys_user }}"

- name: Setup SOPS with Key File location
  tags: [age-key]
  ansible.builtin.set_fact:
    sops_setup_key_file: "{{ sops_setup_sops_config_dir }}/keys.txt"

- name: Create directory for Age keys
  tags: [age-key]
  become: false
  ansible.builtin.file:
    path: "{{ sops_setup_sops_config_dir }}"
    state: directory
    mode: "0700"

# DR NOTE: this private key is the ONLY thing that can decrypt ansible/vars/secrets.yml.
# The encrypted secrets live in git (offsite), but Kopia backs up only `containers/` — the
# key at ~/.config/sops/age/keys.txt is in NO automated backup. It MUST be kept somewhere
# off-box (password manager / hardware token); otherwise a disk loss means the encrypted
# secrets are unrecoverable. The key is currently backed up out-of-band (confirmed
# 2026-06-06). A second `age` recipient in .sops.yaml would be the in-repo way to remove
# the single-key dependency — not yet done.
- name: Generate Age key (only if it doesn't exist)
  tags: [age-key]
  become: false
  ansible.builtin.command: "age-keygen -o {{ sops_setup_key_file }}"
  args:
    creates: "{{ sops_setup_key_file }}"

- name: Display the new Public Key
  tags: [age-key]
  become: false
  ansible.builtin.shell:
    # pipefail needs bash; Ubuntu's /bin/sh is dash, which errors on `set -o pipefail`.
    cmd: "set -o pipefail && grep 'public key' {{ sops_setup_key_file }} | awk '{print $4}'"
    executable: /bin/bash
  register: sops_setup_public_key
  changed_when: false

- name: Show the Public Key to user
  tags: [age-key]
  ansible.builtin.debug:
    msg: "Your Public Key is: {{ sops_setup_public_key.stdout }}"

# -------------------------------------------------------
# 3. CONFIGURATION (.sops.yaml)
# -------------------------------------------------------
- name: Seed ansible/.sops.yaml (first-host bootstrap only)
  # Tagged age-key (not its own tag): consumes sops_setup_public_key registered above,
  # so it can only run as part of the key-generation block.
  tags: [age-key]
  become: false
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/.sops.yaml"
    content: |
      creation_rules:
        - path_regex: .*(vars|secrets)\/.*\.ya?ml$
          age: "{{ sops_setup_public_key.stdout }}"
    mode: "0644"
  # Only seeds the very first host. ansible/.sops.yaml is tracked, so every host that has
  # the repo checkout already has it -> this skips. Additional hosts add their key to the
  # existing ansible/.sops.yaml + `sops updatekeys`; they must NOT overwrite it here.
  when: not (lookup('file', playbook_dir + '/.sops.yaml', errors='ignore'))

- name: Export SOPS_AGE_KEY_FILE in .bashrc
  tags: [sops-config]
  ansible.builtin.lineinfile:
    # The deploy user's .bashrc, NOT ansible_facts.user_dir — that's /root under the
    # play's become:true (same bug class as config_files' env.HOME, fixed 2026-06-10);
    # the export silently landed in /root/.bashrc. Matches the key-dir tasks above.
    path: "/home/{{ sys_user }}/.bashrc"
    regexp: "^export SOPS_AGE_KEY_FILE="
    line: "export SOPS_AGE_KEY_FILE=$HOME/.config/sops/age/keys.txt"
    create: true
    owner: "{{ sys_user }}"
    group: "{{ sys_user }}"
    mode: "0644"
