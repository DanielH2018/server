---
# =========================================================================
# Pi memory safety — MUST run before the heavy apt below.
# The Zero 2 W has 512 MB RAM; apt-show-versions' cache build and
# `upgrade: dist` OOM-kill mid-dpkg without disk-backed swap, corrupting the
# package DB (the classic "dpkg was interrupted" deploy hang). The thrash can
# also trip the optimize_pi watchdog (max-load-1=24) into rebooting mid-apt,
# so we stop the watchdog for the run — optimize_pi re-enables it at the end.
# This lives here, not in optimize_pi, because optimize_pi runs LAST in
# initial_setup.yml — too late to protect these apt tasks.
# =========================================================================
- name: Gather service facts
  tags: [pi-swap]
  ansible.builtin.service_facts:
  when: inventory_hostname == 'daniel-pi'

- name: Stop the hardware watchdog during provisioning (Pi)
  tags: [pi-swap]
  ansible.builtin.systemd:
    name: watchdog
    state: stopped
  become: true
  when:
    - inventory_hostname == 'daniel-pi'
    - "'watchdog.service' in (ansible_facts.services | default({}))"

- name: Create swap file (Pi)
  tags: [pi-swap]
  ansible.builtin.command:
    cmd: "fallocate -l {{ pi_swapfile_size }} {{ pi_swapfile_path }}"
    creates: "{{ pi_swapfile_path }}"
  become: true
  register: initial_setup_swapfile_create
  when: inventory_hostname == 'daniel-pi'

- name: Secure swap file permissions (Pi)
  tags: [pi-swap]
  ansible.builtin.file:
    path: "{{ pi_swapfile_path }}"
    owner: root
    group: root
    mode: "0600"
  become: true
  when: inventory_hostname == 'daniel-pi'

- name: Format swap file (Pi)
  tags: [pi-swap]
  ansible.builtin.command:
    cmd: "mkswap {{ pi_swapfile_path }}"
  become: true
  changed_when: true
  when:
    - inventory_hostname == 'daniel-pi'
    - initial_setup_swapfile_create is changed

- name: Persist swap file in fstab (Pi)
  tags: [pi-swap]
  ansible.posix.mount:
    path: none
    src: "{{ pi_swapfile_path }}"
    fstype: swap
    opts: sw
    state: present
  become: true
  when: inventory_hostname == 'daniel-pi'

- name: Activate swap file (Pi)
  tags: [pi-swap]
  ansible.builtin.command:
    cmd: "swapon {{ pi_swapfile_path }}"
  become: true
  changed_when: true
  when:
    - inventory_hostname == 'daniel-pi'
    - initial_setup_swapfile_create is changed

- name: Update and upgrade system packages
  tags: [apt-upgrade]
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
  become: true

- name: Install Raspberry Pi-specific packages
  # openvswitch-switch-dpdk was removed from this list 2026-06-11: it was never
  # configured (no bridges, no netplan stanzas) and mlockall-pinned ~14 MB on the
  # 512 MB board — optimize_pi's debloat task now purges it, and listing it here
  # would reinstall it on every full run.
  tags: [packages]
  ansible.builtin.apt:
    name:
      - linux-raspi
      - wireguard
    state: present
  become: true
  when: inventory_hostname == 'daniel-pi'

# apt-show-versions hooks EVERY apt invocation with a full cache rebuild — 10-30 min
# of swap-thrash on the 512 MB Pi (caused the 2026-06-08 dpkg corruption pre-swapfile,
# and the 2026-06-10 "hung play" → stacked-run → watchdog-reboot incident). The Pi
# gets nothing from it (apticron-style reporting), so it's roomy-hosts-only.
# The Pi removal runs BEFORE any other package work so a missing base package
# can't trigger one final hook grind on the way in.
- name: Remove apt-show-versions (daniel-pi — apt-hook tax on 512 MB)
  ansible.builtin.apt:
    name: apt-show-versions
    state: absent
    purge: true
  become: true
  when: inventory_hostname == 'daniel-pi'
  tags: [packages]

- name: Install required packages
  ansible.builtin.apt:
    name:
      - unzip
      - unattended-upgrades
      - update-notifier-common
      - fail2ban
      - libpam-tmpdir
      - debsums
      - jq  # Claude Code plugin hooks (ralph-loop stop-hook) parse hook JSON with it
    state: present
  become: true
  tags: [packages]

- name: Install apt-show-versions (non-Pi hosts only)
  ansible.builtin.apt:
    name: apt-show-versions
    state: present
  become: true
  when: inventory_hostname != 'daniel-pi'
  tags: [packages]

- name: Resolve the deploy user's home directory
  # Dual-tagged: registers a fact consumed by BOTH the uv tasks (tooling) and the
  # prek task (git-hooks); a tag-scoped run of either still needs it.
  tags: [tooling, git-hooks]
  # The play runs become:true, so gather_facts escalated and ansible_facts.env.HOME is
  # /root. The uv/prek tasks below run become:false (per-user installs as the connecting
  # user), so they need THAT user's home, not root's. Capture it explicitly here rather
  # than re-gathering env facts globally (config_files/docker_install also read env facts).
  ansible.builtin.shell: echo "$HOME"
  become: false
  changed_when: false
  register: initial_setup_user_home

- name: Install uv (per-user; PEP 668-safe on 24.04+)
  tags: [tooling]
  # 24.04 / Python 3.12 marks the system environment externally-managed (PEP 668), so a
  # global `pip install` errors. uv is a standalone binary (no system Python needed),
  # installed per-user into ~/.local/bin via the official script. Run as the connecting
  # user (not the play's become: true) so it lands in the repo owner's home.
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -LsSf https://astral.sh/uv/install.sh | sh
    creates: "{{ initial_setup_user_home.stdout }}/.local/bin/uv"
    executable: /bin/bash
  become: false

- name: Install Python CLI tooling as uv tools
  tags: [tooling]
  # uv manages global CLI tools in isolated venvs (~/.local/share/uv/tools), exposing
  # shims in ~/.local/bin — the pipx replacement. Pinned to Python 3.14 to match the
  # repo's .python-version (the test/validate `uv run` hooks); ansible-core also backs
  # those hooks (via pyproject.toml), but as a CLI tool here it is what runs deploys.
  # Per-user, so `prek install` (below) finds prek on ~/.local/bin.
  ansible.builtin.command: "{{ initial_setup_user_home.stdout }}/.local/bin/uv tool install --python 3.14 {{ item }}"
  args:
    creates: "{{ initial_setup_user_home.stdout }}/.local/share/uv/tools/{{ item }}"
  loop:
    - ansible-core
    - ansible-lint
    - prek
  become: false

- name: Enable periodic unattended security upgrades
  tags: [unattended-upgrades]
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Set local unattended-upgrades policy
  tags: [unattended-upgrades]
  # Security origins are enabled by the distro's 50unattended-upgrades. This local
  # drop-in pins the bits we care about: no surprise reboots (the weekly "Weekly
  # system restart" cron owns reboots) and cleanup of obsolete kernels/deps.
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    content: |
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Enable and start fail2ban
  tags: [fail2ban]
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  become: true

- name: Deploy fail2ban jail configuration
  tags: [fail2ban]
  ansible.builtin.template:
    src: fail2ban_homelab.conf.j2
    dest: /etc/fail2ban/jail.d/homelab.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart fail2ban

- name: Set SSH directory permissions
  tags: [ssh]
  ansible.builtin.file:
    path: ~/.ssh
    mode: "0700"
    owner: ubuntu
    group: ubuntu
    recurse: true

- name: Create ssh-users group
  tags: [ssh]
  ansible.builtin.group:
    name: ssh-users
    state: present
  become: true

- name: Add sys user to ssh-users group
  tags: [ssh]
  ansible.builtin.user:
    name: "{{ sys_user }}"
    groups: ssh-users
    append: true
  become: true

- name: Configure SSH security settings
  tags: [ssh]
  ansible.builtin.lineinfile:
    path: "{{ ssh_config_path }}"
    regexp: "^#?{{ item.key }}"
    line: "{{ item.key }} {{ item.value }}"
  loop:
    - { key: "PasswordAuthentication", value: "no" }
    - { key: "PermitEmptyPasswords", value: "no" }
    - { key: "PermitRootLogin", value: "no" }
    - { key: "IgnoreRhosts", value: "yes" }
    - { key: "ChallengeResponseAuthentication", value: "no" }
    - { key: "MaxAuthTries", value: "3" }
    - { key: "MaxSessions", value: "2" }
    - { key: "ClientAliveCountMax", value: "2" }
    - { key: "LoginGraceTime", value: "30" }
    - { key: "LogLevel", value: "VERBOSE" }
    - { key: "DisableForwarding", value: "yes" }
    - { key: "AllowTcpForwarding", value: "no" }
    - { key: "AllowAgentForwarding", value: "no" }
    - { key: "X11Forwarding", value: "no" }
    - { key: "Compression", value: "no" }
    - { key: "TCPKeepAlive", value: "no" }
    - { key: "AllowGroups", value: "ssh-users" }
  notify: Restart SSH

- name: Configure SSH Match block for sys user forwarding
  tags: [ssh]
  ansible.builtin.blockinfile:
    path: "{{ ssh_config_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - sys user forwarding"
    block: |
      Match User {{ sys_user }}
          AllowTcpForwarding local
          DisableForwarding no
  notify: Restart SSH

- name: Schedule sudo crontab for weekly restart
  tags: [crons]
  ansible.builtin.cron:
    name: "Weekly system restart"
    minute: "30"
    hour: "7"
    weekday: "0"
    job: "/sbin/shutdown -r +5"
    user: root
  become: true

- name: Schedule Docker image cleanup
  # `until=168h` keeps anything created in the last week: after a bad Renovate
  # bump the previous pinned image is still local, so rollback = git revert +
  # redeploy with no registry re-pull. Older unused images/build cache still go
  # daily. (Caveat: `until` filters on CreatedAt, so an upstream image built >1wk
  # ago is pruned as soon as it's unused — the window protects fresh builds/pulls.)
  ansible.builtin.cron:
    name: "Clean unused Docker images"
    minute: "30"
    hour: "6"
    job: '/usr/bin/docker system prune -a -f --filter "until=168h"'
    user: "{{ ansible_facts.user_id }}"
  become: true
  tags: [prune, crons]


- name: Create cron job to clear ansible.log weekly
  # ansible.cfg sets `log_path = ./ansible.log`, which resolves relative to the CWD
  # the playbook is run from (the repo root) — i.e. server/ansible.log, NOT
  # server/ansible/ansible.log. Truncate the file that actually grows.
  ansible.builtin.cron:
    name: "Clear ansible log file"
    minute: "0"
    hour: "6"
    weekday: "0" # 0 is Sunday
    job: "truncate -s 0 /home/{{ sys_user }}/server/ansible.log"
  become: true
  tags: [crons]

- name: Create journald drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: "0755"
  become: true
  tags: [journald]

- name: Cap systemd-journal disk usage
  # Unmanaged, journald's default cap is 10% of / bounded at 4G — and the journal had
  # grown to 3.9G of low-value history. Container logs are already rotated by the
  # Docker daemon (10m × 3) and shipped to Loki, so 1G is plenty for host forensics.
  # journald vacuums archived files down to the cap on restart.
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/50-homelab.conf
    content: |
      # Managed by Ansible (initial_setup role) — edits here are overwritten.
      [Journal]
      SystemMaxUse=1G
    mode: "0644"
  become: true
  notify: Restart systemd-journald
  tags: [journald]

# ── Server performance tuning (NOT the Pi — it needs powersave + eager zram swap) ──
# REVERTED 2026-06-11: the performance governor (added 8074318) set EPP=performance on
# the i5-1135G7, pinning cores at 3.5-3.8 GHz at idle → 92°C package at load 0.5,
# 217k package-throttle events in 18 h, fan at full tilt. powersave + HWP still
# turbos to 4.2 GHz on demand; the pinned clocks bought only heat and throttling.
- name: Check for the legacy performance-governor unit (daniel-server)
  ansible.builtin.stat:
    path: /etc/systemd/system/cpu-governor-performance.service
  when: inventory_hostname == 'daniel-server'
  register: initial_setup_cpugov_unit_file
  tags: [tuning]

- name: Disable the legacy performance-governor unit (daniel-server)
  ansible.builtin.systemd_service:
    name: cpu-governor-performance
    enabled: false
  become: true
  when:
    - inventory_hostname == 'daniel-server'
    - initial_setup_cpugov_unit_file.stat.exists
  tags: [tuning]

- name: Remove the legacy performance-governor unit file (daniel-server)
  ansible.builtin.file:
    path: /etc/systemd/system/cpu-governor-performance.service
    state: absent
  become: true
  when: inventory_hostname == 'daniel-server'
  tags: [tuning]

- name: Read the active CPU governor (daniel-server)
  ansible.builtin.slurp:
    src: /sys/devices/system/cpu/cpufreq/policy0/scaling_governor
  when: inventory_hostname == 'daniel-server'
  register: initial_setup_cpugov_current
  tags: [tuning]

- name: Revert the live CPU governor to powersave (daniel-server)
  ansible.builtin.shell: |
    for g in /sys/devices/system/cpu/cpufreq/policy*/scaling_governor; do
      echo powersave > "$g"
    done
  become: true
  changed_when: true
  when:
    - inventory_hostname == 'daniel-server'
    - (initial_setup_cpugov_current.content | b64decode | trim) == 'performance'
  tags: [tuning]

- name: Lower swappiness (daniel-server)
  # 30G RAM and swap sits unused — prefer reclaiming page cache over swapping
  # service heaps. The Pi runs the OPPOSITE tuning (swappiness=130, zram-eager)
  # in optimize_pi — 512 MB + zram needs eager swap.
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    state: present
    sysctl_set: true
  become: true
  when: inventory_hostname == 'daniel-server'
  tags: [tuning]

# ── Debloat (daniel-server) ──────────────────────────────────────────────────
# The Pi's equivalent (OVS + snapd purge) lives in optimize_pi. Here only the
# unused snaps go: LXD was seeded by the Ubuntu Server installer, its daemon is
# inactive and no system containers exist (operator confirmed removal 2026-06-11);
# core20/core22 are its base snaps, needed by nothing else. snapd itself stays —
# zero-regret subset; purging it would block any future snap-packaged tool.
- name: Remove the unused LXD snap and its orphaned bases (daniel-server)
  # One snap per call, ordered (lxd before the bases it uses): passing the list in
  # a single call made community.general.snap (11.x) mangle its snap-remove argv
  # and fail without removing anything.
  community.general.snap:
    name: "{{ item }}"
    state: absent
  loop:
    - lxd
    - core20
    - core22
  become: true
  when: inventory_hostname == 'daniel-server'
  tags: [debloat]

- name: Install Git hooks
  tags: [git-hooks]
  ansible.builtin.command: prek install
  args:
    chdir: "{{ playbook_dir }}"
    # Only run this if the hook doesn't exist yet. NB: .git lives at the REPO root,
    # one level above playbook_dir (ansible/) — the old `{{ playbook_dir }}/.git/...`
    # path never existed, so prek install re-ran on every play.
    creates: "{{ playbook_dir }}/../.git/hooks/pre-commit"
  # Run as the connecting user (not the play's become: true) so the hooks are owned
  # by the repo owner, and pick up the user's uv-managed ~/.local/bin where prek lives.
  become: false
  environment:
    PATH: "{{ initial_setup_user_home.stdout }}/.local/bin:{{ ansible_facts.env.PATH }}"

- name: Enable IPv4 forwarding
  tags: [sysctl]
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true
  become: true

- name: Apply kernel security hardening
  tags: [sysctl]
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: "net.ipv4.conf.all.rp_filter", value: "2" }
    - { name: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.default.send_redirects", value: "0" }
    # Reject source-routed packets (IPv4 + IPv6) — the companion to the redirect
    # rules above. `default.*` is the template every NEW interface inherits, which
    # matters here because Docker constantly spins up bridge/veth interfaces; the
    # host default for default.accept_source_route was 1 (accept).
    - { name: "net.ipv4.conf.all.accept_source_route", value: "0" }
    - { name: "net.ipv4.conf.default.accept_source_route", value: "0" }
    - { name: "net.ipv6.conf.all.accept_source_route", value: "0" }
    - { name: "net.ipv6.conf.default.accept_source_route", value: "0" }
    - { name: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
    - { name: "net.ipv4.conf.all.log_martians", value: "1" }
    - { name: "net.ipv4.conf.default.log_martians", value: "1" }
    - { name: "kernel.sysrq", value: "0" }
    - { name: "kernel.dmesg_restrict", value: "1" }
    - { name: "kernel.kptr_restrict", value: "2" }
    - { name: "net.core.bpf_jit_harden", value: "2" }
    - { name: "fs.suid_dumpable", value: "0" }
    - { name: "fs.protected_fifos", value: "2" }
    - { name: "dev.tty.ldisc_autoload", value: "0" }
  become: true

- name: Remove plain SSH allow rule (superseded by rate-limit)
  tags: [firewall]
  community.general.ufw:
    rule: allow
    port: ssh
    proto: tcp
    delete: true
  become: true
  failed_when: false

# Pin UFW's default policies in IaC rather than relying on the distro default.
# `deny incoming` is the host's baseline — only the explicit allow/limit rules
# below (SSH, WireGuard) open ports. Default-deny is safe to set over an active
# SSH session because the explicit `limit ssh` rule that follows takes precedence
# over the default policy. The FORWARD/routed policy is deliberately NOT managed
# here: Docker owns the FORWARD chain via its own iptables rules (DOCKER-USER),
# and the WireGuard containers depend on host forwarding — letting UFW set a
# routed default would fight Docker and risk breaking container/VPN routing.
- name: Set UFW default policy - deny incoming
  tags: [firewall]
  community.general.ufw:
    default: deny
    direction: incoming
  become: true

- name: Set UFW default policy - allow outgoing
  tags: [firewall]
  community.general.ufw:
    default: allow
    direction: outgoing
  become: true

- name: Configure UFW firewall - rate-limit SSH
  tags: [firewall]
  community.general.ufw:
    rule: limit
    port: ssh
    proto: tcp
  become: true

- name: Remove the stale WireGuard 51820/udp allow on the Pi
  tags: [firewall]
  # History: written when the Pi's wg-easy listened on 51820; the Pi moved to 51822
  # (both hosts share one public IP, so the listen ports must differ) and this rule
  # was never updated. No replacement is added: wg-easy publishes its UDP port via
  # Docker, whose nat/FORWARD rules bypass UFW INPUT entirely — proven by the Pi's
  # dozzle/glances web UIs being LAN-reachable with no UFW allows for 8080/61208.
  # The Pi's manually-added 51822 allow is left in place (harmless, documents intent).
  # Kept as a delete-task (not just removed) so existing hosts converge.
  community.general.ufw:
    rule: allow
    port: "51820"
    proto: udp
    delete: true
  become: true
  when: inventory_hostname == 'daniel-pi'

- name: Enable UFW firewall
  tags: [firewall]
  community.general.ufw:
    state: enabled

- name: Install auditd
  tags: [audit]
  ansible.builtin.apt:
    name: auditd
    state: present
  become: true

- name: Enable and start auditd
  tags: [audit]
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true
  become: true

- name: Configure audit rules
  tags: [audit]
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/hardening.rules
    owner: root
    group: root
    mode: "0640"
    content: |
      # Identity file changes
      -w /etc/passwd -p wa -k identity
      -w /etc/group -p wa -k identity
      -w /etc/shadow -p wa -k identity
      # SSH configuration changes
      -w /etc/ssh/sshd_config -p wa -k sshd
      # Privilege escalation changes
      -w /etc/sudoers -p wa -k actions
      -w /etc/sudoers.d -p wa -k actions
  become: true
  notify: Reload audit rules

- name: Restrict sensitive file permissions
  tags: [file-perms]
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/ssh/sshd_config", mode: "0600" }
    - { path: "/etc/crontab", mode: "0600" }
    - { path: "/boot/grub/grub.cfg", mode: "0600" }
    - { path: "/etc/cron.d", mode: "0700" }
    - { path: "/etc/cron.daily", mode: "0700" }
    - { path: "/etc/cron.hourly", mode: "0700" }
    - { path: "/etc/cron.weekly", mode: "0700" }
    - { path: "/etc/cron.monthly", mode: "0700" }
  become: true
  failed_when: false

- name: Blacklist unused rare network kernel modules
  tags: [kernel-modules]
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-rare-network.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      install dccp /bin/true
      install sctp /bin/true
      install rds /bin/true
      install tipc /bin/true
  become: true

# WireGuard containers (wg-easy — runs on both daniel-server and daniel-pi — and
# qbittorrent's VPN sidecar) run without the SYS_MODULE capability, so the host must
# provide the kernel module.
- name: Ensure the WireGuard kernel module is loaded on the host
  tags: [kernel-modules]
  community.general.modprobe:
    name: wireguard
    state: present
  become: true

- name: Persist the WireGuard kernel module across reboots
  tags: [kernel-modules]
  ansible.builtin.copy:
    content: "wireguard\n"
    dest: /etc/modules-load.d/wireguard.conf
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Install sysstat for system accounting
  tags: [accounting]
  ansible.builtin.apt:
    name: sysstat
    state: present
  become: true

- name: Enable sysstat data collection
  tags: [accounting]
  ansible.builtin.lineinfile:
    path: /etc/default/sysstat
    regexp: '^ENABLED='
    line: 'ENABLED="true"'
  become: true

- name: Enable and start sysstat service
  tags: [accounting]
  ansible.builtin.systemd:
    name: sysstat
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Install process accounting tools
  tags: [accounting]
  ansible.builtin.apt:
    name: acct
    state: present
  become: true

- name: Enable and start process accounting service
  tags: [accounting]
  ansible.builtin.systemd:
    name: acct
    state: started
    enabled: true
  become: true

- name: Set login banner for local console (/etc/issue)
  tags: [banners]
  ansible.builtin.copy:
    dest: /etc/issue
    owner: root
    group: root
    mode: "0644"
    content: |
      WARNING: Unauthorized access to this system is prohibited.
      All connections are monitored and recorded.
      Disconnect immediately if you are not an authorized user.
  become: true

- name: Set login banner for network logins (/etc/issue.net)
  tags: [banners]
  ansible.builtin.copy:
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"
    content: |
      WARNING: Unauthorized access to this system is prohibited.
      All connections are monitored and recorded.
      Disconnect immediately if you are not an authorized user.
  become: true

- name: Schedule weekly package autoremove
  tags: [crons]
  ansible.builtin.cron:
    name: "Weekly apt autoremove"
    minute: "0"
    hour: "2"
    weekday: "0"
    job: "/usr/bin/apt-get autoremove -y -q 2>&1 | /usr/bin/logger -t apt-autoremove"
    user: root
  become: true

- name: Schedule weekly purge of removed-package config remnants
  tags: [crons]
  ansible.builtin.cron:
    name: "Weekly dpkg purge orphaned configs"
    minute: "15"
    hour: "2"
    weekday: "0"
    job: "dpkg -l | awk '/^rc/{print $2}' | xargs -r dpkg --purge 2>&1 | /usr/bin/logger -t dpkg-purge"
    user: root
  become: true

- name: Install rkhunter malware scanner
  tags: [rkhunter]
  ansible.builtin.apt:
    name: rkhunter
    state: present
  become: true

- name: Update rkhunter data files
  tags: [rkhunter]
  ansible.builtin.command: rkhunter --update --nocolors
  become: true
  changed_when: false
  failed_when: false

- name: Initialize rkhunter file-properties baseline (first run only)
  tags: [rkhunter]
  # --propupd rewrites the *trusted* baseline of file hashes/properties. Running it
  # on every play would silently re-bless any tampering that happened between runs,
  # defeating the weekly --check. Guard it to first install; the APT_AUTOGEN setting
  # below keeps the baseline fresh after *legitimate* package upgrades instead.
  ansible.builtin.command: rkhunter --propupd --nocolors
  args:
    creates: /var/lib/rkhunter/db/rkhunter.dat
  become: true

- name: Refresh rkhunter baseline automatically after apt operations
  tags: [rkhunter]
  # With APT_AUTOGEN=true, rkhunter --propupd runs via the package-manager hook after
  # apt installs/upgrades (including unattended-upgrades), so the only file-property
  # changes the weekly scan flags are ones NOT explained by a trusted package event.
  ansible.builtin.lineinfile:
    path: /etc/default/rkhunter
    regexp: '^APT_AUTOGEN='
    line: 'APT_AUTOGEN="true"'
  become: true

- name: Schedule weekly rkhunter scan
  tags: [rkhunter]
  ansible.builtin.cron:
    name: "Weekly rkhunter malware scan"
    minute: "0"
    hour: "2"
    # Wednesday, staggered off the Monday AIDE check: both scans run >1h on the
    # Pi's 4 slow cores and used to overlap (rkhunter 02:00 still running when
    # AIDE started at 03:00). nice/ionice-idle so a scan can never starve
    # containers — found 2026-06-11 while chasing Pi swap-thrash storms.
    weekday: "3"
    job: "/usr/bin/nice -n19 /usr/bin/ionice -c3 /usr/bin/rkhunter --check --nocolors --skip-keypress --report-warnings-only 2>&1 | /usr/bin/logger -t rkhunter"
    user: root
  become: true

- name: Set default umask to 027 in /etc/login.defs
  tags: [login-defs]
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^UMASK\s'
    line: "UMASK\t\t027"
  become: true

- name: Configure password hash rounds in /etc/login.defs
  tags: [login-defs]
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^#?\s*{{ item.key }}\s'
    line: "{{ item.key }}\t{{ item.value }}"
  loop:
    - { key: "SHA_CRYPT_MIN_ROUNDS", value: "65536" }
    - { key: "SHA_CRYPT_MAX_ROUNDS", value: "65536" }
  become: true

- name: Configure password age policy in /etc/login.defs
  tags: [login-defs]
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^{{ item.key }}\s'
    line: "{{ item.key }}\t{{ item.value }}"
  loop:
    - { key: "PASS_MIN_DAYS", value: "1" }
    - { key: "PASS_MAX_DAYS", value: "365" }
    - { key: "PASS_WARN_AGE", value: "14" }
  become: true

- name: Disable core dumps in /etc/security/limits.conf
  tags: [coredumps]
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: "* hard core 0"
    state: present
  become: true

- name: Create systemd coredump drop-in directory
  tags: [coredumps]
  ansible.builtin.file:
    path: /etc/systemd/coredump.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Disable core dumps via systemd coredump
  tags: [coredumps]
  ansible.builtin.copy:
    dest: /etc/systemd/coredump.conf.d/disable.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Coredump]
      Storage=none
      ProcessSizeMax=0
  become: true

- name: Bind Postfix to loopback only (send-only local mailer)
  tags: [postfix]
  # Postfix here only delivers local system mail (cron/AIDE/rkhunter -> root); it
  # never needs to accept SMTP from the network. The package default
  # `inet_interfaces = all` binds 0.0.0.0:25 — exposed to the whole LAN (and to the
  # internet if the router ever forwards 25). `mynetworks` already restricts RELAY to
  # loopback so it's not an open relay, but loopback-only removes the listener from
  # the network surface entirely while local submission + delivery keep working.
  # Needs a RESTART (notify below), not reload — inet_interfaces rebinds sockets.
  ansible.builtin.lineinfile:
    path: /etc/postfix/main.cf
    regexp: '^inet_interfaces\s*='
    line: "inet_interfaces = loopback-only"
  become: true
  notify: Restart Postfix

- name: Harden Postfix SMTP banner to hide OS info
  tags: [postfix]
  ansible.builtin.lineinfile:
    path: /etc/postfix/main.cf
    regexp: '^smtpd_banner\s*='
    line: "smtpd_banner = $myhostname ESMTP"
  become: true
  notify: Reload Postfix

- name: Disable Postfix VRFY command
  tags: [postfix]
  ansible.builtin.lineinfile:
    path: /etc/postfix/main.cf
    regexp: '^disable_vrfy_command\s*='
    line: "disable_vrfy_command = yes"
  become: true
  notify: Reload Postfix

- name: Install AIDE file integrity monitor
  tags: [aide]
  ansible.builtin.apt:
    name: aide
    state: present
  become: true

- name: Deploy local AIDE exclusions for Docker homelab
  tags: [aide]
  ansible.builtin.template:
    src: 98_aide_local.conf.j2
    dest: /etc/aide/aide.conf.d/98_aide_local.conf
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Initialize AIDE database with progress monitoring
  tags: [aide]
  ansible.builtin.shell: |
    set -o pipefail
    aideinit &
    AIDEINIT_PID=$!
    sleep 5
    AIDE_PID=$(pgrep -P "$AIDEINIT_PID" -x aide 2>/dev/null || pgrep -x aide 2>/dev/null)
    PREV_BYTES=0
    while kill -0 "$AIDEINIT_PID" 2>/dev/null; do
      if [ -n "$AIDE_PID" ] && [ -f "/proc/$AIDE_PID/io" ]; then
        BYTES=$(awk '/^read_bytes/{print $2}' "/proc/$AIDE_PID/io" 2>/dev/null)
        GB=$(( BYTES / 1073741824 ))
        RATE_MB=$(( (BYTES - PREV_BYTES) / 1048576 ))
        echo "AIDE progress: ${GB}GB read, ${RATE_MB}MB/min"
        PREV_BYTES=$BYTES
      else
        echo "AIDE initializing..."
      fi
      sleep 60
    done
    wait "$AIDEINIT_PID"
  args:
    creates: /var/lib/aide/aide.db
    # pipefail (and the $!/arithmetic bashisms above) need bash, not dash (/bin/sh).
    executable: /bin/bash
  become: true
  changed_when: false

- name: Schedule weekly AIDE integrity check
  tags: [aide]
  # nice/ionice-idle: the check reads the whole filesystem for >1h (Pi); at normal
  # priority it competes with containers for CPU and SD-card IO. The rkhunter scan
  # is staggered to Wednesday for the same reason.
  ansible.builtin.cron:
    name: "Weekly AIDE file integrity check"
    minute: "0"
    hour: "3"
    weekday: "1"
    job: "/usr/bin/nice -n19 /usr/bin/ionice -c3 /usr/bin/aide --check 2>&1 | /usr/bin/logger -t aide"
    user: root
  become: true

- name: Mask the Debian dailyaidecheck timer (duplicates our weekly cron)
  tags: [aide]
  # Found 2026-06-11: the aide package ships dailyaidecheck.timer, so both hosts ran
  # a FULL integrity check nightly on top of the weekly cron above — ~1h20m of CPU
  # per night on the Pi Zero 2 W. The timer's run is also alert-broken (the _aide
  # user can't mail(1) without extra capabilities; it warned every run), while the
  # weekly cron logs to syslog as root. Mask rather than disable so a package
  # upgrade can't re-enable it.
  ansible.builtin.systemd_service:
    name: dailyaidecheck.timer
    enabled: false
    state: stopped
    masked: true
  become: true

- name: Mask networkd-dispatcher (no hooks installed — pure veth-event noise)
  tags: [debloat]
  # Found 2026-06-11: Ubuntu ships this Python daemon enabled, but its only job is
  # running hook scripts from /etc/networkd-dispatcher/*.d — and every one of those
  # dirs is empty on both hosts. Meanwhile each Docker container create/destroy is a
  # veth link event, so it wakes constantly, forks a `networkctl` per event (extra
  # churn on the Pi), and races the vanishing veth — the recurring journal error
  # `networkctl[...]: Interface "vethXXX" not found`. Mask rather than purge:
  # zero package-dependency risk, and an apt upgrade can't re-enable it.
  ansible.builtin.systemd_service:
    name: networkd-dispatcher.service
    enabled: false
    state: stopped
    masked: true
  become: true
