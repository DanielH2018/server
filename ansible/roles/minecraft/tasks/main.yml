- name: Creates directories
  file:
    path: "/home/{{ env.SYS_USER }}/server/minecraft/data"
    state: directory
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ env.SYS_USER }}/server/minecraft/docker-compose.yml"
    
- name: Deploy Minecraft
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ env.SYS_USER }}/server/minecraft/"
  become: yes
  become_method: sudo