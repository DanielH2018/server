- name: Create media directories
  file:
    path: "/home/{{ SYS_USER }}/server/media"
    state: directory
    mode: 0755

- name: Create qbittorrent directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/qbittorrent/config"
    state: directory
    mode: 0755

- name: Create prowlarr directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/prowlarr/config"
    state: directory
    mode: 0755

- name: Create sonarr directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/sonarr/config"
    state: directory
    mode: 0755

- name: Create radarr directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/radarr/config"
    state: directory
    mode: 0755

- name: Create download directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/library/downloads"
    state: directory
    mode: 0755

- name: Create movie directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/library/movies"
    state: directory
    mode: 0755

- name: Create tv directories
  file:
    path: "/home/{{ SYS_USER }}/server/media/library/tvseries"
    state: directory
    mode: 0755

- name: Create cleaner from template
  template:
    src: sonarr-episode-trimmer.py.j2
    dest: "/home/{{ SYS_USER }}/server/media/sonarr/config/sonarr-episode-trimmer.py"
    mode: 0755

- name: Create cleaner config from template
  template:
    src: sonarr-episode-trimmer-config.j2
    dest: "/home/{{ SYS_USER }}/server/media/sonarr/config/sonarr-episode-trimmer-config"
    mode: 0755

- name: Create docker-compose from template
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ SYS_USER }}/server/media/docker-compose.yml"
    
- name: Deploy Media Stack
  shell: docker-compose up -d --force-recreate
  args:
    chdir: "/home/{{ SYS_USER }}/server/media/"
  become: yes
  become_method: sudo
