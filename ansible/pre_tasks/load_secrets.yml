---
# Shared SOPS secret-load preamble, imported under `pre_tasks:` by deploy.yml + initial_setup.yml.
# MUST be pre_tasks, not tasks: a play runs pre_tasks -> roles -> tasks, so under `tasks:` this would
# load AFTER the roles and any role templating a secret (e.g. gitops_deploy's config.env) would see
# it undefined. `become: false` on both: initial_setup.yml sets play-level `become: true` and would
# otherwise escalate at secret-load — before the become password is known, forcing --ask-become-pass
# on a passworded-sudo host; it's a no-op for deploy.yml (no play-level become). Fails on a host not
# yet onboarded to SOPS (no age key / community.sops collection) — run ansible/bootstrap.yml first to
# break that chicken-and-egg. See bootstrap.yml header.
- name: Load encrypted secrets
  community.sops.load_vars:
    file: secrets.yml
  delegate_to: localhost
  run_once: true # noqa run-once[task]
  become: false
  tags: always

- name: Use the SOPS-stored sudo password for privilege escalation
  ansible.builtin.set_fact:
    ansible_become_password: "{{ become_password }}"
  no_log: true
  become: false
  when: become_password is defined
  tags: always
