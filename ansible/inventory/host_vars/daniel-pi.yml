---
server_ip: 10.0.0.139
ssh_config_path: /etc/ssh/sshd_config.d/50-cloud-init.conf
# `domain` is inherited from SOPS (secrets.yml → daniel-hunter.com), exactly like
# daniel-server — the Pi carries no host-specific override. The only domain consumer
# here is wg-easy's WG_HOST (wireguard.daniel-hunter.com — the one hostname with a DNS
# record at the public IP; verified resolving). A former `domain: daniel-pi.com` override
# was removed 2026-06-11: that zone does not resolve, and it was only harmless because the
# SOPS value shadowed it (un-shadowed it would have broken the VPN endpoint). To give a
# future Pi-exposed service a "daniel-pi" hostname, use a `pi.`-prefixed subdomain of the
# working zone (e.g. dozzle.pi.daniel-hunter.com — real DNS via cloudflare-ddns), not a
# separate daniel-pi.com zone.
# LAN-only host: publish web UIs bound to the LAN IP instead of routing through Traefik.
expose_mode: lan
# Disk-backed swap for the 512 MB Zero 2 W. The RAM-resident zram (optimize_pi) can't add
# real capacity, so heavy one-shot apt/dpkg steps (apt-show-versions cache build, `upgrade: dist`,
# AIDE init) OOM-kill mid-transaction and corrupt the package DB. Created by the initial_setup
# role BEFORE its apt tasks run. See ansible/roles/setup/initial_setup/tasks/main.yml.
pi_swapfile_path: /swapfile
pi_swapfile_size: 1G
# Slow healthcheck cadence on the Zero 2 W: every probe is 2 runc invocations (multi-
# threaded Go — ~20-30 PIDs each incl. threads). At the template defaults (10-30s across
# 6 containers) that was ~10 forks/sec, constant RCU expedited-stall warnings (~150/hr in
# the journal) and 13% CPU PSI at idle. Templates fall back to their own defaults where
# this is unset (the server keeps 10s/30s). Detection latency worst-case = 60s x 3 retries.
container_healthcheck_interval: 60s
containers_list:
  # Read-only Docker socket proxy — serves glances + dozzle; the hardcoded
  # docker-proxy-lifecycle sub-proxy (restart-only) serves autoheal.
  - name: docker-proxy
    use_authelia: false
    networks:
      - proxy
  - name: wg-easy
    port: 51821
    udp_port: 51822
    # Accepted risk: LAN-only host, so no Authelia AND no PASSWORD_HASH — the admin UI is
    # open to anyone on the Pi's LAN (it's bound to the LAN IP, never internet-exposed or on
    # the tunnel). To gate it, add a PASSWORD_HASH env from SOPS. See the wg-easy CLAUDE.md.
    use_authelia: false
    networks:
      - proxy
  - name: glances
    port: 61208
    use_authelia: false
    networks:
      - proxy
  - name: dozzle
    port: 8080
    use_authelia: false
    networks:
      - proxy
  # Portainer Agent — lets the SERVER's Portainer manage this Pi as a remote environment.
  # Not Traefik-routed: publishes :9001 (TLS) bound to the Pi LAN IP, locked to the server by a
  # DOCKER-USER rule; auth via AGENT_SECRET (SOPS). See the portainer-agent role CLAUDE.md.
  - name: portainer-agent
    port: 9001
    use_authelia: false
    networks:
      - proxy
  - name: autoheal
    use_authelia: false
    networks:
      # lifecycle-only: reaches docker-proxy-lifecycle (write proxy), not the broad nets
      - lifecycle
