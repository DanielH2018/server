---
server_ip: 10.0.0.161
ssh_config_path: /etc/ssh/sshd_config
containers_list:
  # Organization: Core Services (proxy network)
  - name: traefik
    use_authelia: true
    networks:
      - proxy
  - name: authelia
    use_authelia: false
    networks:
      - proxy
  - name: crowdsec
    port: 3000
    use_authelia: true
    networks:
      - proxy
  - name: portainer
    port: 9000
    use_authelia: true
    networks:
      - proxy
  - name: docker-proxy
    use_authelia: false
    networks:
      - proxy
      - monitoring
      - apps
  - name: homepage
    port: 3000
    use_authelia: true
    networks:
      - apps
      - proxy
      - monitoring
      - media
      - homepage_private
  - name: autoheal
    use_authelia: false
    networks:
      # lifecycle-only: reaches docker-proxy-lifecycle (write proxy), not the broad nets
      - lifecycle
  - name: watchtower
    use_authelia: false
    networks:
      # lifecycle-only: reaches docker-proxy-lifecycle (write proxy), not the broad nets
      - lifecycle
  - name: cloudflare-ddns
    use_authelia: false
    networks:
      - monitoring
  # Organization: Apps network
  - name: peanut
    port: 8080
    use_authelia: true
    networks:
      - apps
  - name: pihole
    port: 80
    use_authelia: true
    networks:
      - apps
  - name: kopia
    port: 51515
    use_authelia: true
    networks:
      # Dedicated isolation net shared only with Traefik. Kopia runs intentionally
      # unauthenticated (Kopia basic-auth bug workaround); keeping it off `apps`
      # stops other app containers reaching kopia:51515 directly.
      - kopia
  - name: wg-easy
    port: 51821
    udp_port: 51820
    use_authelia: true
    # DNS baked into generated WireGuard client configs → Pi-hole on this host, so
    # *.local.<domain> resolves over the tunnel (private homelab path that bypasses
    # Cloudflare/CrowdSec). Mobile full-tunnel clients use it directly; desktop
    # split-tunnel clients override it (hosts file) to keep general DNS on Mullvad.
    default_dns: "{{ server_ip }}"
    # On `monitoring`, NOT `apps`: wg-easy must not share a Docker bridge with the
    # containers behind the host-published ports WG clients reach (Traefik 80/443 ->
    # apps, Pi-hole 53 -> apps, Portainer 9000 -> proxy, Jellyfin DLNA -> media). Reaching
    # a same-bridge container via a host-published port hairpins: the DNAT'd reply
    # returns straight across the bridge, bypassing the host's reverse-NAT, so conntrack
    # drops it and the WG client times out. `monitoring` is cross-bridge from all of them
    # (only Traefik is host-published there, and its 80/443 DNAT to its apps IP), and
    # Traefik is on it so the wg-easy UI still routes. See docs/wireguard-private-homelab-access.md.
    networks:
      - monitoring
  - name: home-assistant
    port: 8123
    # HA uses its own auth (+ optional TOTP), NOT Authelia: forward-auth breaks the
    # companion mobile app, webhooks, and long-lived API tokens. Route still gets
    # Traefik TLS + CrowdSec + rate-limiting.
    use_authelia: false
    networks:
      - apps
      - ups  # reach the nut sidecar's upsd:3493 for the Home Assistant NUT integration
  # Organization: Development
  - name: code-server
    port: 8443
    use_authelia: true
    networks:
      - apps
  - name: n8n
    port: 5678
    use_authelia: true
    networks:
      - apps
  - name: karakeep
    port: 3000
    use_authelia: true
    networks:
      - apps
  # Organization: Media
  - name: freshrss
    port: 80
    use_authelia: true
    networks:
      - apps
  - name: qbittorrent
    port: 8080
    use_authelia: true
    networks:
      - media
  - name: sonarr
    port: 8989
    use_authelia: true
    networks:
      - media
  - name: radarr
    port: 7878
    use_authelia: true
    networks:
      - media
  - name: jellyfin
    port: 8096
    use_authelia: false
    networks:
      - media
  - name: prowlarr
    port: 9696
    use_authelia: true
    networks:
      - media
  - name: bazarr
    port: 6767
    use_authelia: true
    networks:
      - media
  - name: tdarr
    port: 8265
    use_authelia: true
    networks:
      - media
  - name: recyclarr
    use_authelia: false
    networks:
      - media
  - name: janitorr
    use_authelia: false
    networks:
      - media
  # Organization: Monitoring
  - name: prometheus
    port: 9090
    use_authelia: true
    networks:
      - monitoring
  - name: grafana
    port: 3000
    use_authelia: true
    networks:
      - monitoring
  - name: glances
    port: 61208
    use_authelia: true
    networks:
      - monitoring
  - name: uptime-kuma
    port: 3001
    use_authelia: true
    networks:
      - monitoring
  - name: scrutiny
    port: 8080
    use_authelia: true
    networks:
      - monitoring
  - name: monitor-bridge
    port: false
    use_authelia: false
    networks:
      # monitoring: reach prometheus + uptime-kuma. kopia: query the backup source's
      # status without putting kopia on the broad monitoring net (trusted-infra access,
      # like traefik). apps: reach the n8n public API at n8n:5678 for the workflow-failure
      # check. No web UI, so no port / Authelia.
      - monitoring
      - kopia
      - apps
  # Organization: Miscellaneous (apps network)
  - name: healthchecks
    port: 8000
    use_authelia: true
    networks:
      - monitoring
  - name: bento-pdf
    port: 8080
    use_authelia: true
    networks:
      - apps
  - name: littlelink
    port: 3000
    hostname: www
    # Public by design: this is the public-facing link-in-bio landing page (www),
    # so it must be reachable without Authelia.
    use_authelia: false
    networks:
      - apps
  - name: livesync
    port: 5984
    # CouchDB enforces its own auth (require_valid_user = true in local.ini); the
    # Obsidian LiveSync replication client uses basic auth and can't pass Authelia 2FA.
    use_authelia: false
    networks:
      - apps
  - name: ical-proxy
    port: false
    use_authelia: false
    networks:
      - homepage_private
  - name: speedtest
    port: 80
    use_authelia: true
    networks:
      - monitoring
  # Organization: Game servers (apps network)
  - name: terraria
    # No HTTP port — exposed over a dedicated raw-TCP Traefik entrypoint (terraria,
    # :7777) plus a direct 7778->7777 host publish; can't carry Authelia forward-auth.
    use_authelia: false
    networks:
      - apps
  - name: terraria-stats
    # Headless sidecar: reads terraria console lines from Loki, serves Prometheus
    # metrics on :9420. No web UI -> no port/Authelia. monitoring net = reach Loki
    # and be scraped by Prometheus.
    port: false
    use_authelia: false
    networks:
      - monitoring
