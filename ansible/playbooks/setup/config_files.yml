---
- name: Deploy configuration files
  hosts: localhost
  connection: local
  vars:
    config_source_dir: "{{ playbook_dir }}/files/"
  
  tasks:
    - name: Copy .gitconfig to home directory
      ansible.builtin.copy:
        src: "{{ config_source_dir }}/.gitconfig"
        dest: "{{ ansible_env.HOME }}/.gitconfig"
        mode: '0644'
        backup: yes
      tags: git

    - name: Copy .bashrc to home directory
      ansible.builtin.copy:
        src: "{{ config_source_dir }}/.bashrc"
        dest: "{{ ansible_env.HOME }}/.bashrc"
        mode: '0644'
        backup: yes
      tags: bash

    - name: Display completion message
      ansible.builtin.debug:
        msg: "Configuration files have been deployed successfully"