---
- name: Optimize Raspberry Pi Zero 2 W for Server Use
  hosts: localhost
  become: true
  vars:
    # RAM Settings
    zram_percentage: 50
    gpu_memory_mb: 16
    
    # Docker Log Settings
    docker_log_max_size: "10m"
    docker_log_max_file: "3"

  tasks:
    # -------------------------------------------------------
    # 1. DYNAMIC CONFIG PATH DETECTION (Bookworm vs Bullseye)
    # -------------------------------------------------------
    - name: Check if /boot/firmware/config.txt exists (Bookworm)
      stat:
        path: /boot/firmware/config.txt
      register: firmware_config

    - name: Set config.txt path variable
      set_fact:
        rpi_config_path: "{{ '/boot/firmware/config.txt' if firmware_config.stat.exists else '/boot/config.txt' }}"

    # -------------------------------------------------------
    # 2. GPU MEMORY SPLIT (Reclaim RAM)
    # -------------------------------------------------------
    - name: Set GPU memory to {{ gpu_memory_mb }}MB in {{ rpi_config_path }}
      lineinfile:
        path: "{{ rpi_config_path }}"
        regexp: '^gpu_mem='
        line: "gpu_mem={{ gpu_memory_mb }}"
        create: yes
      notify: Reboot Pi

    # -------------------------------------------------------
    # 3. ZRAM CONFIGURATION (Compressed RAM)
    # -------------------------------------------------------
    - name: Install zram-tools
      apt:
        name: zram-tools
        state: present
        update_cache: yes
      become: true

    - name: Configure ZRAM percentage
      lineinfile:
        path: /etc/default/zramswap
        regexp: '^PERCENT='
        line: "PERCENT={{ zram_percentage }}"
      notify: Restart ZRAM

    # -------------------------------------------------------
    # 4. LOG2RAM (Save SD Card)
    # -------------------------------------------------------
    - name: Add Azlux GPG key for Log2Ram
      get_url:
        url: https://azlux.fr/repo.gpg
        dest: /usr/share/keyrings/azlux-archive-keyring.gpg
        mode: '0644'

    - name: Add Log2Ram repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/azlux-archive-keyring.gpg] http://packages.azlux.fr/debian/ bookworm main"
        state: present
        filename: azlux
      become: true

    - name: Install Log2Ram
      apt:
        name: log2ram
        state: present
        update_cache: yes
      notify: Reboot Pi
      become: true

    # -------------------------------------------------------
    # 5. HARDWARE WATCHDOG (Auto-Reboot on Freeze)
    # -------------------------------------------------------
    - name: Enable watchdog kernel module in {{ rpi_config_path }}
      lineinfile:
        path: "{{ rpi_config_path }}"
        regexp: '^dtparam=watchdog='
        line: "dtparam=watchdog=on"
      notify: Reboot Pi

    - name: Install watchdog daemon
      apt:
        name: watchdog
        state: present
      become: true

    - name: Configure watchdog device
      lineinfile:
        path: /etc/watchdog.conf
        regexp: '^#?watchdog-device'
        line: "watchdog-device = /dev/watchdog"

    - name: Configure watchdog max load (Reboot if load > 24)
      lineinfile:
        path: /etc/watchdog.conf
        regexp: '^#?max-load-1\s='
        line: "max-load-1 = 24"
      notify: Restart Watchdog

    - name: Ensure watchdog service is enabled
      service:
        name: watchdog
        enabled: yes
        state: started

    # -------------------------------------------------------
    # 6. DOCKER LOGGING HYGIENE
    # -------------------------------------------------------
    - name: Create /etc/docker directory
      file:
        path: /etc/docker
        state: directory

    - name: Configure Docker Log Rotation (daemon.json)
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "{{ docker_log_max_size }}",
              "max-file": "{{ docker_log_max_file }}"
            }
          }
      notify: Restart Docker

  # -------------------------------------------------------
  # HANDLERS
  # -------------------------------------------------------
  handlers:
    - name: Restart ZRAM
      service:
        name: zramswap
        state: restarted

    - name: Restart Watchdog
      service:
        name: watchdog
        state: restarted

    - name: Restart Docker
      service:
        name: docker
        state: restarted

    - name: Reboot Pi
      reboot:
        msg: "Rebooting to apply low-level hardware changes (GPU/Watchdog/Log2Ram)"