---
- name: Setup Server
  hosts: localhost
  gather_facts: no
  vars_files:
    - .env
  roles:
    - { role: docker,           tags: [ 'docker' ]}
    - { role: traefik,          tags: [ 'traefik' ]}
    - { role: portainer,        tags: [ 'portainer' ]}
    - { role: authelia,         tags: [ 'authelia' ]}
    - { role: cloudflare-ddns,  tags: [ 'cloudflare-ddns' ]}
    - { role: crowdsec,         tags: [ 'crowdsec' ]}
    - { role: code-server,      tags: [ 'code-server' ]}
    - { role: hoppscotch,       tags: [ 'hoppscotch' ]}
    - { role: freshrss,         tags: [ 'freshrss' ]}
    - { role: hedgedoc,         tags: [ 'hedgedoc' ]}
    - { role: librespeed,       tags: [ 'librespeed' ]}
    - { role: heimdall,         tags: [ 'heimdall' ]}
    - { role: uptime-kuma,      tags: [ 'uptime-kuma' ]}
    - { role: pihole,           tags: [ 'pihole' ]}
    - { role: smokeping,        tags: [ 'smokeping' ]}
    - { role: file-browser,     tags: [ 'file-browser' ]}
    #- { role: scrutiny,         tags: [ 'scrutiny' ]}
    - { role: guacamole,        tags: [ 'guacamole' ]}
    - { role: nordlynx,         tags: [ 'nordlynx', 'media' ]}
    - { role: qbittorrent,      tags: [ 'qbittorrent', 'media' ]}
    - { role: prowlarr,         tags: [ 'prowlarr', 'media' ]}
    - { role: sonarr,           tags: [ 'sonarr', 'media' ]}
    - { role: radarr,           tags: [ 'radarr', 'media' ]}
    - { role: jellyfin,         tags: [ 'jellyfin', 'media' ]}
    - { role: prometheus,       tags: [ 'prometheus', 'monitoring' ]}
    - { role: grafana,          tags: [ 'grafana', 'monitoring' ]}
    - { role: netdata,          tags: [ 'netdata', 'monitoring' ]}
    - { role: minecraft,        tags: [ 'minecraft' ]}
    - { role: home-assistant,   tags: [ 'home-assistant' ]}
    - { role: watchtower,       tags: [ 'watchtower' ]}
    - { role: mobile-app-db,    tags: [ 'mobile-app-db' ]}
