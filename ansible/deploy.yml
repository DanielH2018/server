---
- name: Deploy Containers
  hosts: "{{ target | default(lookup('pipe', 'hostname')) }}"
  connection: local
  gather_facts: true
  vars_files:
    - .env
  tasks:
    - name: Run roles respecting tags
      include_role:
        name: "{{ container_item.name }}"
        apply:
          tags: "{{ container_item.tags }}"
      loop: "{{ containers_list }}"
      loop_control:
        loop_var: container_item
      when:
        - "'all' in ansible_run_tags or (container_item.tags | intersect(ansible_run_tags) | length > 0)"
      tags: always
