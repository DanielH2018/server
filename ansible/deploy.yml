---
- name: Deploy Containers
  hosts: "{{ target | default(lookup('pipe', 'hostname')) }}"
  gather_facts: true
  pre_tasks:
    - name: Load encrypted secrets
      community.sops.load_vars:
        file: secrets.yml
      delegate_to: localhost
      run_once: true # noqa run-once[task]
      tags: always

    - name: Use the SOPS-stored sudo password for privilege escalation
      ansible.builtin.set_fact:
        ansible_become_password: "{{ become_password }}"
      no_log: true
      when: become_password is defined
      tags: always

    - name: Build role dependency map
      ansible.builtin.set_fact:
        _container_deps_map: "{{ containers_list | build_dep_map(playbook_dir, ansible_run_tags) }}"
      tags: always

    - name: Sort containers by dependency order
      ansible.builtin.set_fact:
        containers_list: "{{ containers_list | toposort_containers(_container_deps_map) }}"
      tags: always

    - name: Compute dependency closure for tagged containers
      ansible.builtin.set_fact:
        _deps_to_check: "{{ containers_list | dep_closure(_container_deps_map, ansible_run_tags) }}"
      when: "'all' not in ansible_run_tags"
      tags: always

    - name: Check running state of dependencies
      community.docker.docker_container_info:
        name: "{{ item.name }}"
      register: _container_state_results
      loop: "{{ _deps_to_check }}"
      ignore_errors: true
      when: "'all' not in ansible_run_tags"
      tags: always

    - name: Expand tagged deployment to include unmet dependencies
      ansible.builtin.set_fact:
        containers_list: >-
          {{
            containers_list | expand_with_deps(
              _container_deps_map,
              ansible_run_tags,
              _container_state_results.results
                | default([])
                | rejectattr('container', 'none')
                | selectattr('container.State.Running', 'equalto', true)
                | map(attribute='item.name')
                | list
            )
          }}
      when: "'all' not in ansible_run_tags"
      tags: always

  tasks:
    - name: Run roles
      ansible.builtin.include_role:
        name: "{{ container_item.name }}"
        apply:
          tags: "{{ container_item.tags }}"
      loop: "{{ containers_list }}"
      loop_control:
        loop_var: container_item
      tags: always
