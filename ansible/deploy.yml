---
- name: Deploy Containers
  hosts: "{{ target | default(lookup('pipe', 'hostname')) }}"
  gather_facts: true
  tasks:
    - name: Load encrypted secrets
      community.sops.load_vars:
        file: secrets.yml
      delegate_to: localhost
      run_once: true
      tags: always

    - name: Run roles respecting tags
      ansible.builtin.include_role:
        name: "{{ container_item.name }}"
        apply:
          tags: "{{ container_item.tags }}"
      loop: "{{ containers_list }}"
      loop_control:
        loop_var: container_item
      when:
        - >-
          'all' in ansible_run_tags or
          (container_item.tags | intersect(ansible_run_tags) | length > 0)
      tags: always
