---
# SOPS encryption config — the age recipients that ansible/vars/secrets.yml (and any
# .yml/.yaml under vars/ or secrets/) is encrypted to. These are PUBLIC age keys, not
# secret, so this file is tracked. SOPS searches upward from the encrypted file, so this
# (ansible/.sops.yaml) is the config used for ansible/vars/secrets.yml — keep it here, not
# at the repo root. Private keys live only at ~/.config/sops/age/keys.txt per host and are
# never committed (see .gitignore keys.txt/*.agekey/*.key rules + the gitleaks hook).
#
# Multi-recipient is OR: ANY listed key decrypts the WHOLE file. Every host that must
# decrypt secrets needs a private key matching a recipient below.
#
# Add a host (e.g. the Pi):
#   1. On that host:  ansible-playbook ansible/bootstrap.yml --limit <host>
#      (generates the host's own age key, prints its PUBLIC key — no secret needed).
#   2. Add the printed pubkey to the `age:` list below, with a trailing `# <host>` comment.
#   3. On a host that can already decrypt (daniel-server):
#        sops updatekeys ansible/vars/secrets.yml
#      then commit the re-encrypted secrets.yml + this file, and `git pull` on the host.
# Remove a host's access the same way: delete its key here, re-run `sops updatekeys`.
creation_rules:
  - path_regex: .*(vars|secrets)\/.*\.ya?ml$
    # Recipients (multi-recipient = OR; ANY one key decrypts the whole file).
    # First key = daniel-server, second = daniel-pi.
    age: "age1shgt54wq7y9pk4nksxcfr5s539rh2g5uqkh9t2jlx6wj4a8aq34q4cyg7k,age1934n4c4xe4rfnpczex2nkr4nlc3c820yu47ehyt6adljx5wmk58sspvpyf"
