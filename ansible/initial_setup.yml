---
- name: Initial Server Setup
  hosts: "{{ target | default(lookup('pipe', 'hostname')) }}"
  become: true
  # Facts are gathered EXPLICITLY below, after the SOPS-stored sudo password is set.
  # With gather_facts: true the play escalated at fact-gathering — before secrets
  # loaded — so hosts with passworded sudo (daniel-server) needed --ask-become-pass
  # run interactively. Same pattern as deploy.yml; -K still works as an override.
  gather_facts: false
  pre_tasks:
    # MUST be pre_tasks, not tasks: a play runs pre_tasks -> roles -> tasks, so
    # under `tasks:` this would load AFTER the roles and any role templating a
    # secret (e.g. gitops_deploy's config.env) would see it undefined.
    # Fails on a host not yet onboarded to SOPS (no age key / community.sops collection) —
    # run `ansible/bootstrap.yml` first to break that chicken-and-egg. See bootstrap.yml header.
    - name: Load encrypted secrets
      community.sops.load_vars:
        file: secrets.yml
      delegate_to: localhost
      run_once: true # noqa run-once[task]
      become: false
      tags: always

    - name: Use the SOPS-stored sudo password for privilege escalation
      ansible.builtin.set_fact:
        ansible_become_password: "{{ become_password }}"
      no_log: true
      become: false
      when: become_password is defined
      tags: always

    - name: Gather facts (escalated — the become password is now available)
      ansible.builtin.setup:
      tags: always
  roles:
    - { role: config_files, tags: ["config_files"] }
    - { role: initial_setup, tags: ["initial_setup"] }
    - { role: sops_setup, tags: ["sops_setup"] }
    - { role: docker_install, tags: ["docker_install"] }
    - { role: gitops_deploy, tags: ["gitops_deploy"], when: inventory_hostname == 'daniel-server' }
    - { role: optimize_pi, tags: ["optimize_pi"], when: inventory_hostname == 'daniel-pi' }
  handlers:
    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: Restart systemd-journald
      ansible.builtin.service:
        name: systemd-journald
        state: restarted

    - name: Reload Postfix
      ansible.builtin.service:
        name: postfix
        state: reloaded

    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Reload audit rules
      ansible.builtin.command: augenrules --load
      become: true
      changed_when: true

    - name: Restart ZRAM
      ansible.builtin.service:
        name: zramswap
        state: restarted

    - name: Restart earlyoom
      ansible.builtin.service:
        name: earlyoom
        state: restarted

    - name: Restart Watchdog
      ansible.builtin.service:
        name: watchdog
        state: restarted

    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: Reboot Pi
      ansible.builtin.reboot:
        msg: "Rebooting to apply low-level hardware changes (GPU/Watchdog/Log2Ram)"
