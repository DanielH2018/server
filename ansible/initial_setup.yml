---
- name: Initial Server Setup
  hosts: "{{ target | default(lookup('pipe', 'hostname')) }}"
  become: true
  # Facts are gathered EXPLICITLY below, after the SOPS-stored sudo password is set.
  # With gather_facts: true the play escalated at fact-gathering — before secrets
  # loaded — so hosts with passworded sudo (daniel-server) needed --ask-become-pass
  # run interactively. Same pattern as deploy.yml; -K still works as an override.
  gather_facts: false
  pre_tasks:
    - name: Load encrypted secrets and set the become password (shared preamble)
      ansible.builtin.import_tasks: pre_tasks/load_secrets.yml
      tags: always

    - name: Gather facts (escalated — the become password is now available)
      ansible.builtin.setup:
      tags: always
  roles:
    - { role: config_files, tags: ["config_files"] }
    - { role: initial_setup, tags: ["initial_setup"] }
    - { role: sops_setup, tags: ["sops_setup"] }
    - { role: docker_install, tags: ["docker_install"] }
    - { role: gitops_deploy, tags: ["gitops_deploy"], when: inventory_hostname == 'daniel-server' }
    - { role: renovate_notify, tags: ["renovate_notify"], when: inventory_hostname == 'daniel-server' }
    - { role: optimize_pi, tags: ["optimize_pi"], when: inventory_hostname == 'daniel-pi' }
  handlers:
    - name: Restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted

    - name: Restart systemd-journald
      ansible.builtin.service:
        name: systemd-journald
        state: restarted

    - name: Reload Postfix
      ansible.builtin.service:
        name: postfix
        state: reloaded

    # inet_interfaces changes require a full restart — `postfix reload` does not
    # rebind listening sockets (per Postfix docs), so loopback-only wouldn't take
    # effect until the next restart without this.
    - name: Restart Postfix
      ansible.builtin.service:
        name: postfix
        state: restarted

    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Reload audit rules
      ansible.builtin.command: augenrules --load
      become: true
      changed_when: true

    - name: Restart ZRAM
      ansible.builtin.service:
        name: zramswap
        state: restarted

    - name: Restart earlyoom
      ansible.builtin.service:
        name: earlyoom
        state: restarted

    - name: Restart Watchdog
      ansible.builtin.service:
        name: watchdog
        state: restarted

    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: Reboot Pi
      ansible.builtin.reboot:
        msg: "Rebooting to apply low-level hardware changes (GPU/Watchdog/Log2Ram)"
