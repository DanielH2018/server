repos:
  # Standard cleanup hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: ['--fix=lf']
        description: Forces to replace line ending by the UNIX 'lf' character.

  # Ansible Linting
  - repo: https://github.com/ansible/ansible-lint
    rev: v24.12.2
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        additional_dependencies:
          - ansible-core>=2.17
          - jmespath
        entry: bash -c 'ansible-galaxy collection install -r ansible/requirements.yml -p ~/.ansible/collections && env ANSIBLE_COLLECTIONS_PATH=~/.ansible/collections ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint -c ansible/.ansible-lint'
        pass_filenames: false

  # Check for SOPS encryption
  - repo: local
    hooks:
      - id: check-sops-encryption
        name: Check if secrets are encrypted
        entry: bash -c 'if grep -L "sops:" "$@"; then echo "File is not encrypted!"; exit 1; fi' --
        language: system
        # ONLY run this on files you know must be encrypted
        files: secrets.yml|.*\.sops\.yml

  # Gitleaks for detecting secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
